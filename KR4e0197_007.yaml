body:
  text: 青霞集卷七明沈鍊撰舊稿感懷夢闕心猶在懷鄉意已賒月光明萬里空自照京華寄張符卿别離非不有薄宦更悲辛不共尊中夜徒逢馬上春彈冠投世務仗節謝交親誰念飄零客無書信最頻遊巖屋烟霞洞口聽樵歌欲待青春長薜蘿借問長安朱紫客一生車馬幾回過送蕭别駕赴雲中馬上相逢道别離據鞍抽筆一題詩總令萬里滇南去只記連鑣薊北時送袁明府北上冉冉青雲客來驂五馬雄訟庭懸日月賔館春清風魏闕非天上青山在鏡中還題羽獵賦馳獻鳯凰宮北上帝鄉紅日近冠蓋白雲遊心似黃河水朝宗日夜流乙巳赴京師留别諸親友一宵春雨送行舟花滿千秋霽色浮乍解薜蘿趨北闕試聽簫鼓急中流十年江海逃名地萬里雲霄奮翮秋欲報君恩輕逺别不勝清淚憶松楸千金裝桂楫千金裝桂楫來往五湖濵寄謝長安客空勞車馬塵送蘆洲李君還燕京無復黃金可贈君但將斗酒叙殷勤天涯故舊知難别長憶茅亭一片雲其二薄遊驚見客鄉人一别河橋又隔春那似阿翁扶上馬揮鞭己望屬車塵次徐時亨贈行韻一首一杯春酒故情牽江溆花枝照别筵身上紫霄攀日月語傳黃鳥各風烟栁條欲折韶光暮雨腳初收霽色鮮慚愧吳山相送逺不知歸棹是何年宫詞未得䝉恩最苦辛朱顔嵗嵗惜陽春何須久望鑾輿幸但看昭陽失寵人春日春日湖容麗天髙雨氣舂逢時多感慨獨睡萬山中恭聞東宫殿下初冠出閣開講之報書此志喜鳯輦朝看出紫宸加冠遙慰萬方臣千秋定繼無為治十葉真稱有道孫春殿氣和雷出震夜廷天皎月重輪不須祗羡長安近教養應將賈疏陳偶書寄張子中湖海關心慵跨馬塵寰失淚暗沾巾誰知終日昏昏者不是雲臺打睡人挽吕徴君徴君嗟已老當卜少微躔鳯鳥悲人世龍蛇入嵗年清笳空外咽丹旐夢中懸誰為書彤管風詩永世傳得髙省菴消息離别向漳臺秋風恨莫裁暫因春夢歇何苦寄書來題鹿圗夀火紹峯閒花盡與青禽去幽草生憐白鹿來乞取神仙餐玉訣他年騎爾共徘徊漫興學道自將周孔擬題詩未許孟髙齊雲裝羽服桃林下風落綸巾杏塢西為王陽史司丞賦得玉女潭詩七首盤玉嶺遙憐盤玉嶺應是玉人行日月旋瑶島雲霞轉赤城劍含秋浦色琴和石泉聲趺坐蓮花發千年卜道成玉女潭澄潭宛輕氷鬱拂凄露重委蛇淑女姿素絲揚五縱下有青蓮玉容成手能種舒藻鳯鳥回沉精魚龍恐曜日自光靈為霖本神用明發藉風雲膏流八埏共玉陽山房方嶠緣丹壑雲房結綺里户牖隱星辰琴瑟麗文梓披紛燭六龍朱閣瞻弧矢奉日本懸心枕泉非洗耳朝躋睇八荒夕宴歌皇矣風光九道生雲霧從中起明月升簾櫳疊嶂陳朱几方契千載期被髮虛皇裏梅竹隩鬱伊北山阿雲木自披朗映日文彌昭因風氣逾爽芳馨潛金罍重隂幕朱幌鼎實方藉兹佩玉懸和響天桃徒艷陽文杏那能倣比德取平觀㑹心成獨往虬鼉峽磐磐象石分靈物來稽首陸離潛精英蜿蜒成並偶雲氣應時生流泉噴其口連卷若九回映帶雙懸瀏日月并光曜雷霆鞭不走元氣結於斯天地固同朽玉樹湍琪樹生澗壑流湍布涯涘芳華繞雲霓朱葉亦繁止百尺振柯條千齡拓元始先民詠風詩彤管輝太史秀色餐神仙拍袂洪崖子飛蓋相追隨清觴復伊邇謝彼桃李顔抱琴來就此翺翔以永年振衣崇燕喜玉陽洞伊鬱北山阿階庭氣色多畫欄雲物近芳榭月明過搗藥依巖洞題書䕃薜蘿不須尋石室緱嶺聽笙歌簡友人病起憶昨藤床抱病幽短籬蕭瑟不勝愁復憐雲樹留青眼不恨江山對白頭新製道衣仍侣伴舊盟耶水有孤舟更增藥餌開藜杖春日春風恣逺遊送鮑元英太學北上二首平生鮑子最相知無奈河梁送别時臨水殷勤說不盡明朝斗酒共相持其二北去京華路幾千憐君獨上木蘭船逢人早寄平安信莫使離心對月懸題畫贈王太醫飛花作埒石牀安身在烟霞夢亦閒多少白頭車馬客不如髙卧駐朱顔贈葛儀封堤成二首為政一年馴鳥雀築堤千里障魚龍他年傳說儀封令只有淮陽葛長公其二鄭國渠成千里完葛公堤就萬人歡魚驚淺浪穿花度鳥羡微波隔葉看送趙少府莫以才雄騎從偏驅馳隨地䇿風烟丈夫自要報明主何用黃金鑄馬鞭吳中春興江雲漠漠低沙樹山雨霏霏集苑樓入夜圗書看燭坐逢春尊俎傍花愁孫明府自命有春山之篇屬余次韻南國名山福地真煙花長發四時春東隅采日方鳴鳯溫谷條風為襲人蘭蕙平林還結珮雲霞滿地即成茵㑹憐仙客披襟處和氣氤氲拂紫宸送施敬之還武昌扁舟初發若耶溪歸夢先能到浙西行李惟餘一吟卷經過山水盡留題昭君怨琵琶清影月中回彈盡宫商恨不開漢苑笙歌今夜别番城車馬幾時來春夜懷張平山仲春正值桃花節夜憶仙郎谷口居耿耿明河瞻氣色悠悠旅鴈隔音書遊五泄山五首流泉五道吐竒芬秀色遙憐少室雲名境未能逢一賞何須夜夜隱星文其二七十二峯雲外重削成片片似芙蓉山靈自愛多標格容與青山碧漢中其三巖明島秀並回芳何羡天台有石梁神氣自多懷藴結白雲悠處發輝光其四巖壑盤旋萬仭餘金樓玉户並仙居不教俗士回塵駕祇借髙人著道書其五珍木千章與世殊瑶花一半近精廬方今金馬多才雋好向名山結隱居濟北甄文學有雄才自題名號數十為書問余余定以一鶴歸之因作一鶴吟二首山河百道擁亭臺獨對仙禽夜舉杯解說繁音崇縹眇不如清影共徘徊其二調鶴鳴琴意出羣此身長自伴孤雲若非騎馬咸陽道那遣華亭唳不聞題李進士扇圗千卷自於花下發一尊時向竹邉開門前車馬如流水别有髙人䇿杖來勸民歌爾我心髙氣岸浮自誇伎倆舌如流天公早已安排定用盡機關不到頭子仁子漸兄弟載酒逺來愧以疏庸相廢遂用憮然祗今東還復有日月之别又以旅泊無將以詩贈焉楊郎鼓棹出江城江日江波紫霧明細雨欲霑行處濕長風應解别離情其二孤舟曉向三吳發白帽宵從五泄分飽浴江山俱是學坐摛雲霧總成文其三江鷗沙鷺久無疑可是談經愧爾師秖說江雲可相贈白頭青眼對前期其四青樓細雨玉簫生聞道諸郎下楚城我有憂心憑慰藉短簑何日更江亭其五暨陽山水總流傳越女吳姬濯錦邉便從五泄攀竒勝須向楊家泊酒船班婕妤莫以容顔麗偏忘明主恩當年不召幸辛苦在長門贈祝古峯新第城作屏風水作簾更多雲霧結為簷君家第宅佳如此誰遣停杯日未淹送趙子敷母芳筵羅綺夜初成山閣逶迤絃管清既是白頭同日老猶懸髙月照人明送劉子臣年少披裘隱中野月光正射茅簷下照見懷中五色毫能圗百戰蒲捎馬送門人鄭子英還浦陽蘭舟六月蕩南征道上炎風苦未平我有離琴單鳯軫為君彈出玉壺氷宿浦陽戴氏九靈山房青樓伊鬱白雲隈曲巘重巒四面開水石自多塵外景烟霞猶向夢中來遊洞壑山莊幾處山川近世中向來車馬不曾通今宵攬轡烟霞裏何異神仙馭玉龍過茀復嶺山川歷亂五雲鄉磴道盤旋萬樹行只恐愁來看不得分明曲似九回腸春景感遇碧栁青松並道回千林桃李一時開熳爛裁成五色錦春風疑是蜀江來出塞曲五首寄季彭山郡侯黃雲千里雜邉塵今嵗悲笳更犯春一片菱花猶未結青青愁殺隴頭人其二征人刁斗在龍堆校尉初傳瑪瑙杯若遣官軍長結束何憂不報捷書來其三獷騎陵城氣若風兵機那取寶刀雄君看韓信囊沙日百萬貔貅在掌中其四朝朝暮暮檄書聞嵗嵗年年度隴雲莫道邉城兵馬怯懸知只少霍將軍其五鴈門太守今隱居桃李春風自結廬藩墻幾處留彤管那能不著定邉書贈桞文學只今並棹訪庭闈秋日揚鞭達帝畿遙知早佩黃金印終然不脫芰荷衣其二若為楚曲凌辰發猶抱音塵向明月人言窈窕非玉鳬公自徘徊結羅襪其三嗟余亦作燕山遊懷公意氣如清秋狂歌未足為公贈貌出蘆花江上愁其四遙憶春風數千里祇啜江亭一杯水山隂父老溪畔來未見使君清若此贈栁文學新居卜築新城大道邉樓居何必讓神仙知君綵筆充廷宇莫學楊雄只草𤣥飲童氏山樓芳筵歌舞夜徘徊莫厭殷勤勸酒杯滿目江山君試數幾家絃管在樓臺和張有功聞馬孟河中禮闈消息十上封書事始成杏花園裏最馳名還知馬上看春日應有新詞和鳯鳴賦得著論准過秦作賦擬子虛藝閣臨芳苑韶光屬令辰三餘珍日月七略謝風塵鴻藻能齊漢雄詞解屈秦含毫方子夜流曜在千春送李使君考績之京三年佐郡節旄雄四海聲名在鏡中今日驅車就岐路何人不奏管絃風渡江江上春風暖復輕春雲淡淡碧波平海門日湧蛟龍動城上山連劍㦸明飛鷺巧迎帆影疾鳴鼉遙答棹歌清中流獨有中原志莫遣勳名愧祖生其二一卧江東已十年重聽笳鼓泛樓船春潮聲細江流穩夜雨痕多栁色鮮佛寺午鐘驚鶴起神州逺岫見龍纒雄圗王氣俱堪賦釃酒臨風思渺然過髙郵宛轉舟行逐岸斜短篷細雨正思家春湖渺渺春蒲緑兩兩鴛鴦戲淺沙送吳刑曹出淮陽方秋金氣肅主上遣曹郎仗䇿臨雄郡驅車出漢疆草承魚蕳白花入隼旟黃祖帳祥雲動兹行憲節光其二白雲飛皂蓋正值帝鄉秋劍珮離郎署驂騑駐陌頭誰將吏作隱自藉宦為遊弭節蘭臯上還經芳杜洲晚軒詞為蘇山人題莫厭回軒敞暮雲且將絃管醉斜曛長安甲第青霄客白首飄搖未及君遇陸竹石御醫父子燕土三年别相逢楚水潯絲蘿元石友橋梓總蘭心倚蓋春風裏維舟古木隂殷勤不忍去望望夕烟深任節婦歌古往今來不盡年一人旌節萬人憐曩時孟婦吳中怨今日任姬越上傳其二閨中此意誰解知遙憶秋山連理枝孤鸞别鶴雲中操躡鳯攀龍未是竒其三獨抱幽蘭八十秋遺孤此日賸孫謀百年清節開藜杖一寸丹心映白頭其四舊事連翩接㑹稽他年典録著芳菲身看王母庭花結名與曹娥廟樹齊沈𤣥齊贈劍以詩酬之寶劍相持贈關河意氣多題書懸日月開匣隱星河學武心先壯談邉色未和因君奉韜略揚臂願麾戈題青谷卷贈姚道士谷口青枝縈石雲雜花交綺藹晴芬潯陽道士幽棲處蘿月松雲長念君又月閟霞宫綵雲回羽客文谷青蘿樹合沙白澗泉分山僻欹猿嘯天深下鶴羣遙見春葩結丹成獨有君寄文司徒京國看搖落芳條此地新非能不折贈但恐坐傷春戀祿頻餐水懷交强謝鄰自知書斷絶翻覺苦干人和劉春岡侍御怡椿軒綺榭長榮玉樹春光輝奕世自怡神朝攀濯露枝偏舊夕對流雲葉併新天上襲香薰委珮日中重采映垂紳北堂南殿恩俱切莫遣揮毫賦詠頻送張刑曹奉使恤刑漢庭鴻藻屬鄒枚丹筆還教握憲臺却見洛陽乘傳出何如博望泛槎回城邉候氣知流昴馬上題詩問棄灰若遣河東多覆奏揮毫更展掞天才賦得柳亭篇贈葉內翰柏梁侍臣花滿纓却向烟霞懷柳亭應憐宫苑千年樹詎念江湖萬里萍朝回騮馬知曽繫春入黃鸝許縱聽何懼綵毫無獻納永瞻日月耀光靈送屠直翁赴南都工部尚書司空冠蓋映海濱南望金陵併作春𤣥綬拂林花氣發隼旟接岸栁條新中朝餞别千官出夾道絃歌九敘陳珍重留都根本地只今水土是經綸送翁夢山拊循四川結髮交逰今壯年相逢朱蓋只依然並探禹穴非無棹一眺津亭别有筵歡意自憐花鳥近歸心徒畏簡書傳使君且莫停車騎蜀國山河已在邉贈答張心崖江離幽郁滿城阿之子臨風雜佩過寶劍獨懸秋氣肅綺園時集野芳多不教明月分光采更有清風出詠歌今日相逢君記取他時勳業在山河送張大綱受職之京公子文才出將門賦詩長日坐江村青雲曉合三軍策華月晴開萬里樽長路關山贍北極壯逰江漢問真源憐君早佩封侯印玉帳題書入故園簡弟子京北征冬盡下揚州積雪疏花散石樓此日飄零遙憶汝長江浩蕩不勝愁倉皇鄉土殊相慰潦倒風塵總未休安得萬山深隱處披雲倚壑共冥搜寄駱容山江樹浹辰歡奉覯江簔轉棹逐人哀君今獨嘯王郎宅我亦長歌伯禹臺世上風雲誰可擬山中物色盡興猜祇令共結蘭亭社醉倒花前白玉杯山逰㑹周張二大尹同宴飛來山得峯字交逰時節幸過逢更有仙臺碧樹重地迥不厭傾斗酒眼眀偏是見髙峯雲移隔浦開千嶂人倚青天似二龍聞道縣庭公事簡暫教軒蓋一從容贈馮子哲五十仙客看花五十春玳筵星發燕佳辰玉杯斟酌長生酒錦席昭回上德珍舞近南山同獻夀歌隨夜月總娛賓願君手植千章柏記取年年祝頌新賀岑山人新居匡阜山居卜築新石樓雲館抱陽春南州物色逢徐孺谷口桃花對子真馭氣乘風元得駕揮金吐玉底言貧蜀都幸有揚雄賦即遣朱車並日輪贈袁定山明府北上羽騎登途本拔羣朱絃那用惜離分三秋佐郡懸明月千里趨庭奉白雲宛戀壺漿陳祖道飄搖劍珮出河濆祇令草就長楊賦青瑣遙持獻聖君送葉子肅文學遊廣陵臨分握手且躇蹰雪驛寒暉尚未舒君仗才名客吳地好迎春律向江都斗間氣合雙龍劍夢裏神符五嶽書别後瑶琴疏古調可堪凉月夜堂虛題越望亭呈篤齊湯郡侯重巒鬱嵂俯崇城綺榭初依巘道明珠翼依空雙鳯起玉螭承露九華生上游日月攀將近四面山河削不成幸得歡遊陪燕賞秖將歌咏頌升平新稿夜坐冬夜銀河永清光入座頻遙知經絶域不為照離人聞角寶劍連星礪龍韜帶月尋數聲清角裏多少塞垣心淮隂哀飢曽進沙邉飯伏跨還輸市上豪舉足重輕因戀漢區區榮辱等秋毫題孫君月池卷明月照池邉澄平夕景連山人臨泛處不異鏡中仙詠司馬文正積德之什兼弔菲泉憲伯佩符元祐日弭節中興年司馬多竒服攀龍不異天傳家文未墜省墓劍常懸方駕成俱往臨雲一愴然挽錢子道仙翁回鶴駕一日馭風歸為息人間轡還忘月上機上賔冠劍釋郎尹羽旄飛盛德烏棲樹清光月照扉獨憐逰子恨還濕老萊衣題沃洲吕侍御畫四首江山嵗晚北風翻送鴈南翔辛苦時時一望鄉莫為無書逺相憶已將髙節徹氷霜春江垂釣春渚垂綸日出餘落花流水濺衣裾吕公既入非熊兆猶向滄江憶釣魚溪塘秋晚溪水泠泠玉露天笛中聲泛木蘭船莫教吹出陽關曲不為悲秋已黯然輞川積雨王維習靜更能詩興在空林積雨時不厭苦吟生白髮自教隂木囀黃鸝寄張有功十六首五花騮馬出龍城一葉蘭舟獨自行誰道維揚江上月清光翻對水波平其二君今騎鶴上揚州我是從軍出隴頭何異濟川河曲水一時南北各分流其三明月娟娟橫玉鈎御河西畔不勝秋本因楊栁牽風動誤遣桃花逐水流其四支機織女渡河難獨有張騫去復還近日乘槎河漢否好傳消息到人間其五朝看玉魄繞枝柔暮對清光傍葉流何事樓頭楊栁月長年只在保安州其六何人見謫九江城病裏劉郎入骨驚燈影徘徊心欲折不堪風雨夜來聲其七與君同作逐臣行宣室終當召賈生我似夜郎流李白何時吹笛過江城其八解道秋風隔岸吹早先吹斷藕中絲不曽看得郎騎馬何事能題驄馬嘶其九邉城楊栁路傍垂折取長條欲贈誰不若寄將明鏡去為曾照我鬢如絲其十桑乾河曲水潺潺好送征人雙淚還帶葉隨風千里去又愁隔斷萬重山其十一五鳯樓邉一疏來含香抱玉夜徘徊自甘書記還題竹誰道司丞去詠梅其十二平生膽略好封侯夜讀隂符曉未休為問張華龍劍在借余一斬月氐頭其十三閣老宅中花樹盛㑹同河上酒巵香歡逰已共烟霞謝意氣知隨山水長其十四三嵗歡娛曾不足一朝離别己傷多海棠花畔聽絲竹無奈風光入眼何其十五自君之出不鳴琴流水髙山萬里心復道思君若流水隴頭嗚咽到如今其十六阮籍驅車空放達賈生搖筆已滂沱芙蓉枝上傾珠露不是仙郎涕淚多書懷二首山城六月草青青萬里羈人正獨行壯士不歸頭漸白四方戈㦸幾時平秦關百二岸成池旋轉乾坤在此時方叔壯猷元老卧何人早賦中興詩送朱子南還十年辛苦在京華夢裏何時不見家一到若耶溪畔月始知楊栁隔天涯送張汝道曽為縣令氣難馴一卧豐城幾樹春今日幸逢張僕射肯將寶劍贈他人春日風光二月栁垂絲秖愛簾櫳日影遲寄語海棠休亂發看花不是少年時賦得濯足萬里流贈謝憲伯長江渺渺接銀河仙客乘秋濯素波回首風烟如夢裏只教明月照漁簔聞角誰將清角月中吹格調分明出塞回莫遣征人聞此曲翻嫌邉騎不窮追感懷割生獻馘古來無解道功成萬骨枯白草黃沙風雨夜寃魂多少覔頭顱邉詞烽火何曾不暫驚人民安堵太無情鴛鴦繡出全無樣要與他家帖畫屏其二十面埋兵擒項籍三分割據憤曹操忠臣報國心無盡肯為家貧賣寶刀其三塞上烟塵一萬重霍家營陳自從容健兒夜半偷胡馬留作秋來奪獲功其四鐵甲將軍奮臂呼一時箭鏃滿頭顱羌戎不是偏梟勇知道無人救郭都其五垂老軍人髮墜肩焚香夜夜告蒼天願留守將多年嵗省得重科見面錢其六邉陲本是宰臣莊漫道年年散俸糧但使將軍科罰少儘留衣食養兒郎休貪百姓錢世上江河流日下官人索錢勢可怕吏兵二部日夜開手裏無錢口無話權門賄賂已成渠算來到底為癡愚削皮喫血人受苦瘦國肥家彼自如聰眀男子不愛錢天生地化福無邉請君但看燃臍報可是黃金塢內填莫割平人首邉塵浩浩風吹急塞上遷臣長淚滴毛頭星明太白髙朝來又報羌兵入羌兵入來猶云可漢兵殺人愁殺我借問官軍羞不羞口裏誇功心裏憂魂驚魄懼夢像惡只為貪心强割頭曽不見荆軻義借於期首猶死秦廷血迸流塞上曲萬里風雲入虎牙千金生縳夜鳴笳誰知大將輕竒術只是摳衣一左車其二胸奴百萬未須憂斬將搴旗在運籌束髮由來憎李廣不將辛苦覔封侯其三龍爭虎鬭海波翻燕息干戈只一言曹操小兒何足數敢將輕騎獵中原賦得駕馭必英雄漢髙神武沛中興大沛風雲欲上蒸劍發赤精蕭相舉書留黃石子房升送任子入都城君去逢人在帝京道余辛苦二毛生夢中不覺為遷客猶抱封書入鳯城漫興三首雪葉霜花二月天春風知不到三邉寒威直射重裘裏白髮征人未拆綿其二彗星夜見卜何祥寶劍磨成雜耿光不分胸奴長犯塞誓心擒滅左賢王其三丹心戀主嵗華驚鏡裏飄颻白髮生誰為畫成憂國恨關西一片月長明寄陸道菴雲樹烟花隔水南仙人羽服坐龍龕丹書昨到斜陽裏正憶衡山陸道菴題金門候對圖贈濟川蔡進士蔡澤應知晚出身終當躍馬走西秦畫工不是毛延夀肯遣娥眉錯嫁人憶髙伯函刀州一夢十年强搔首關河淚幾行知已從來無覔處天涯更欲斷人腸憶于山人知已難逢最易分朝來一片嶺頭雲雖然書札時常有猶向衡陽憶鴈羣逰子吟堂上老親垂白髮天涯逰子淚斑衣何人解道山河險夢裏猶能夜夜歸憶昔河洲客夢思氤氲畫角聲中曉色分回首春風將十載至今啼鴈不堪聞出塞曲中年曾作羽林郎誰怕橫飛塞上霜自羡當年班定逺能將十騎斬賢王其二生懸寶劍報君恩自許青萍氣不凡若遣海波清未得玉顔何用立乾坤逰仙詩曠世棲靈嶽希心躡大羅手中元氣合足下白雲多洞口留丹色巖深隱薜蘿猶聞塵世上金鼓雜鐃歌其二好生明帝德兼濟是丹心辟惡懸軒鏡調風鼓舜琴皇天憎白髮大地足黃金聖智參𤣥化精研萬古深其三玉液生真宰金丹本緝熙聖人悲獨往大化有真知寶劍龍雙合瑶琴鳯九儀髙臺延綺燭恆恐朔風吹其四時哉聖所寶氣化錯毫釐真訣乾坤應隂符日月隨壺中元化轉鼎上八風吹惟有修真客精誠永不移其五采薇西山客即是紫芝仙觀世心不忍入山身自然大還周八極小隱亦千年誰云饑餓死本以薄閎顛其六巍巍秋梁子靈氣在人間混世安金鼎和光駐玉顔鳯驂誰與並龍駕詎能攀擬落周唐際真能煉九還其七延生非寶鼎濟世是金仙煉就壺中藥遨遊物外天一身通宇宙萬化合人烟區區龜鶴算何足羡長年其八寶劍神仙製寰中灝氣多雙飛齊日月一意斬妖魔國紀乾坤正軍威將士和從來太阿出瀚海湛無波其九領得真靈訣剛風掃世氛嚴威凌萬仞正氣肅三軍有道威時鳯無心出岫雲中虛純一德渺渺似離羣其十明自虛無谷光生篤實天壺中懸大象鏡外麗長川堯舜非無術伊周即是仙雍熙調玉燭和氣正芊妍憂懷詩其間専指嚴氏也北風烈烈動征旗南國悠悠感我思屬玉宫中香氣滿黃金臺畔漏聲遲舊從丹闕陳書疏憶向金吾别帝畿遷謫已無王國相薄遊猶有習家池肝腸最苦人難識名姓空為衆所知馬援去家長作客少陵生已不逢時近聞邸報頻搔首又遇邉聲早著眉虎帳兜鍪懸未得栁營笳管夢堪疑將軍掛印空如斗節制談兵正似碁骯髒征夫心不分凄凉士卒色常飢鐵衣自苦飄搖恨綵繒誰爭獻納儀馬骨清髙踰水岸弓弦斷絶挂林塒狼烟已作胸奴堠鳥道斜張漢將旗幕府報功誰氏首衰衣空泣道旁碑平生所學知何事一日當塗乃爾為心畏權門蹲谷虎意輕朝命薄霜枝敗兵南詔翻稱捷失節東隅倒是竒總為人臣輕節義遂令世道缺綱維懷姦自忍忘恩澤結黨何須及叛離甲第熒煌分苑樹登歌杳裊雜宫詞南曹北館皆門下東賈西商盡指頥大內交游親似水禁中消息密於絲心希董卓黃金塢手受留侯白玉巵尹氏世卿門赫奕田蚡吏祿路逶迤揣摩幾事惟林甫竊弄威權傲李斯新進郎君榮曲宴舊游將帥秉旌麾曹瞞為計如狐豕司馬之心在路歧曾受清朝三載祿不甘邪黨一毫欺春秋討賊宣尼筆宋室誅姦石介詩安得當朝忠義士早除君側九層危山遊石如懸磬四邉成泉似流珠萬壑生若遣孫郎清嘯發中天併作鳯皇聲明妃曲平生矜艷色不得侍君王獨為黃金客凋零白玉粧出宫多夜月上馬盡秋霜一奏琵琶曲征人總斷腸又愁聞邉塞近不厭馬行遲賤妾徒多怨君王豈得知南看非寢殿北望是旌旗寄謝丹青使黃金有盡時把劍憶諸生陳松山陳生贈我劍今復幾春秋眉目隔河隴恩情在枕頭戲咏鸚鵡不妨籠檻裏緑羽且蹉跎稍待能言日機關更覺多送張使君考績之京嗟余還印組三嵗别方城每憤諸邉動長懷萬里行聞君將上計愁望不勝情青霞集卷七
