body:
  text: 青霞集目録别集類五明卷一文集上卷二文集中卷三文集下卷四賦卷五詩集上卷六詩集中卷七詩集下卷八論草卷九兵說卷十尺牘上卷十一尺牘下卷十二年譜臣等謹按青霞集十一卷年譜一卷明沈錬撰鍊字純甫㑹稽人嘉靖十七年進士除溧陽知縣後官錦衣衛經厯疏論邊事並劾嚴嵩廷杖謫戍復為嵩黨路楷搆入蔚州妖人閻浩案中棄市天下寃之隆慶初贈光祿少卿萬厯中追諡忠愍是編本十六卷前為詩文後附年譜事紀祠集鍊子襄有刻集紀原言方鍊被禍時籍其家燬其著述又榜禁毋許藏匿副本是編蓋襄所口誦而心記者然僅什之一二後復得武崇文所藏本始編次成集其文章徑健有氣詩亦鬱勃磊落肖其為人以詞藻論雖不及鈐山堂之工然嵩集至使天下不欲讀當時為作序者如湛若水崔銑諸人至以為文章之玷而誦鍊集者至今肅然起敬此則流芳遺臭視其自為人心是非之公有不知然而然者矣今録其原集十一卷而以年譜一卷附之至錬之事迹彰彰史冊日月爭光不假後人之表章其事紀祠集所載贊頌諸作則槩從删剃焉乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀青霞集原序青霞沈君由錦衣經厯上書詆宰執宰執深嫉之方力搆其罪賴明天子仁聖特薄其譴徙之塞上當是時君之直諌之名滿天下已而君纍然携妻子出家塞上㑹宣大數告警而帥府以下束手閉壘以恣冦之出沒不及飛一鏃以相抗甚且及冦之退則割中土之戰沒者野行者之馘以為功而父之哭其子妻之哭其夫兄之哭其弟者往往而是無所控籲君既上憤疆場之日弛而下痛諸將士之日管刈我人民以䝉國家也數嗚咽欷㱆而以其所飲鬱發之於詩歌文章以泄其懷即集中所載諸什是也君故以直諌為重於時而其所著為詩歌文章又多所譏刺稍稍傳播上下震恐始出死力相煽搆而君之禍作矣君既沒而中朝之士雖不敢訟言其事而一時閫寄所相與讒君者尋且坐罪罷去又未幾故宰執之讎君者亦報罷而君之故人俞君於是裒輯其平生所著若干卷刻而傳之而其子襄來請余序之首簡茅子受讀而題之曰若君者非古之志士之遺乎哉孔子刪詩而小辨之怨親巷伯之刺讒而下其間忠臣寡婦幽人懟士之什並列之為風疏之為雅不可勝數豈皆古之中聲也哉然孔子不遽遺之者特憫其人矜其志猶曰發乎情止乎禮義言之者無罪聞之者足以為戒焉耳豫嘗按次春秋以來屈原之騷疑於怨伍胥之諫疑於脅賈誼之疏疑於激叔夜之詩疑於憤劉蕡之對疑於亢然推孔子刪詩之㫖而裒次之當亦未必無録之者君既沒而海內之薦紳大夫至今言及君無不酸鼻而流涕嗚呼集中所載鳴劍籌邊諸什試令後之人讀之其足以寒賊臣之膽而躍塞垣戰士之馬而作之愾也固矣他日國家采風者之使出而覽觀焉其能遺之也乎豫謹識之至於文詞之工不工及當古作者之㫖與否非所以論君之大者也豫故不著嘉靖癸亥孟春望日歸安茅坤拜手序
