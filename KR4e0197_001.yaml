body:
  text: 青霞集巻一明沈錬撰序贈蔣君冠帶序士民入粟而冠服制也邑之里蔣君實以是官而同黨咸榮之謂當有詞命所以嘉重事而揚光輝俾余述之夫冠服者名器之章也一命之爵懸於天憲被而服之既與韋布異矣不寵榮之可乎知其榮而已矣美衣裳而菲德義都名器而薄忠信瀆王之章而慢天憲焉是同黨之所辱也而何榮之有夫𤣥豹不飲而澤文章所以榮百獸也鳳凰之有羽毛所以異衆禽也無謂其爵微名器不殊焉負名器於其身則思寵榮知寵榮則思分守矜莊肅穆儼然而章采之以與忠信並美以重王官之黼黻以揚士民之德義以對鄉閭之嘉命以光昭明之法服然後其事嘉其輝長大夫以為能鄉黨以為榮動容而德尊可以弗辱矣詩曰彼其之子不稱其服言貴於副之也不然則衣裳弁冕緇素而𤣥黄之獨何以美焉而被服之為美豈其與童子之餙侏儒之戲等乎德足以副服則服以益光義足以思寵則寵以益揚故古之美德者象服以江河文章以雲漢言弗辱也今之君子服其服而駕焉愼弗辱而已矣贈東沙公拊揗四川序代作世有名山大川則必有名公鉅卿其光輝符采足以相映發云記曰陜以東周公主之陜以西召公主之夫陜之東西與周召之豐跡豈不與日月並明哉海岱之雄於齊也則有太公管仲函谷之壯於秦也則有由余百里奚廼其明德茂功聲名之昭灼可以勒鼎彞而垂竹帛歌金石而舞之羽毛也然後其精氣發於星辰之上而芳華曜於岳瀆之間施及於當年而横流乎來世無紀極矣吾蜀古梁益之地而蠶叢魚鳬開自初古岷峩之崔嵬巴峽之潺湲與夫劍閣之固瞿塘之險而錦城之垣闕天下稱峻焉夫亦曰沃衍之府而金湯之奥區也而吾東沙公實秉節鉞往撫揗之公懷溟海之英而振九牧之表其衣裳之矩度帶珮之鈎衡足以羽儀百寮而剛柔之質應乎四時文武之材宜乎五土天下人士聞風聲而景慕談名號而悅者何可勝數以是明德而發之於文獻其起凋瘵之民而登之又服之地撫全蜀之衆還至仁之域所以輯綏土宇而震寧其山川延其永世之澤而不朽之鴻烈不與岷峨巫峽並峙於天壤不已也事有所感合而理有所相符巨闕莫邪天下之利器也則以之割犀兕而成威伐明月之珠夜光之璧世之所謂竒寳也則以之連城而照乘自古稱蜀之難治非漢之諸葛孔明宋之張忠定公則不能稱治蜀之功而與蜀並傳公之在今其名德何讓焉其名世之跡當與周召比隆而以私於吾蜀僕本蜀人也固願書之以貽從者贈兩松鄭君五十序歙兩松君彬彬然其可謂有德君子也家於邑之巖鎭里桑梓翳乎若縈雲烟子姓昆弟聯室而比居於是人稱鉅族矣挾數千金負劍馳良馬遨遊呉㑹間人且稱鉅商矣然而兩松君衣冠不殊有文雅之辭而無誇榮有揖讓温恭之行而無所毗麗處於韋布而不流交於縉紳先生而不隘又將其子若諸子宦遊而學處弦歌而吟諷日鏘鏘然盛於詩書矣今年且五十某月某日為其生之辰諸君子懷其德義樂其登年也則相與奉觴為壽而屬余辭以祝之余固獲與兩松君遊而兩松君之諸子則方挾䇿處於余之門余知兩松君之賢昭明矣余惟琴瑟無求而良工調焉為其有雅音也君子不言而衆好焉為其有明德也明德之光譬之於星辰而曜形無有定質故木不必其梁柱而後為良材玉不必其瑚璉而後為美器君子不必其黼黻也而後為明徳始余讀貨殖傳余有異於司馬氏之言以為君子服道而登庸被仁而處義以彼之程工計材豈所施於禮樂之際哉廼今觀之不然物各足其所受而英華發人各順其所能而懿美昭故敬仲交能於經國孫武展竒於論兵王爾奏巧於運斤白圭奮財於居積其為術不同而用則一也至陶朱公以處國則伯天下以處家則累千金又超然逺矣乃其盛節令文復不在於材技之間乎故夫兩松君之壽可以觴之矣夫樂其容止將贈之髪齒懷其聲音將不忘於其心故進之以㫖酒者所以俾永久流之以歌詠者所以洽燕和然則江湖之遊其廊廟之適而五十之齒百年之祥也族姓將日以蕃昌而子若諸子將日浚明使其衣冠車馬之盛聲華文物之羙里宅遨遊之樂黄耉鮐背之徴昭然若行日月而索星辰固明德之光曜也詩曰南山有臺北山有萊樂只君子邦家之基樂只君子萬壽無期又曰南山有枸北山有楰樂只君子遐不黃耉樂只君子保艾爾後諸君子之所以祝兩松君者將無是之言乎贈懷徳陳君六十序余與懷德君固有通家之誼云昔君之子子仁為邑弟子員負笈從余遊獨久其意氣恢恢也直欲薄於霄漢其行義輕金石也余至今懷思之其二季子中子寳亦因是歲時徃來叙殷勤不廢曩歲余驅車馬過君家飲酒連日夜樽罍引滿握手相與交歡余見君之顔貌豐澤風義之敦厚而嘆君之福履未艾也君外家之子戴子雍亦余之諸生愛且重之不讓子仁而戴生固請余文辭以為君壽雖然微戴子請余余亦為之矣夫丘壑之人之與廊廟之士其趣舍殊也韋布之澤之與冠葢之義不同也然而其德施均焉天之於有德若降嘉穀然既與之羙質又欲其峻茂而條成也則雨露以滋之風日以暄之於是種羙者則頴穗全徳厚者則福祕備詩曰瑟彼玉瓚黄流在中愷悌君子福禄攸降夫惟玉瓚之麗密而後黄流載之非君子愷悌福禄何以降之乎曁之流風率多以氣力相凌不因循於本實而惟其末流之為勝則自以為多智能矣而君獨不然雍容以寡言斂袵以退讓其容色温然若處子也人以非意見凌固安受之故君未嘗求勝於人而人亦莫能負之也君葢質成於自然所謂天之生嘉榖非耶記曰嘉榖之生則和氣成之矣懿德之鬯則福履盈之矣送鄭梧野序夫人之遨遊與其周覽也豈非達性命之理然乎世之齪齪者安土而重思吚嚶兒女之歡睠懷桑户之内至於老死而不離曁其委頓沉㝠復歸於無有則疇昔之宛戀而不能已者亦奚啻萬里哉故達人高士恒寄跡於山水托意魚鳥以攄其無窮之思誠識絶於塵俗而機見於隱微也廼若莊生濯纓於濠水之上子長振屣於齊魯之間向平肆武於五岳之巓鄭子抽筆於呉㑹之際斯可謂異世同遊殊地而合轍者矣始鄭子梧野自歙來伏讀典記好竒而貴博余一見伏其才氣所謂奔軼絶塵而不與世同其閫域者也既乃慨然感虎林龍井與吾㑹稽禹穴雲門若耶之異從其友望洋劉子海樵陳子上下巖谷徃來洲渚凡山名而水勝者必窮日而矚眺徘徊徬徨顧懷而不能去又恒必賦詩相與唱和酣歌以發其感慨而纏綿其悲嘯夫古之大夫取其登高能賦而懷古之士必於是稽之乃鄭子之賢達觀於萬物窮源於性命則有出於登高懷古之外者矣矧足喻其詞翰之羙乎雖然詞翰者所以見志也傳信者所以砭俗也彼齪齪者得是而詠之又烏覩其不浩浩者耶慶愼子得子序愼子之舉子也同黨之俊髦相與悅豫抱熊羆之豐兆持弧矢之棻器比圭璋之休德以薦幣帛之好以合慶辭於是沈子載爵而興曰愼子於是乎可以慶矣夫慶禮之重者三而冠昏不與焉得年而慶所以樂壽考也得爵而慶所以加志也得子而慶者所以重嗣續也道莫大乎嗣續簠簋不珍君子燕之故古者男子生而謁於廟陳俎豆之容歌生民之詩祭用少牢乃以男子升於席端食以粢盛被以遺衣以為嗣續成則蒸嘗無廢而以其宗嗣之故也其為宗族也以暨鄉黨朋友亦莫不宴且樂之宗族之樂者樂其孝也鄉黨之樂者樂其義也朋友之樂者樂其有仁也孝義而能仁可以有後矣慎子雍揚夷雅被禮義而佩詩書率以所響足以嫓是三德而又承以奕世之澤發以方升之光萃以川輿之秀綿以文理之緒如是而有子宜不廢慶而况嗣續之道古之所重者哉故慎子之燕不得為靡而諸髦士之薦不得為渝禮矣諸髦曰君子之言義則毖於鐘鼔而又奚以熊羆弧矢珪璋幣帛之為然加其始必懿其終要其福必彚其從揄揚之既卒也斯何以祝之於是沈子續生民而登歌曰擊鼔湯湯其泣喤喤鞠之育之其頎其康其頎其康穆哉蒸嘗再歌曰吉月良辰日維以生君子令德以莫不昌爾福禄之茀相考無疆卒歌曰吉事維熙其來孔多被羙好爵君子是縻又曰壽考燕樂如之何詡兮詡兮以莫不庶兮於是歌之三終舞之三成反爵致辭稱禮而後已焉贈戴將軍漕運序將軍被甲承胄率校士數十人卒三千餘擢樓船漕運軍儲粟米十餘萬斛由㑹通河直逹都城數千里而囷廩無狼戾之粒什伍罄壼漿之歡洋洋乎將協鼔吹而歌載金石而頌也豈不盛哉於是民部嘉其亷平督府紀其勞勣既其還也縉紳逢掖之士又相與揖讓而贊嘆之羙其尚文而服武處乎諏而懷遠猷也沈子曰古所謂將帥之明畧者豈獨矢石之間乎余於戴將軍徴之矣昔三代之選其育材也同方其舉士也齊術征伐禮樂無所分而至於兎罝之徒足以干城采樵之夫足以謀國豈其習成於妙算更事文墨之際乎其道貫則其機㑹足以相通其源本一則其枝流無二也余讀漢任宏所述兵法諸書喟然異之然未嘗不恨其說之延蔓博而寡要勞而少功夫揚威不在乎擊斷而服逺不在乎誅討設機不因乎戰陣成功不係乎凱旋折衝樽俎之間制勝帷幄之内何必梁麗然後攻城洞黄以當逺哉將軍囊槖典籍不採一錢此與古之將租不入幕府者併肩矣而威嚴不弛慈惠先之所謂一言被下而三軍懷挾纊之仁者非耶乃復甲士三千貫魚而受約樓船百斛駢踵而西馳嘉績茂昭而頌聲大作此其與將帥之成功又何以異者方今邊境驛騷套冦竊發詔書且數下求將帥矣夫寳劍以試縷然後可以割犀鳬矢以穿楊然後可以貫石以將軍之畧如此豈獨稱嘉米鹽之書紀勞飛輓之地乎二三執政行且運籌發䇿聖明天子奮斧鉞之誅封狼居之山繫賢王之頸以勒燕然之石乘時以立勲席運以章德者夫亦有恒軌哉將使聲名昭於鼎彞光華宣於竹帛固可立而候矣贈祝君新居序余緬想古巢居之世何寥廓也哉既以人文之交錯棟宇之制既備而臺榭之室煩興剖劂精於化工彫華縟於繪事於是土木文繡之譏發而匠作之禁行焉乃若人倫之揖讓衣冠几筵琴瑟之攸錯惟其欂櫓修而後登降舉則家室者是禮樂之所以成其何可廢之詩曰定之方中作于楚宫揆之以日作于楚室夫陰陽之𣺌而彼泉流也風人何取焉夫衛公之能振其光烈而禮樂之將興非耶余結姻於鳳山而鳳山暨古峯君為金石交余以是知古峯君之賢而君之父某君又賢於是率其諸子新營第宅親交賔黨將修辭令而往頌禱之此亦古之道也余髙古人之風見四方璠璵瑰瑋之士則願傾葢交歡之又往往於賔友間聞君倜儻精微容與於俊髦魁梧逢掖而其文藻之選邁有足稱其意氣余固時時願往候之而君亦不鄙余之固陋過從里閈語移日而不厭固知君心之所向往將頡頏雲霄之上揚厯燕秦之舊壘抽筆過乎三都慿軾經乎許下而不止於田舍之間也乃若楨幹之壯麗甍飛之崔嵬世之人猶然羡之而哲人高士亦固日憂俎豆之無所葢藏車馬之莫旋而不免乎崇飾斧斤恢𢎞其宅宇由是禮樂載興而玉帛弦頌交辟乎其中然後豪彦争馳於四域而聲名光昭惠澤逺施德成於天壤功勒於後世然則室家之修明豈獨在於桑弧蓬矢之後乎故夫君父子之心有光於衛公而諸君之頌禱亦庻㡬得風人之義矣余愧夫齪齪者以為懷居安土示熒熒於土木而不察夫鴻鵠之志者因是著篇焉壽火孺人六十頌并序余友李直夫客維揚余以是得聞文津君與其從子周卿元卿之賢余信直夫之重質且多藻才相從過頓丘直夫出盛大卿所謂火孺人壽篇屬余踵其意重為之頌火孺人周卿元卿之母氏而文峯君之配文峯君文津君之弟也余赴選部時道出維揚又間得與周卿元卿遊余詎能無言哉余讀劉向烈女傳至姜后之脫簮永巷以諫宣王也為撫巻而太息宣王中興之羙昭明乎日月至於車攻吉日方叔召虎之徒翺翔皇路而誕布於四海藹藹乎盛矣原其本始於房闥之間而閨帷之際也暨春秋以來若冀缺饁田致譽樂羊斷機成業薛宣挽車耀羙而梁鴻以舉案揚名皆有淑懿之婦愼修而翊贊之而後數君子之徳誼宣於閭里光輝著乎方域然後知室家者昭著之原也簮珥者冠纓之範也綢繆不飾則鞞琫不莊輜軿不矜則輅車不肅婦道之顯融譬之乎九鼎㡬其重矣而世有鴻筆鉅藻之士多揚勵乎外庭而率畧乎中饋摽明俊髦而希聲乎燕婉是以哲婦之風烈鮮聞焉余覽盛大卿之文夷考夫人之行而知火氏之所以興也其言夙夜兢兢之節昭矣其相文峯君砥礪文義而克昌乎家道母儀諸子皆明習詩禮而周卿元卿風義恢恢又能佐其伯父文津君章明其閥閲而火氏之聲光彌著謂非夫人之賢有以相助之於其先而表儀之於後其克然乎琴瑟之音不調則鐘鼔之聲不得宣越蘭蕙之芳不烈則荆棘不除物性固如此矣夫人踰春秋六十而率履若朝夕福祉榮乎晩節而華曜結於末路縉紳先生又為之發揚其盛羙而登諸黼黻將與古之淑妻賢媛克贊君子之義而章羙其家國者比潔而並傳藉令其德之不備而辭之不可繼也疇能為之哉然後知婦道之重而夫人之頌之不可已也頌曰蘭之榮矣其蕙其馨孰云哲婦而不成城閨閤濳曜庭宇孔芳抱質而老靡雪靡霜瞻彼日月其烈彌揚下壽臻矣上壽用將德之嬋嫣家室明光贈王龍山五十序王先生客遊京師數年既通籍於太醫氏比今年且五十若某月日是懸弧之辰所與同遊諸君子謀為之舉觴稱壽而徴言於余余惟王先生之意思忱忱乎賢哉固宜稱之壽云余固好賢居有才人賢士則聞流風而太息覩色澤而踟躕不遑飲食寢寐願與翺翔上下其間誠發於中心而不自知其故余夙知王先生之賢惟好之與之往來不下數十年既熟覩其為人而聞其論議彬彬乎是雅達君子也則又重為之太息而踟躕曰世有若人俾仕不通於其志位不稱於其才而徘徊蹇連不得脱迹於風雲之上豈獨是命乎哉若古昔賢豪瑰博之士懷志等於金石噴氣薄於江河精明貫於日月不遇知己﨑嶇於險阻沉寞於下等斂文抑華與流俗者伍誠何可勝數也乃於今悲之或曰王先生學不為章句仕不為榮達其客京師亦將遊觀都邑之羙厯覽文章之盛頗發其幽沉慷慨之㮣終京去而江海居何必金馬玉堂然後為適也余曰馬不為千里之馳而伯樂從之不釋玉不為珪璋之飾而和氏寳之不遺士不為必聞於人而知已者睠睠不已天之生美才令質固曰於世用之豈獨有輝光隱於昧奥聲嚮沉於淵泉已乎王先生非獨其賢之足尚固多材藝暇時流觀於典籍聆覽於篇圖至其所得與其憤憤之懷各精能於吟詠翰墨繪畫之間又非獨擅岐氏之業而已若兹者自當俾之驅馳王路輝飾盛時而一展其能猷既不為過而一太醫氏之職槩其羙可不太息於知賢好士者哉故子能發機於衛霍曼倩感慨於儀秦揚雄幽憤於𤣥經退之羡榮於二鳥是則用不用者才也遇不遇者命也知不知者人也於王先生誠何憾焉兹足以揚厯諸君子之雅矣諸君子曰古稱百金以為酬千金以為壽王先生之賢鬱鬱而子且耀之何以千金為榮吾且以吾子之言稱焉王先生名萬春字子久世居山陰之王家湗其尊君名榮字世榮雅尚於鄉邑乃其賢有自云送常州焦别駕考績歌詩序常别駕焦公將以考績上天官而郡邑之士大夫為歌詩贈之宜興進士湯君屬其事於余為序余入境觀常之風俗又讀諸大夫之歌詩而知公之績遒羙矣昔者商周之際乗軒車而仕者其時冠裳皆有成紀長貳叅輔皆有成職金穀師賔皆有成度歲月旬時咸有成要君子率皆守職因循奉憲掌職無所改轍施令以張羙姓號於四方以炫爚百氏之耳目以逞竒衺之跡而令德懿道不言而入於民心者無為而自然如雨露之膏於萬物也如喬木之蔭久而恩澤布矣於是乎有街衢之謡輿校之頌於其徃來征行之際又有大夫士贈送之什於是諸侯陳之天子采之而百官之令績章焉公之參於常見諸守其攝於宜興也無所改於其令而大夫士之頌羙咸輯焉知其不言而入於民之心者深也夫績也者假絲縷為言也考者徴諸其實行也故官師之績譬如絲縷然日積於民心然後為績乃若稽時日之程累米塩之數鈎朱墨之故計胥吏之言此具文矣乎不可以徴焉者也然則何徴徴諸其歌詩已矣夫民心之藴積動而為咨嗟形而為頌羙發而為歌詩傳而為金石乃今觀諸士大夫之歌詩洋洋乎濟濟乎皆嘉樹之咏羔羊之風義聲仁澤流被乎篇籍夫令譽不率成羙言不虚襲衆好不佞得嘉禮不妄招然則公之令績不懋著矣乎公為政之年無所受獨受諸大夫之歌詩嗚呼此其為歌詩徴矣送鍾少府赴黄陂序曩余令溧陽識未菴君余既改令他邑者再今又以薄宦遊京師君歲時訊問不絶知君之篤故舊不忘人倫也君舊以三舍生釋褐為長沙縣簿被服去服闋謁選補黄陂過從道别索余贈言余詎能無言贈之哉雖然余何以贈之余自惟束髪讀書以至於今未有聞者徃徃竊伏而思之以為人之生在義義當於人心則從義不當於人心則否夫吹竹彈絲敲金戞石非獨其宫商中音疾徐應節取適於耳也乃其憂苦悲思必有義存故能令聞者惕然動心而况其大者乎孔子曰君子之仕也行其義也夫君臣其大焉者乃其細故米鹽簿書拜迎鞭撻猥𤨏而齷齪又孰非義世之仕者大官則據高位而為邪小官則靡靡不振效為䑕竊其畏縮甚矣曷由明義而達道乎君之往為黄陂也無若是靡靡者君之篤故舊不忘於人倫其於義甚昭昭也其才足任然欲君之明其大者其在上者有好義者我則盡誠而事之竭股肱之力而奔走之其有所建立猶諸家之為之者我則樂之也有悖義而行者我不失其節免禍而已不能為之使也今之為郡縣者無㡬為上官之役徒矣為上者居然役之而不讓為下者甘心役之而無所辭夫為郡縣與之併肩而為王臣安能為之役哉記曰其驕大人也常以浩浩推此又其細可知矣非君之篤於義余曷為是推明之若榮華其辭説取適於人之耳目而不悅於心亦非贈言之義也送沈江村使君入覲序後世之學士大夫論南面之道者每發憤於古封建之難而茅土自紆也夫指掌論事至攘臂慷慨徒追軼先王之遺風若獵雲霧然豈不見謂迂濶不根者哉然世之守宰奉檄而為政對百姓若賔旅視官府如傳舍莫有矢心精白為朝廷當事者則以分土之寄不專而典籍不長也嗟乎使天下之為守宰者皆如使君之在郡則不封建何害焉夫國家之於官司百吏星區而林立各有分職焉分職盡而無覬覦之心則功校得而名譽章矣使君以刑曹郎受命而守兹土始至則延縉紳而布進於庭而問之繼之以思惟濟之以法令而校逢掖以文喻介胄以武未明而披衣夜分而解帶操符按牒日月其靡閒晏焉於是誠心内開而公道外布下車廓然久而彌昭百物叙其章程四境安其封樹而三農秩其黍稷天應以時雨地湧以流泉而民動以歌謡此其竭於職事大昭明顯融者乃若鞭朴之靡峻壼漿之不入於使君又何稱焉何哉以其心懸百姓而誠著乎國家也此豈不知分土之不專耶而矢心精白如此雖古之諸侯何以加之矣故曰天下之為守宰皆如使君則不封建可也今者入覲之期将束圖籍而就道予㑹之羣寮曰使君之行余黨不可以無言而屬余序其意如此嗟乎如使君者可以入覲矣送周橫山大尹考績序先民之言曰學於古訓所以有獲也至於懸令以從政葢不能廢典籍焉是以懷志負奇驅馳四方之士未嘗不枕席六藝衣被於百氏詠歌先王之風發憤經世之畧而遊覽八極之表蓄積而思微識深而慮逺然後以臨民出憲也若素錬而夙成取其懷抱而麾以與天下是故其光猷駿發而鴻業日新者固學術之流裔而德義之所昭爚也昔者子産布譽於南鄭言偃宣歌於武城文翁振言於蜀郡韓愈廣校於潮陽皆其英華鉅麗有以潤色於政事而發藻於元元文敎之大洽耳横山使君少有英聲奮起於三呉躬覽載籍俯仰宇宙之内彬彬鴻博之君子也登進士第出宰山陰山陰稱文物之邑山川之襟帶宇觀之縈組而章縫之士煥然以氣色相尚惟使君入按符篆董租賦出載圖籍與諸彦揖讓鬱然風聲之流四境争向其蒞事不煩而獄訟寖息鞭笞不行夫山陰本號易治而使君又綏之以文敎宣之以德義與古之賢豪相望於千載之上下豈非海内之名宰而循良之異等者哉於是知學之於政事要領矣使君之考績行余黨將屬言以送之然而計使君嘉績之不勝書也而敘其大意於此鄧玉亭文集前序玉亭公翩翩綰綬判吾越臨聽之暇則據案諷誦抽筆而歌詠有古君子之風焉其所著記序論歌詩殆十餘萬言邑博陳君率諸逢掖之士將摭次之而屬余說其意余於文辭之道固心嚮徃焉乃古之君子則非獨其言之崇飾也其心造乎道研究禮樂之精微感慨時事之得失考覽載記遊冶於風雅日月藴蒸而累積至於有所遭遇若水之波横流噴薄發揮於毫素之間此豈曜色澤於羙觀希聲於逖聽哉本夫義博而㫖深情徃意隨沛乎自然達之乎不得已形之乎論議而宣之乎詠歌由是著之竹帛則明白而光輝發之管弦則風流而洞達令聲布昭矣後世之學士詞人要領失據不明夫禮義之崇本而流連音響之末炫爚榮華之際苟以漁獵名字縈迴於耳目而已此於道術何取焉乃使篤厚之流以為比興之謭薄而鉛槧可廢而不知簡書之用固流並於山河辭命之發越而禮樂之所以興如之何其廢之故夫文辭非劣也謂其不出於道不可也余讀玉亭公之文大之泛濫乎千言小之飄揺乎數詞皆傷今思古生於其不得志而出於其隱憂至其温厚以為之風和平以為之節有若揖讓古人而㱆欷之者不煩於繩削而不踰於矩度有漢魏之流風者與流水之洋洋必有源泉鴻鵠高翔而獨舉其志意逺也謂公之有得於道非耶詩曰吉甫作頌穆如清風夫惟文武之吉甫而清風形於歌頌俾公之馳騖於文辭凋傷大雅而與學士争能則公之志意衰矣余獨以為有合於己而悲之故余厭世之繁縟葢徃徃思卧而於公之文獨諄諄焉送許近山使君考績序方今之時綰符而被綬仕宦為守令累日計時以至於三歲考績豈亦非難也哉余覽昔之官儀葢燦然可考焉漢興法制疏濶使者以六條按二千石而二千石得檢察縣令如是而已而其時風俗渾龎淳厚斵彫為樸民庶喁喁然有攀車擁道荷戴其官師之意是以為守宰者秉法以從政率其意而行之文篆不煩而檄書相諭夏革靡崇而租賦之鏹不絶也乃今不然監臨刺舉之司並馳而錯發官府煩於次舍法令密於秋荼昨是而今非甲行而乙改其孰從而信之甚者以屬寮為私黨以郡邑為下秩繩墨其壼漿道里以程勤惰有拂意者則曰若為官顧於我獨無禮耳於是憎惡起而謫譴行傳曰守令者民之師帥也師帥而或撓之可乎百姓見其然不知守令之尊固與當塗之卿矢心戮力並為王臣而云實有軒輊遂側目之有拂其意者則曰若為官顧於我獨無恩耳於是怨讟起而謗毁興矣如此則守令者不能以朝夕而况於三載乎近山使君射䇿高等與余為同年友出宰兹邑余一見信而喜之既乃攄以明哲之心布以忠信之德加之以操履之不貳而才藻殊倫上下之人喟然而稱服者彬彬矣然而有不信者若余所云二者之難為公亦無所奪也夫操守官職在我順辭逆令在人而君之瑰珸廣博處交錯澆漓之㑹偏迫之中而能自㧞於泥塗之上日月之表不為異同者之所動揺久而交信之豈非車異之賢軼羣之彦與古之循良者等耶乃今三載上計車馬陳矣大夫之艱難䟦履非一朝夕之憂而寮友縉紳韋布之心慨然其不置也於是㑹稽之士大夫相率送之屬余言贈之余歎息使君之賢而固重發憤於今之守令之難為也為之序贈袁節推考績序定山公之以考績行也總戎戴翔海君過余曰古之人言富者贈人以財仁者贈人以言如定山公者贈之以金則辭贈之以言則受余黨之德公也微君之言蔑以贈之矣嗟乎余之言何以贈之哉余惟公之不忘於兹土也夫君子之服官從政莫難於其筮仕之日釋褐而受之操牒而從之簿竹之委積而檄書横至耳目有所未嘗經與其平生所未嘗渉者固莫不欲中繩而應節履道而通俗將君子於是觀而小人於是望又况於地有交錯而時之有險難乎在越之風聲多覬利而自營縁物而遷轉惠之所及則懷法之所施則畏德之則馨香發怨之則荆棘生傷夫風俗之移人而私心爛然譬之於琴瑟必以道如商宫之弦錯置而並發其孰能調之而公以弱冠之年射䇿高等出掌刑獄之司以弼方牧之職吏之籍交馳援筆而斷若懸河而注之也靡不率服焉懸之以純白之守昭之以絶敏之才而公之持操葢未嘗不兢兢已所以俾圜土無滯囚胥吏無遺令而閭巷無寃民者豈有他術也哉以精㣲之思投劇難之中乘初試之時而成是休嘉之績其孰能忘之俾公之不忘之也其在他日為材御史為名卿為賢相固不必改弦而移轍奪規矩而易準繩天下之䝉福膺祉者衆矣何越之難為管敬仲願公之不忘帶鈎臣之不忘檻車也夫帶鈎之與檻車猶之其不忘而况於服官之土乎翔海君曰然哉越之不忘而又奚忘於余黨願書之以贈公從者送袁節推考績序士大夫剖符從政敡厯日月俾冠葢里巷田野之民争羡慕之而不忍忘者豈非其惠澤之昭著而明德之徴曜乎古之君子正襟以端已慎令以行之徒以不失人心以洋溢其教化光宣其令譽是以望其容儀而敬承之聞其聲名而歆艷之來則争迓之去則争送之此不能飾觀矯聽以阿逢其私好由其中心之懿羙而肝膈之感歟記曰士或遮道而願留攀轅而不釋或留犢以見愛或操表以從之然後足以軾嘉令而著逺猷否則嚴威以夏革峻文以鈎鉅非不儼然畏服及其去也若霜霰之遇風日渙然離析矣余郡推袁使君之蒞吾越束帶而視事庭宇肅然懷私望幸者股慄而退縮含寃茹苦者不言而昭露片辭發口而羣噪奪魄垂墨在牒而舞文之吏束筆也是以不出堂序而亷平之化布於窮谷使者争薦揚之以為啓事之榮縉紳先生争談頌之以相慶慰百姓争歌謡之以共嬉遊今使君之以上計行也莫不愁思争期出送之余親聞之士大夫之言曰仕宦而離兹土而人心翕然動揺若此者惟袁使君一人耳以此而比之古之君子是耶非耶余邑令君又以書來屬余曰余辱使君之清風以無負於兹百姓今使君之行其能釋然於車轍乎願為我一言以告從者乃余感於人心而著論之若此云送張石洲入覲序余邑令石洲使君之將入覲也余姻友胡仕東甫束書屬余曰使君之戒車馬也縉紳大夫餽玉帛以書致慇勤不敢達於外庭父老遮道攀援願遺一錢而不受然則䝉被恩澤不㡬無階以上答乎惟幸為余屬文辭以獻諸行李余考圖牒將論述徃代之與當今其有卓異之政德澤傳於遺老故事載於銘碣而名字並於山河葢如晨星然至㑹稽開邑自唐被組綬臨民者不知其㡬而循良之名映照千載惟李曾二人然而徃蹟茫然有如墜霧其所存於簡書者亦又㡬何余不知其德澤之於民其於今使君之為政何如也余歴五雲諸山棹出若耶溪上親聞之父老之言曰自生髪以來見惠政動於山川而仁澤加於愚民者惟今使君一人耳然則稱卓異之政章明於撰述上功於計府無踰於使君矣使君之為政非有科條之繁密而禁令之苛察視民如子援帶而撫摩之民憂之則憂民樂之則樂其心在於為民其道在於為己如是而已耳詩曰愷悌君子民之父母夫愷悌者豈人之所不能哉心營夫室家則志遺乎邦國意篤乎妻妾而恩奪於元元使君惟無私圖於已是以有誠愛於民羙功盛烈風動於海宇烏得不謂之卓異乎哉遂以是而復諸仕東甫東甫曰斯言也非但以獻諸使君之行李而已送周明府入覲序書之言允恭克讓昭明矣恭言允讓言克言以其篤誠之心而布光明之德洞達無内外也後世之以守令循良著聞於史牒者徃徃而是然率多皎皎潤色於廣庭之中修明簡牘之上而中心不然甚者澆偽日滋亷隅充斥算計沉密馳騖於利害毁譽之間而體國愛民之心茫然如渉烟霧飄揺而不切於是蒲鞭涕泣以示寛和敝車羸馬以徼亷潔薄故捐親以露公道鈎鉅設伏以見才明昭昭然真若揭日月而行星辰百姓亦莫不目覩而指數然而有道者恒竊疑之余於是低囘於今使君之為政軼於古之循良又多也其中心之深切優於彼文貌之繁縟故也詩曰愷悌君子民之父母管子曰聖人者貴夜行者也夫操心以自營而飾觀於白晝欺民如嬰兒而不顧國家之任托者此與盗賊何異焉使君則誠痛乎彼而快於此此其故何也使君非為爵禄而仕宦非為聲名而潔修受命以來則若重負之在肩背也其視百姓則若赤子也視逢掖之士則若其子弟也視縉紳寮位則若其昆弟朋友也其肫肫朝夕而圖維者惟其功之是飭而禍之是防惟其罪之是憂而善之是導若營家室然其勤民夙夜出於其性而行乎其不得已進不求譽退不避毁出不邀利入不防害其自為計則疎於秋林矣然而聲名以光昭而福履日崇所謂寛和而亷潔公道才明使君備之而使君不自知也風雨調於嘉榖山川效於俊民功烈載於道路而使君不自以為竒也可謂誠至而道篤矣此其為愷悌君子者非耶懸法以臨民者不為此而為彼又何也嗟乎此與古之稱述者殊矣使君將入覲諸生褚効良等屬於余願為一言以獻使君之行李也余曰子之義則然而余之言不謬可矣若崇禮以侈觀羙辭以徼衆又非使君之所樂聞者歟贈峯泉馬大夫還東魯序余少讀書於世道興衰及士大夫智愚賢不肖之際未嘗不留意覽觀深思其故云是以稍稍得其梗概雖心術之密微殆可以得之於千里之外矣今之汚壞世道者不過二三人而其流風餘習足以鼔盪一世其立心最薄而其操術為最邪也示之以奉諛之路道之以自便之私自中人以下少無骨鯁未有不雲從而霧靡者故其未事之時某人賢可以知其必去某人不肖可以知其必留以其心之有相違順意之有便不便故也然則余鄉之諸君子於峯泉大夫之行當以為榮不當以為辱大夫産中州發賢科魁梧碩大謇謇諤諤視當世之士鮮足以當其心者其始至郡進諸生而訓之曰若等為學從仕當以古之賢豪自期無若今之若人今之若人其所指斥皆當世之顯融宦達者於是當路之人切齒矣余獨聞而心壯之及為郡專事擊强刓弊以撫綏疲民不以一毫之財貨徇於當道况可自為其囊槖者余以為大夫之風誼當以夷齊比論其不能容於今之時必矣已而人竟擠之而去城守李君鄉大夫及太學生蘓葛諸生托於弟子李思得以書幣屬余為文贈之余曰大夫之行光明於日月而僕之文辭竊自比於春秋微諸君子之言僕且黽勉為之矣而况於嘉命乎序之如此云送别駕􅓳濵劉君考績序記曰大司馬辨論官材書曰三載考績夫考績之與論官異矣論官語其心術之邪正考績記其功庸之多寡然惟有道者能知之自秦漢而下政理衰而官方敝學士大夫之出處莫有通於君臣之義其視詩書記載之言曾不比於絲竹之悦人耳也日夕之所持論皆不過全軀保妻子奉頭鼠竄者之所為極其所往遂至於欺君父若嬰兒殺生民如草菅僴然自以為得計而人莫予知也殊不知自高明者觀之譬若日月心術之壞至於糜爛天地凋落萬物有何功庸之有耶故夫有豪傑之士能奮然於百世之下以是而知􅓳濵君之於考績之為難也余以言事謫邊陲且三載每闔户不欲見長官及聞􅓳濵君之風烈所願握手論交而恐不得焉班孟堅曰痛乎風俗之移人也黄金之貴貴於泥沙松栢之貞貞於桃李言植之不易也君以僉判之官當錢榖之任而處於邊境驛騷之時固非不知流俗之遷轉而抱其體國憂民之具融雍而行之屹然如磐石縉紳先生語亷明之吏者非􅓳濵君無稱云非其心術之正不可得而亂烏覩其難之若彼易之若此所謂豪傑之士奮然於百世之下者非耶故聞君之政不言而陰化者多矣此其為績豈特簿書米鹽之間而已哉叅軍毫水君與余為金石交因君之將以考績行而屬予文以為贈余固不辭而序之亦惟毫水君知余言之非諛也贈馮叅軍學道序青霞子之謫居於保安也進二三子而講學焉青霞子之言曰二三子之謂道也何居高明而覆者天也故知人之謂知博厚而載者地也故愛人之謂仁仁固周於天下而有等知故别於萬物而無方然則闇而不分者流於愚隘而不溥者陷於不肖其必小人為之也小人者之於天地逆矣君子順天地而與天地俱昌小人逆天地而自取滅亡使後世而有作也舍孔孟何之矣二三子既有聞於是學者日歸焉北橋子於叅軍繘井以救陷散粥以賑饑有愛人之仁二焉青霞子亟稱之於是北橋子贄而學道於青霞子二三子曰某子之賢也夫子之所珍也而又知來學不將揚勵之乎青霞子曰然今夫仕者之以為無用於學也其於上官也諂諛以為能其於下官也掊克以為事其聞人之為善也方且逌然笑之流汚下而習鄙俗聖賢之言益逺而無聞究其所往將日入於滅亡而不能返也豈不哀哉北橋子志定而氣和有學道之才質直而好義有學道之器居官而任職有學道之資故曰君子學道則愛人又曰一日克己復禮天下歸仁焉充北橋子之志日與就而月與將由是功立於當年名垂於後世而富貴壽考軼出於等倫其與今之仕者逺矣烏在其官卑而禄薄哉昔者老子仕於柱史而學慈儉莊子仕於園吏而學清虛荀卿仕於邑令而學王道故君子之仕也所以為學也非以章服也學也所以為仕也非以呫嗶也求仁而得仁天地照焉萬民服焉克念焉而已矣是故法象莫大乎天地立極莫大乎聖人垂訓莫明乎孔孟體道莫先於愛人愛人莫切於從仕從仕莫先於致知致知力行窮神知化莫大乎克念書曰克念作聖此之謂也陳氏族譜序余行方域之内見衣冠之士輙考問其世胄云夫昔君子之造家浚明基緒也莫不欲流布於奕世昭明於四海然使嗣續之弗振而典法不修聲名文物墜如雲霧將安所覽觀焉故家之譜牒等於國之記載所以標揚先業而垂信後裔譬之水道之源委紀之圖經將沿流而可得曾復漫漶離析之憂乎顧自周以來雖有氏族之志而其書不傳至唐中葉有之如敘述崔李諸族不過追其賜姓之源紀其著望之大者若所謂譜牒則往往又起於後世祖軼而為之其流滅而不傳者亦多矣豈不惜哉孔子曰文獻不足徴也乃余讀陳氏族譜而有感焉夫陳氏之先始於虞思而其後流散於天下其世系豈能具一二疏明之今之譜則自藎齋君據宣德舊草而增定之者乃其述金紫公療康妃之疾愈承恩賜宫扇事甚焴爚後世之子孫因遂刻木記之錢塘之陳氏實權輿於此矣故縉紳韋布里巷之人咸稱之曰陳木扇云葢以其近世擅專門之業其名譽光照而嗣續之賢又能修其典記故撰述之如此若自唐以前則藎齋君雖欲一二具疏明之有不可得也余嘗及見藎齋君其衣冠言貌彬彬然博雅君子也其醫術能奮九世之遺烈恢明廓大之著書見於諸家乃又為此譜什襲而藏之斯亦以竒矣昔子雲述揚侯之績孟氏紀豕韋之功而馬遷追周室之軼皆發明其先胄俾其姓字懸諸日月有不滅之光曜然則如藎齋君之推明宫扇以章鴻藻斯豈獨里黨之賢豪而已哉君以其子􅀈賢命嗣守之而􅀈從余遊余為序其大較如此刻五花判語序五花判語者山陰陸君子健之所撰次也觀古典禮於讀法之際詳矣大者以歲其次以時以日夫先王之心固昭昭象魏之設而孜孜於族黨之訓者何也非曰疏文以尚弼捐德義而任刑誅也所以敎導乎百姓者不可得而置與敎之以禮而俾民知從敎之以刑而俾民知禁世率疑晉鑄刑書而孔子譏之以為政理之本在寛而科條之未可廢不知聖人之意徒恐流辟滯於金石鞭笞束於文字而民不知變也然則學士詞人考覽於載籍而不通乎法律之意亦㡬於墻面矣隋唐以來置律學又斷獄者多為判辭以剖析疑獄決定名法而本朝乃以校士於是陸君採集諸髦俊之所作而撰以成篇夫學於政而入官習於法而知道余固以為得乎先王之遺言而有取焉乃若道以博成辭不以寡廢而况於示民乎故非引類不足以徴大義非比偶不足以成令辭非章法不足以蔽名罪觀於兹篇而三者備矣宜刻之以傳學者陸君子健名乾元博綜有才藻其聲稱著於黌校間暨余有姻連云送朱縣丞赴尤溪序余表弟北橋朱子候選曹者數年今得除為尤溪縣丞將行問計於余何以丞尤溪者余詎知尤溪之所以而告之其道乎哉昔人之言曰一年之計在於樹穀十年之計在於樹木終身之計在於樹人皆詡張其辭説以為名言讜論可以服行而有餘播流於無極余以為不然人皆貴自樹也夫托根蓁莽之間振起山林之表至於枝葉扶疏參青霄而蔽白日物莫能禦之者草木猶然而况於人乎故古之君子其生而飲食居處與百姓同及其久也德澤加於海内功名流於千載豈其夙行稟受若是哉其所以自樹於人者異也能自樹而後可以樹人不能自樹者人將仆之矣如之何其樹人也哉夫自布衣起家而為丞裒衣束帶矜莊堂序之上百里之民瞿然而望之此其於樹立必非碌碌者矣余知子之心不以其丞自足也則固不以官府為營家之資而汲汲於妻孥者國家張設官師以其赤子而付之撫摩之而人固惟其妻孥之是恤此其於中心忍乎哉然後上賤而下慢之矣上賤而下慢之則仆之者至矣然則非人仆之自仆之也君子固懼夫人之賤且慢乎我也而自尊且貴之自尊且貴之者則莫如不以家自營而盡其心於民事拒絶苞苴之門而垂意於鞭笞之際上下之人莫不凜然重之矣然後德澤流而功名章雖欲以丞自足豈可得乎此其為營家之道固有大於彼者故能自樹則抱關之徒榮於柱國不能自樹則公卿之貴不如匹夫朱子少窮經能達於世務者必以余言為可服也送朱梅泉赴東鄉縣博序太史公曰余讀功令至廣勵學官之路未嘗不廢書而嘆也葢余亦然夫學官博士官不至軒輿禄不踰百石周旋俎豆之際而躡足黌序之間其修明怠弛算効而計功離於民事遠矣而天子以陳諸詔令學士大夫之所以搤腕而太息者何哉夫人之薄識淺見謂學校之疎於郡縣官司之散於守令而章縫之士之不如耒耜之徒也而不知先王之意微農夫之在猷畝手足之胼胝而耳目之不精明也何以率導哉故學校者先王之所以導民之耳目也班固敘述儒林傳其所著記大率多明於經術居博士之官其時博士如髙堂生夏侯父子鄭𤣥孔安國之徒弟子率數千人鼔篋而問道用能至大官名秩建著勲業而諸公亦名聲垂於竹帛赫然至今可謂光榮矣何則庠序之尊而校官之分置重也梅泉先生余鄉之篤行有道君子也弱冠明春秋敎授於鄉四方之來學業者戸外之屨滿焉顧久不第以歲貢士赴京師迺領鄉薦乞恩為學職於是將赴東鄉也諸所遨遊縉紳冠帶之流相與出而餞之或為先生不滿余固惜先生之别而樂先生之有兹行也夫豫章之材不必以建明堂施宗廟然後能盡其用驊騮緑耳之馬不必厯險阻馳峻坂然後能致千里也士固有遇不遇然遇而驕凌不如不遇而震奮况未為非遇者哉弦琴而諷誦鋒鏑之端消弭於道路揖讓之雍容五官之政令從之而順序校官分置之重亦以昭明矣先生之往東鄉也諸弟子釋菜而後見鴈集魚貫朝而升諸堂序之間相與研六藝之指歸究三墳之大道極天人之分際顯皇王之正誼令典章而道業煥然光明如日月之在霄漢由是風敎行於諸俗羣材顯於大庭珪璋令猷而顯飾王路民事之要領孰大於此則先生之功名節槩固且與游夏並驅况孔安國之徒哉夫不易時而進德者志義之士也不越位而成名者通達之材也詩曰多士克生王國之楨惟先生㡬之矣壽趙孺人七十序詩言采蘋采蘩其詠婦人之德昭著矣夫蔓草之道不逺傾筐之職易為而歌謡之不置者風人何取焉淑媛之德不縟於典禮而閨門之化不出於里巷能勞於祭祀而勤於家室斯已矣故丈夫之業恒患其不足而婦人之操則患其有餘何也鐘鼓之音欲其響越而琴瑟之音不能及於外户令絲聲之踰於金革則聞者不已怪乎余讀劉向列女傳而疑之向所載如無鹽之事皆渉浮誕不近於矩度令後世簪珥珮玉者希艷於此是内外之道已離而王化之基壞也然則趙孺人之賢勤儉而慈愛與詩書之所稱何以異焉而古之人則傳今之人則否豈誠婦人之道有所炫爚而瑰琦如劉向之記述者哉孺人之德不言而喻於家室而黄髪鯢齒安有髦期之壽鮮衣羙食享其子孫之奉此誠非有竒異之名而術算之選固自然之徴應福履之所成也乃今年七十矣而某曰為其誕辰朝値婚姻黨里之家相率為束帛壽之余同年友禹衡陳君以書屬余曰孺人克相其夫簡齋君已有簪組於王國能訓其子其伯能飭其庭宇不墜其家聲其仲發藻儒林被薦為國家髦士斯以難矣宜托諸簡書以宣揚其光耀與余仲氏思渚君嘗遨遊余固心異其風標當翔萬里而立偉業於國家者不辭而為文以祝之如此云送文使君入覲序秦漢以來罷侯置守矣乃方域而授宰自春秋有之如宓子巫馬子阿之倫其輝光奕然昭爛於史牒若觀日月也至後世起官儀始易以令又易以尹名實與古之稱宰無異然則縣令之官其綰符被組古今不殊而今之宣猷布化得民甚難者何也兩漢書記敘述循良之傳率多二千石以令著者自魯恭卓茂之外不能一二指數豈固階級之未崇聲名散軼耶夫天下之金穀車馬期㑹簿書皆倚集於鄉里之民而當塗發憲者意恒與之殊異寧獨意之如此哉將法亦然矣租稅之供與犯科條者不能不治之鞭笞恩惠未崇而怨咨易集色康和燕壼漿而使之則威令不樹而姦軌生故曰良劍出於歐冶以試玉石如斷縷然至盤錯之處不能不紆徐而後入驥馬日千里追及風電遇羊腸之塗九折之坂葢垂轡而能進事固有難有易不可得而强也永寧之開縣自永樂以來至於今其昭明有顯跡者上下數百年而其人甚稀至使君為政下車不匝月而民風藹然頌德歌功如出一日夫得民從古難之而永寧處邊境之際兵荒相繼民悍差煩頗號難馴乃使君如此之易者又何也以其德意明而誠信著也夫聰明精於衡石亷潔嚴於干將愷悌温於尺帛不輊於下而亦不軒於上俾民不怨而又不犯雖欲不畏而懷之其可得乎然則使君之才利於良劍矣俾夫父老傳之史氏述之以與古之循良頡頏而上下於使君何愧焉於是使君之入覲也縉紳先生相率而送諸路岐蘓君與余善屬余為文以贈之余固序之如此云刻劉揮使詩藳序沈子曰藝文之與韜鈴豈逺也哉昔曹氏父子驅馳四方往往於鞍馬間横槊賦詩余嘗壯其氣槩彼雖非德義君子其才藻殊絶淹通廣騖亦足稱也其後有劉越石遭晉室倥傯之時慇勤險阨之間猶抽筆據鞍詠歌以見志乃其意氣博逺横於霄漢其呻吟調笑慷慨悲歌時時奮發於方簡之上比之書生學士揣摩聲韵之末流研練於章句者既自不同而後世專名之家亦復不能過余見今世武胄之士多不習於藝文以為被甲躍馬無事於鉛槧而不知典籍之不通則精微缺矣雖有方員牝牡亦安從究哉余友梅野君家世萬户侯生有雋氣力足以驅虎射足以中命及紓徐委蛇游意於翰墨工圖梅畫又好吟詠歩驟晉唐之風流余毎披觀之見其名章纍成而秀句疊出為之嘉歎不置此可謂超乎今世之俗而軼乎古人之風者令其效節邉塞擊刁斗珮印綬封侯萬里要亦非天幸耳今其詩且傳余為序其大意如此贈孫明府考績序夫豪雋之士處方域之中遨遊四海其所交遊簮紱當其離别之際嬰情於岐路徘徊眷戀古今豈有殊哉余見春秋大夫士相贈縞紵或陳詩以詠歌徃徃㱆欷伏軾而思之夫鄉閭里閈林立而丘聚有連屋比居不相往來而海内賢豪千里相望至相見則如塤箎之和而骨肉之好何哉其意氣同也余郡孫明府組綬臨吾土三歲其所頡頏揖讓珥葢而相接者如雲霞之興鬱然蒸於海甸而顧於余節齋君暨余之不肖益惓惓焉每時節過逢臨眺山水之際容與翰墨之間相與超焉寄言於八表若有㝠契焉者此非意氣之相感然耶夫君子之意氣非徒兒女之仁又非獨撫劍引觴相然諾而已懷志之士欲感㑹風雲鞠躬王事斥惡除奸澄清海宇立忠貞之節成不朽之功以與天壤並存故望旌旗則壯夫動色聞鐘鼓則義士沉吟而况同儔一志俱懷萬里者與公蒞政持操若金石而風猷卓然百姓發清明之謡當塗布亷平之譽逺近齊聲以為異等其所樹藝昭明矣余黨之所以響往者豈固當世之情而燕好之私乎然則今之行軒車翳然有離别之色亦非獨戀儔懷侣依依於色澤而已聚散之際而慷慨之義焉青霞集巻一
