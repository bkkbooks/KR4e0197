body:
  text: 青霞集卷十明沈鍊撰塞鴻尺牘與毛侍御書昨者辱使遠存匆匆修謝不莊且感且愧鍊也竄伏以來春秋五易經按於兹土者蓋四三公未有如明使君之賢也頃如羣寮儀物奉將皆麾而不納是知下執事超越於羣公多矣且今權臣竊弄威柄以其姦邪貪墨之為風動四方縉紳士大夫皆化而不覺棄置朝廷之恩澤不啻路人畏懼奸邪之權勢甚於雷電故皆茍且乾沒與時浮沈若明使君者風義凛凛抑揚豫奪具中紀綱攬轡埋輪之節誠光前而絶後矣乃鍊復有言者何也誠見世路岌岌在一髮千鈞之際又聞主上求賢搗穴之心形於詞㫖不知臣子亦有惻然動心思褰裳而濡足者哉朝廷惠養元元德澤深厚君臣大義不可須㬰少解而士大夫內外相黨不怵於權勢之塗則惑於運數之說甚至有希心於權奸者矣權奸心事暴著於楊員外之一疏使斯人之言不驗則天下之幸也斯人之言而驗人臣可但已乎設若人言謂其不為大奸今南夷北狄交侵并寇主上震驚而權奸之心怡然自若此其為計何如也今節制諸將之所為又有不可曉者自秋徂夏閉門不出一戰而坐受賞賚之爵不思報稱此豈復有廉恥忠義之存於中耶此日犯邊殺掠而彼日通使求和假以創制丘富為名而惟暗輸錢幣數月之間破壤堡寨殺傷人民不可勝數而將校猶以首功欺執事此寧可復信之耶百姓橫罹鋒刃而復使之身首橫分報功幕府有人心者必所不為而懷忠藎者烏忍見之哉今保安雞鳴之側埋骨如山皆此類也始作俑者僅已去職罪豈容赦鍊雖淪落草野而發憤抗疏之心猶耿耿不能忘焉况使君身任邊郵之寄當此之時羽檄交馳文武失策下執事其能恝然不為之所乎敬勒手狀陳露狂瞽鍊也非不知與時俱晦誠感主上之深恩而戀使君之明德雖欲無言自不能已耳伏惟左右亮察之無任懇仄寄華余溪頃得奉手書知玉體違和時時戀念邇聞傳言者云公迎醫尚在潞河益增悵望不識近已得髙醫否齊疾君子所慎然必杜絶世事除却妄想寬意以頤之若藥餌之投顧乃順陰陽調血脉至於五臟受病之原皆由吾心而致之也所以病能自養其愈尤速適萬楓潭之便得附手狀萬惟順時調攝不盡寄張甌江司丞僕辱左右骨肉之愛未可以指數而札記别來懷抱匆匆不佳又不能具尺書修布似非人情然衷曲亦未易為左右告也邑中事亦已粗辦鄙性率易不能結知當路奉合之期未知何日想戀光儀不任悽愴伏審即日動履清暢為慰弟此來獨受東華使君之眷顧乃公之諳練持操真不可及令人嘆服鹿門讀兄含情遍繫長途柳為政應開滿縣花之句再三擊節傳誦適吕給舍之便謹修短楮奉訊旦夕遣小吏將行不盡不盡寄周使君頃在都城得附於軒蓋之末朝夕承侍德音燕好綢繆情若琴瑟感服之至良不可言伏想執事以竒才明略震迅方域之內兼以體貌魁梧篤生異表直當覩公手握兵符建侯萬里之外如僕者駑劣之資不足策勵然亦欲托附以馳驅恐左右不諒僕向慕之誠輒自輸寫耳如何如何頃知旌麾將詣紫荆謹遣候騎賫手狀馳上魚腸劍一匣虎鈴經一部奉展區區惟亮之不盡與鮑憲副書客歲旌騎臨發會匆匆不得遠將至今懷歉伏審按節江南展攄鴻藻之潤布揚駿明之略剛柔並建威惠雙馳風聲所及其在别藩鄰壤之民猶知戀慕况親被其德澤者乎欽嘆欽嘆僕自惟謭劣謬辱光輝惟有朴忠所願以身徇國竭其區區欲無負知已之雅不審采風之餘肯誨導其不及否耶未緣會晤寸楮布懷耿耿情私統惟亮察寄吕潭西不肖未能長往林壑竊祿兹土自念淺薄不足以負荷庶政惟賴明公開襟誨導使不得罪於百姓磨朽礪鈍得少追步於循良之末左右之惠我多矣日者京邸辱賜照察周旋無已徽音淑貺載在肺腑云何能忘雖輒嘗造門候從者薄致區區然此心耿耿萬千未能一展也頃因范黃門風便敬勒手狀布謝種種情私嗣當顓致寄陸宫保書不肖駑劣承乏下邑有年矣荷被拔擢得從事於麾下喜忭欣躍不勝慶幸伏承明德屈已撝謙親遣使者枉臨於千里之外更辱盼睞周旋恩勤千萬渥以帡幪之惠錫以金玉之音禮教絶於等倫輝光矚於畿甸曷勝感激昔平原降節於侯生陳思折簡於吳質其在前史以為美談竊惟明公秉躬明哲兼資文武英才振世盛德寡倫擁旌雙闕之間鷹揚百服之表使袨服荷㦸者魄奪而濳消環列侍衛者交臂而受事海內人士莫不談誦聲名傾心向往而乃下察簿書之材垂情珥筆之吏其於平原陳思何啻過之是周公握髮以致白屋之賢而僕非其人也僕本樗櫟之資自甘委棄沈伏州縣殆踰十年頃得受命於庭階奔走於末屬已為過望况復遭逢殊遇感結腑心不勝局踧所期勵竭駑鈍矢心精白期報朝廷以贊揚仁風不敢背負謹遣縣屬裴衣先賫啓記一通伏謝於門下僕已本月二日領劄付所有倉庫文書即今交代卜於十一日起程赴任伏惟台慈照原答楊兵憲書僕辱左右光照踰邁等倫而軒騎之發缺為追送其歉恨鬱如雲霧何可殫言頃使者來詢問起居知旌干旦夕有北上之行且辱手書枉存腆惠重疊感激當何如來諭極切邊務所謂將材之難者今時正苦於此然安邊保國之道帷選將為急將不得人則法制廢將得其人則法制行然則選將者固法制之要領也夫將不在梟勇而在於權謀猶之卒不貴於狡黠而貴於顓愚也有勇者未必有謀有謀者則必有勇謀而不知勇非能謀者也夫謀非神祕非有鬼藏得之人心者也盡權謀之道可以為將矣故上明天時下明地理周知人情兼曉物故通於古法達於今宜天時者風雨寒暑非孤虛之謂也地理者山川險阻非生死之謂也至於人情物故古法今宜又非可以口授而指數今之將知此者其或寡矣乎然察將之道甚難微權妙道不可以言語而得髙節宏度不可以細行而知深藏固守不可以聞譽而取雖然是不可泥也善觀人者亦惟探其端耳是故訪問者知名之路也延攬者引士之門也論議者呈才之會也任使者試功之地也其上求之縉紳其次求之山澤其下求之甲胄夫挽弓試馬不可以為能小道邪說不可以為略心疏氣揚者不可與成功襲常蹈故者不可以言法空談不學者不足以論才嗚呼不重賞而薄罰之不可也故古者之於將也懸之以髙爵示之以厚祿其有罪過者詰問之而已夫調度廣者不可禁之以財志量𢎞者不可抑之以位勞效厚而賞賚薄則功名之士不勸責任重而禮遇輕則道德之士不至此又任將者之所擇也使旋率爾奉布幸惟亮之答戴錦衣書公篤志於大道沈濳獨往僕心竊慕之然不能時時詣造奉服琢磨之益此為恨也僕不自量度誠慨然有憂世之心焉曩為憤悶不平一獻言而抵罪遂竄伏草野然荷被主上之恩待以不死犬馬圖報之心何能自己夫濟天下之謂道窮萬物之謂學人心之體何所不包何所不有而世之人橫私其身至於壞天下而不顧背君父而自忍此僕之所以扼腕而長嘆傷心而雪涕者也然亦有學道君子周旋容與於其間自負為知幾明哲默以取容而不知事日壞而道日喪時已去而義未伸生民社稷將何賴乎孔子豈不知幾哉然而至於作春秋討陳恆獨立一世而不顧此又何耶聖人之所知者義也其所以不憂不懼者命也語曰不知命無以為君子今之君子所以若此者豈非不知命故耶辱諭守宣大方略大發蒙昧然今宣大之邊事非獨士大夫所不得聞亦有僕之所不忍言者固國不以山溪之險乃今知孟氏之言不余欺也得其人而守之誠反掌矣何必宣大哉豚兒過辱枉厚感激不勝昔承命述作奉揚太夫人之光烈今撰得髙節堂賦一首詞義淺末殊不足觀幸賜採擇之與長兒襄書聞南來倭寇消息不祥吾每念祖父墳墓及宗族親友往往傷心而泣下也汝既在家誠能建立議論但導人心竭忠致孝以成匡救之策則我願足矣汝等讀書幼學壯行樹功立業正此時也范仲淹做秀才時即以天下事自任况今南倭北敵旱魃連年天變人災四方迭見當此之時不可為無事矣汝等不能出一言道一策以為朝廷國家只知尋摘章句雍容於禮度之間嘗謂責任不在於我因循歲月時至而不為事失而胥溺則汝等平生之所學者更亦何益南方風氣秀拔豈無雄俊才傑之士耶吾願汝親之敬之其阿庸無識之徒願汝疏之遠之天降烈禍殿廷灰燼旬月之內宫厰繼燒此乃賊臣擅權肆惡以致陰陽失節而禍固起於朝廷土木大興而害則延於百姓矣宣大臣寮與敵通和私相納賄無復人理吾以忠心耿鬱每事必直言於當道彼等亦稍畏縮但廟堂之中欺君之計通行而鬻官之聲大震不能不動汝父之憂耳外朱雲折檻詞一闋寄汝視之答田副總兵書曩者辱賜書貺雅重感不勝也嗣即遣下走問候而軒斾已北發矣瞻戀之私日月並積有如懸旌何由可忘頃復承華札遠存乃知朝廷寵渥荐至欣慶如何苐不穀荒菲無以為賀良用為愧僕居山中旬月縉紳先生過此咸停車而叩關屢問左右之動履莫不贊揚將軍昔日之英略而言今日麾下之兵甚梟健也遷謫荒鄙之人深為欣慶雖然善馭勇者不如尚謀之必勝能循正者不如用竒之多功孔子曰可與立未可與權夫權之為言天道聖人之妙用而兵家之竒算也後世以詐術當之豈不謬甚矣哉故夫權者舉一而當百也是故舜選一臯陶而不仁者遠湯選一伊尹而不仁者遠此所謂權也伏惟將軍忠亮絶匹議論風生𤣥機遁法人所不及然一已之智有限而集衆善之功無窮誠肯訪擇髙賢俊傑任為謀主咨其策而用其竒此蓋致勝之要務而運籌之大權也昔韓信破趙區區求一亡士李左車而師之詢之謀議遂下齊七十餘城今左右定之以謀猷而指縱其勇士運之於帷幄而決勝於千里是古人竒偉之功必復建於今日矣且宣大之事大壞極弊將軍操五路之兵懸萬人之命毛舉細故日亦不足何暇紛紛任大事者舉其所當舉用其所當用一一而持循之賢傑之士勃然興起而效用於我邊務兵機操縱之無難矣將軍之卒雖稱雄强不過三千餘人少馬缺糧動輒有礙此不得深謀遠識之士與之圖之將軍必不能以寡而敵衆空拳而擊賊也若以僕為迂談今日條陳而討馬明日上疏以乞糧縱與糧馬而糧無運輸馬無芻粟將焉用之焦心勞思終無成績憂深而不可解禍結而不可去將如之何哉使旋布此希亮納之幸甚寄文衡山書足下負大雅之才抱至貞之德退處湖海白首彌尊今方內人士依附聲名者猶足以激昻青霄之上况親炙光儀者哉不穀遷謫邊郵深為潦倒雖切眷慕無由會并瞻望雲樹耿耿無任每以交游中得承翰墨之貺不勝欣慰古人云寸楮尺璧一字千金惟足下當之矣盥露而奉對鑿室而珍藏何以喻兹惟足下不惜殘膏餘馥當有以流潤千里也如何如何不審即辰動履何似敬遣牛馬賫手狀并馳上小詩一帙幸改教之答趙總兵書不佞辱知於麾下有年矣然年愈久情愈篤此與世俗之交隨聲逐勢者豈可並日而語哉感念知已情何能忘每側望旌旗聞駐節龍門遣役再三云暫來輒去不及一致小啓又聞東路之報連綿不絶失去堡寨二十餘處不審此語的否僕自出關以來熟思而靜觀邊鄙之事猶人之有羸病精竭神憊特形面之未仆耳使不急醫未有能久延歲月者今之宣大財乏而用彌奢民窮而差愈重軍中所賞者非其功所罰者非其罪或賞濫而功不勸罰輕而罪不威令下而不循惠施而不感官肆貪而法廢事取具而實亡將軍操萬隊之權握一鎮之命僕曩經過麾下不見謀士如雲戰士如雨惟聞管絃之聲雜奏於廷內當此之時敵侵削而不休兵疲弱而不振將軍之所處如此僕實莫測執事之竒謀矣雖然已往者不必追矣執事能轉機以就事因失以為謀則邊事之壞可復恢也夫古告人之道三積以誠者要其信也動以容者要其感也示以利害者要其聽而奮也僕昨聞警報夜乃焚香執筆而就書可謂誠矣每與左右論事不敢不盡心鞠躬以指陳可謂容矣使人民安堵而無邊塵之警三軍精練而懷欲戰之心此執事之利也堡落攻燒而怨恨及於主帥蕃部連轡而一旦入於京師此執事之害也前敵進青邊口而居民生縛渠魁將軍反無寸箭之功攻破小榆林而男婦殺傷巨萬麾下之士卒不出一救今日論功劾罪利害昭昭又豈待僕之言哉不肖喋喋之言固不足以為經時濟事之策然執事肯諒區區之意而悟舉焉未必非目前之利也夫將之用人以才而戰則用人以力執事之士卒不患無力與技也患不得才智之人而任之耳欲求全才世固鮮有得一偏一能者俱可酌而用之毋以勢分限其進毋以浮僞溷其真毋以譛言蔽其實毋以小失遺其長千而薦之百百而薦之十爾我各舉其能彼此互陳其屬抑幸用能表强勵怯重其人廣其路不惟可得軍中之才而四方之士聞風嚮應將畢集於麾下矣夫本强者能制末技備預者能應卒變用才者本也訓練者備也三軍領馬給糧必由賄賂而後得行陳守操多應故事而無補充營備數毫無實績緩急之際孰可仗乎今將軍閉門而自娛士卒倚戈而不練當燃眉濡髮之時而惟坐待其憊非計之得也勇不自奮作之斯興技非自能習之斯熟執事所統之兵非不可用在選練之不得其道指縱之不得其術耳僕未足以知兵旅之事但窺今日之勢不盡心力而圖之將不可為矣又何異羸人之不庸於醫乎伏惟執事當國重任國家安危繫焉蚤夜圖維以滅此朝食朝廷幸甚生民幸甚僕辱執事之夙愛不敢以諛辭奉承激切之言諒必不深罪也寄莫憲伯書京國歡娛已成歲月門前橫蓋馬首垂鞭光景依依僕雖潦倒風塵未嘗不夢想於招提之側也况樽俎綢繆而風詩之凄愴乎感戀意氣泣下霑襟嗟乎嗟乎士遇知已良為難矣又未得會並於千里之外悵恨如何僕自遷謫以來委伏草野日覩邊塞之變大有傷心者債帥粟官蠧民竊祿哨探至而震驚城堡破而不報欺玩成風以敗為捷恐泄泄之久將守之無人而避之無地矣不審髙明何以教我耶吕君使者還便謹啓奉訊南望凄然不盡耿耿答揚參戎書日者辱軒蓋枉臨於山中執手眷戀厚於金石也匆匆頓息行李未遑修謝復承仙札飛墜草野之人過承懿誼奉服感懷益增晤嘆所命丹書旦夕尋録邊鄙多事之時左右馳驅王事誠能報效朝廷剪滅戎患置國家於磐石而解蒸黎於倒懸樹功當世而勒名鼎彞此大藥延年之祕訣也不知髙明以為如何使旋先此奉復餘情種種續當敬致區區也寄汪啓初書憶在武林聚首歲時每懷髙雅耿耿不能忘久以南北馳驅卒不得遇便風缺相問也不審比來進修如何執事氣質純厚更加精厲何遠不到不敏入京即以言事投竄於重關之外言念故人恍在夢中宣大諸邉侵擾日甚一日法大壞而事日敝不知竟何底止也白鴈飛鳴黃雲縹眇益動遷客之懷耳頃杜君任貴邑少尹之便附訊起居舊帙奉覽焉答蘇節制書鍊也投竄之人躑躅關河無由持奉菽水一侍老親而罪亦彌於丘山不自殞滅禍先及之不忠不孝慚負天地念欲即死以其魂魄匍匐先人之左右而男兒生世懷抱未攄奄然泯沒上無以報聖主下無以顯老親於沒世乃復忍哀茹苦延兹喘息詎知下執事恤其流離垂仁㷀獨珍禮腆貺儼然辱而臨之鍊也俯伏哀感交并舉聲長號精爽越於霄漢此情此德何以報之哉稽顙使塵委謝無已尋復抽念下執事於軍旅倥偬之際垂矜草莽豈非古人所謂軾怒蛙而買馬骨之意乎鍊也自許不敢後於常人平居切齒憤後世之為士大夫者不肯以身殉國周營密算惟其已私而已今世道日朘月削以至於壞殊可痛悼頃鄉先生遺書云倭寇舉國東侵浙之東西俱被其毒今宣大又見告突中原內虛盜賊縱橫齊魯燕趙之際水潦大作都城南北築而復圯流離餓莩充塞道路嗚呼此其時何時也而為之臣子者不思褰裳濡足以救之亦太不仁矣昔范文正公居憂而上宰相之書識者韙之彼其時雖有西夏小警猶號承平無事而憂世者不得已焉况今日乎鍊聞欲建非常之功者必有非常之略欲知非常之略者必得非常之人古之君子必盡心於此焉所謂非常者不謂其立異貴難茍然以矯世絶俗為竒也司馬子長所謂博學深思通知其意者此固世俗之所稀然而成事立功非其人不能焉伏惟左右魁梧琦瑋道誼文章巍然當天下之望又聞幕府清嚴憂切黎庶未明而求衣當食而慨嘆延訪通於海宇咨諏及於下寮心事同於古人而與後世之為士大夫者異矣然而功有所未立事有所未遂者何也凡以時勢難為而下執事之心亦或有所未盡耳且今之勢可謂倒懸矣然而為臣子者無坐視之理也今之事可謂掣肘矣然而為臣子者無稅駕之心也不曰今之事勢難為者非也不曰臣子之心有所未盡者亦非也書曰后克艱厥后臣克艱厥臣易曰艱貞吉非今之時乎夫已往者不可得而追矣及今而猶不為之所天下事尚可道耶孫子曰未戰而廟算勝者得算多也未戰而廟算不勝者得算少也多算勝少算不勝而况於無算乎夫算不同有全算有竒算全算者安身而後動制勝於無形兵穀交足大備無患若李牧之守代邊趙充國之禦罕羌是也竒算者變生於倉卒禍起於須㬰而能轉禍為福易危為安若周瑜之破曹操謝𤣥之敗苻堅是也譬之和扁之於醫彼其血氣衰微而無異常之疾則以良藥投之參苓昌陽而見功效若癰痬之發則有刮骨浣腸卒病卒愈之效此非通於神明者烏能與於此今不得萬全之略而又不豫應卒之謀誠未見其可也然則在下執事又安得不亟求彼有道而無方通微而多算者與之朝議而夕圖之以救元元之急哉故韓信非不智也而求李左車為輔田忌非無能也而置孫臏為師若此者誠見利害之極而審乎取舍之機也故夫多算者能審取舍而已拳犍梟勇可以充搴旗之卒而非所以為將帥之材也星辰宫算可以備已疑之術而非所以為通方之略也且今時之所患者豈非將不能而兵不足財不充而險不備乎僕以為將不患其不能貴於能訓迪之而已兵不患其不足貴於能選練之而已財不患其不充貴於能斟酌之而已險不患其不備貴於能守禦之而已此固取舍之道也何者今之債帥粟官非不衆也乃其始也由於教化不明風俗敗壞而又本於轉移無術吾於其賢能自奮者必庸之貪冒不改者必去之若孫武之斬宫嬪而諸姬肅世宗斬樊何而三軍恐宋太宗之賜劍於曹彬曰偏裨而下不用命者斬之今雖不可斬獨不可疏之乎彼城狐社鼠必有所依然我亦安能以其身名之辱而易權貴之交哉下令諄諄必以忠義節烈國恩難負為訓且置能吏於兩關有通書賄者時奪而治之以示標的彼兩關者非余之所節制哉故多方為略以鼓舞之時下教令以訓諭之引古名將以激昻之故古名將必有勝算於心而後臨敵今敵將至其為勝算幾何矣人之精微則不能宣之於口至於大略可講而知何不於開府之日悉延使臣將校陳列時事相與磨研論議務求長策於以施行夫人不辨難則不足以詰其短不輸寫不足以形其長故非獨知事亦已知人矣於衆言之淆亂而折衷之則易為力以一人之聰明而窮索之則難為功是以夫人皆有偏長之能而不必有周全之慮惟聖人兼聽博觀而裁之以獨見故其勝算無窮今欲求勝算而不資於人心此又烏得為知算者乎試若校官子弟抱材器者有矣而茍以章句不録羈人巷戶歷變故者多矣而以微賤不容抑如人之抱竒疾而為草澤之醫恥服其藥寧殺身而不悔也豈不可惜矣哉今下執事試省其所用之人我求之於人者乎人求之於我者乎若我求之於人者則十得其六七若人求之於我者則十不能二三彼為功名之計而來則所輔於我者皆功名之事矣彼為富貴之計而來則所輔於我者皆富貴之事矣茍皆富貴之人則忠讜之言不聞正直之士不至取資於其身而貽禍於我饑而為用飽而揚去豈可勝道也哉是故人云中原之不勝外患也非不能勝也是不欲勝也我欲勝而勝矣今公卿大夫所為之事是欲勝外患者耶欲用三軍之力而上下交征皆於三軍中給之使三軍者誠皆聖賢之材亦不堪命欲用其死力而不與之生恩欲取其憂勞而不與之逸樂世寧有是理乎今或下令令各城守備專求智謀勇敢之士時以名聞參伍以其所知召而問之則草莽之人奮矣故榮辱者治人之大機也擔夫羈婦寧死而榮毋生而辱立為三等之法而上下之其最者㮄其名字顯其身家以寵榮之以風示遠近夫此一人也上之人賞焉下之人稱焉雖有不勇敢者寡矣官府摧折焉妻孥怨謫焉雖有不退縮者寡矣今進死者無榮退生者無辱弱强勇怯雷同一律何所為選練乎人或言財之不足而用不充是尤不然歷年以來但見兵馬之消而不聞芻糧之減但見民舍之乏而不見官家之窮誠得忠力之士如劉宴之流規而理之財且不可勝用也而况於不足乎故夫兵之用不過乎攻守堅壁清野所以為守也馳車驟馬所以為攻也今天雨霖潦城堡傾頺中國之所恃者僅有此耳又復壞而不修一日敵騎奄至撫掌大笑擇肉而食之豈有既乎禍未至則因循而不虞禍既至則倉卒而失措此中人之恆患也何不蚤夜督促亟成之縱無大補猶足壯三軍之氣而消敵人之心先一日則有一日之益纍一分則有一分之功今天霽以匝月而毁垣如故也夫噬臍而悔何為哉三軍固以進戰為功退縮為敗而變化之機轉移萬端故進亦有算退亦有算因敵而動密於秋毫故減竈以示怯卸鞍以止來免胄以奪氣舞女以移情誠有以揣摩敵心而研練物理之至也昔蘇秦發篋得陰符讀之三年為之簡練揣摩是以游說列國百發而不窮誠得絶識之士而與揣摩敵人之行止瞭然若觀明燭矣夫敵强盛者不當迎其鋒而當乘其倦鬬衆大者不當值其廣平而當邀其險厄蓋藉形容而損其强設精微而破其鋭固有道者之所必為智士之權衡也是以王顯乘雨而破契丹班超因夜而攻鄯善李訴冒雪而取元濟張彥澤逆風而戰陽城皆算成而令熟濳運而默移無不應也故今不慮克敵之難而切慮用衆之難也若進而不由其進退而不由其退欲東而不能使之東欲西而不能使之西衆且不可用而况於克敵乎故節俠之士必有誓死之交智能之將必有敢死之卒何者以其恩信結於其心而不可解也今之將帥縻衣解食得敢死之士幾何人矣三軍之士望風股栗而不敢戰匹夫匹婦幽憤激烈蹈白刃而不辭此非發於其中心者然耶其初心未嘗敢戰而强驅之使戰此其敗亡固不在交綏之際矣故勝敗之數不必占於星緯而卜於蓍龜將智而士勇勝矣將不智而士不勇敗矣以今言之固無必勝之形矣無暇遠論即以近日深林之事觀之亦已明甚記曰前事之約結後事之機權也故忠臣不變節以徇時賢將不息謀而僨事懲前敗者圖後功追往失者計來效軍敗矣而處敗有道則勝必生事失矣而居失不昧則功旋著於今日處變之無道而知來日致勝之無機也獻諛者方且以為塗抹之巧錐琢之能而不知其培禍基而重罪胎也亦已甚矣孟子曰仁義而已矣何必曰利今為人上者大率曉然示人以趨利避害之情而一旦責之輕生敢鬬萬萬無是理也古之名將所以不爐不蓋卻金辭第忘身而損己者豈得已哉誠以風諭三軍使之回心向道而訓迪之至也管子曰龍蛇得水而神可立也虎豹托幽而威可載也風雨無向而怨怒不及也如或以不附之心而兼之以可測之勢偏恩所授有之而非無心之感誰在而三軍效力乎何也士大夫不能以身任天下之重故也夫匹夫而有憂天下之心若伊尹王通范仲淹之流而海內之安危本於京師之輕重京師之輕重懸於宣大明府君雖欲不以天下之重為任豈可得乎昔者劉晏之在江淮也其言曰見一水不通願荷插以先往見一粒不運願負米以先趨焦心苦體期報明主彼以運漕為任如此若下執事之任則比劉晏為重矣今二酋不滅縱使宣大秋毫無犯而京師有匹馬隻矢之警下執事不得髙枕而卧也况不必然乎此宜亟宣壯猷展竒略挽千鈞於一髮所謂持大兵如擎盤水一致蹉跌求止不可得矣邇節鉞駐宣府是也東西南北取道適中而將校諸官麾使良便進可以為京師之聲援退不失兩鎮之控制使望風而來者得有所向焉今日之事惟在委任得人若頻數往來亦不無廢時之患下執事之圖惟宜日之不足而繼之以夜此不可謂之燎眉之時矣乎乃輒因使人之便敬以書上蓋野人芹曝之心感激而動者下執事恕其狂察其隱憂而不以書生之言視之則不勝幸甚矣寄張司丞書離隔光儀自春徂夏日月不居二毛叢生言念知己顧我如何伏想君子履道髙明金玉其心不以外補而忘內憂維揚襟轄之地博參廣覽曠焉𢎞度何獨不為美觀壯遊而置欣戚哉僕本落魄之人竄逐荒野惟有惓惓舊知每一南望恍然為懷何日會并握手交歡以罄區區耳諸生任子行托其奉詢起居外奉去海天晴望圖一卷賦詩草首聊寄寸心千里雲山與情長佇青霞集卷十
