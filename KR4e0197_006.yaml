body:
  text: 青霞集巻六明沈鍊撰七言排律寄奉陸宫保將相兼權屬上公華夷交臂憶英䧺金吾邸第開新府虎衛韜鈐邁古風手握綱常為大孝心存社稷是元功指揮士馬收河北悵望烟塵到海東不分曹瞞為逆賊耻從魏絳學和戎知時詎怕薰天勢仗義偏懐貫日忠恩洽彤庭忻附鳯慶過清渭兆非熊淹該誼與探囊並敏捷機將破竹同氣作星辰長拱極思如流水必朝宗不辭𤣥葉千莖素秖抱葵花一㸃紅宣父尊周文未䘮孔明輔漢意無窮道髙日月三靈上名在乾坤萬古中一劍上方曾借得擎天八柱倚崆峒五言律同馮比部集賢膳部草堂得心字蘭館樽初集金門漏欲沉清風七子賦明月二難心契好過逢數歡娯燕笑深馬嘶芳草地人醉落花隂闗山月明月東方出闗山正在西愁聞蟾兎滿偏是照迴溪玉露含光重金風帶影低詎令秋氣爽翻使戍心迷俠客行從來好遊俠寳劍不曾離白馬馳長道黄金報所知風流傾斗酒調笑折花枝唯有燕雲念平生未肯移集賢膳部草堂得荷字秉燭過逢偶乘閒引興多笛中傳岸栁香外泛池荷道合簮偏聚時清酒易酡明朝問花事風雨夜如何過謝四溟山房得香字佳處景難忘相逢再舉觴鳥疑曾識面花已慣聞香送目烟霞外論心翰墨塲但教歡賞洽隨地有滄浪集孫子長草堂得園字易遇雙文玉難逢一笑言所嗟人似月千里共黄昏酌酒依金谷題詩擬兎園深歡不能别翻覺重銷魂飲張水部園中得琴字靄靄辟疆心言棲五畆隂秋風行倚劍曉月坐調琴啼鳥歌偏劇飛花舞不禁從來臺館樂未必勝園林同呉膳部諸公㑹集草堂得周字清人居水曲明徳象分流世事多岐路人心有道周飲瓢懐耿潔撃楫抱殷憂直恐風波滿誰能傷凛秋又得歌字春色移庭樹知余繫馬多相逢復不飲其奈落花何曠達輕歡燕流連發浩欹况同知已在杯到詎蹉跎詠圍碁自將碁作世誰為世如碁日月枰中轉山河掌上移雁飛教作陣龍躍引成麾滿席天花墜知余得意時六橋堤上看美人走馬妖姬馳駿馬佳麗本相同玉腕光揺轡羅衣色映驄汗流成膩露塵起是香風為借春光去將心送落紅贈鄭一陽太醫鄭公居谷口煉藥一陽成劍外星辰迥琴中山水生門多三楚客身在五湖行為解探囊術難逃世上名送陳子先補增陳琳試髙等章甫共興歌入夜猶吟誦升堂事講磨析疑觀日月聞善决江河嗟余迷學願因子悟盈科輓劉孺人孺人懐令徳内助有輝光奕葉青袍貴階庭玉樹芳百年歸夜室五屬奠春漿積善流餘慶諸孫不可忘寄樂昌王殿下遷客滯邉州回經萬里秋感時頻仗劍望逺欲登樓露下芙蓉濕風生桂子浮淮王池館近何日幸同遊從軍行從軍非必苦遊俠更為雄七寳成雙劍三年造一弓殺人沉海日走馬逐邉風意氣懐明主誰論萬里功寄萬鹿園總戎二首玉帳東風入春歸細栁營將軍披羽服揮塵坐談兵旗定轅門肅香銷燕室清封侯非所願但遣四方平其二樓船横漢水五月渡天津絶域回龍騎清朝識虎臣營中時校射帳裏夜邀賔吹出梁州曲還悲塞上人送施武陵之鹽官丞世皆卑道拙余獨嘆才難珥筆開千巻摳衣博一官戒行車騎急餞别酒盃寛呉㑹多山水題詩好寄㸔送朱縣博赴武寧余嘗讀功令知重校官才升堂鳴鷺鼓釋奠洗雲罍獻賦嗟䧺等明經是鼎來諸生方引領驅馬莫徘徊送馬節推之慶逺莫以炎荒郡非承明主恩節旄千里重軒葢百城尊飲氷懐古道仗劍出都門白首心逾壯知君是馬援題楊進士小像識面尚云易知心良獨難誰能負竒氣長自被儒冠麗藻凌雲出清光逼斗看虎頭應不偶辛苦且加飡送丘少府之濬縣綰綬佐専城為郎已不輕但能持節操何懼少聲名折栁詎勝贈看花在此行憐君是知己相許慰平生息馬論道誰道驅馳地翻為講授筵解鞍還作席投轡别為弦逺馭輕千里空行歴九天始知祠闕裏總勝勒燕然賦得澹泉篇贈顧院使本為金馬客却賞竹林泉共説甘如醴誰知淡是𤣥洗心懸浩蕩潄齒嚙雲烟世味余方苦逢君意洒然送朱提學赴閩中選署掄才重維藩典學尊皇文今日麗師道㡬人存正色登三事髙名著五言知君行萬里不負大夫軒送李直夫還越知子樂絃誦從余陳蔡間自因萱北發將及雁南還昔詠杯中月今題馬上山知音已輕别抱曲不須彈昭君怨賤妾羅衣薄君王寢殿深何須矜艷色不自用黄金馬上千行淚宮中一片心琵琶彈不盡總向玉闗尋俠客行北里新名俠門多隐者車問人尋寳劍留客註丹書七貴空聞姓三公欲造廬寧甘布衣老不肯曵長裾賦得林中啼鳥幽鳥園林迥飛鳴本自珍天機枝上曉風韻葉邉春日暖和千㺯霜凄切一嚬感時啼不歇應有解言人初夏同莫膳部過呉比部草堂論詩得中字二仲既相逢知余馬首東誰望千里外還聚一堂中對酒邀山月論詩入國風同聲自相和寧復嘆飛蓬五日遊將軍射林莫子良後至以詩嘲之相約出郊坻兼逢重五時世人皆賞節吾黨屬題詩射桞逢塲暇看花恨日遲如何張孺子偏後老人期槐隂堂為沈開府賦幕府近西墉雙槐夾院叢檻垂浮葉外簾捲落花中舞處猶籠月歌邉不礙風一樽從共飲能折九邉衝送毛比部出守端州毛公忻奉檄詎是為専城典郡懐明牧分曹本碩卿氷壺預為政風月餞將行千里䝉恩澤一樽何厭傾送周武選外補廣東大叅珥筆中郎署知君意氣䧺坐移芳桂月叅馭紫薇風鼓枻三江外看花百粤中太平官事簡慎勿立竒功送袁客曹定山犒師鬱鬱三呉彦名髙屬省臣一為持節使多少折梅人行李圗書出鳴騶譯象陳還將懐逺誼薦作八方珍送張提學赴廣東虎觀崇文日鴻儒校士年應知百粤地不異五雲天栁借春風折杯將北斗懸送君臨絳帳吾道已恢然送茌平縣徐幕我昔為兹縣君今是幕曹相過新劍服猶憶舊旌旄要路迎逢劇疲民撫字勞但教持節苦不用羡官髙送張少府俵馬還縣秋風起京國何以送離人最苦衣冠客長驅道路塵出門車馬敝還縣簿書新莫厭樽中酒明朝潞水濵謝山人呉比部重集草堂得青字節序驚余老壺樽對客醒鬢看今嵗白眼向㡬人青樂飲非河朔悲歌是小星揚䧺草𤣥處何日燕然銘送王明府赴靈壁王子雙鳬舄新辭五鳯城暫迴抽筆興去作綰符行客路依星署官居學水清泗濵多磬石應和綺琴鳴送鄭郡幕赴興化山水推名郡清才副幕寮梅花知㡬樹應待朔風飄行李懸雙劍壺飡奉一瓢為官不厭苦所至有風標送黄博士赴曲江聞君嶺表去八桂動征鞍迢逓行千里辛勤為一官青雲流綺席杲日上朱紈奉檄非無喜功名在杏壇送徐縣博赴繁昌奉檄出河濵行看栁色新一官寧不貴五斗秖因貧絳帳樽中色青氊馬上塵故鄉雲樹近早晩望慈親端午諸同志集草堂得絲字帝里風光麗相逢屬令時地除三徑僻人比八龍竒蒲葉分傾酒榴花對賦詩秖應刻華燭何用續朱絲送陳戸曹赴南部年少異馮唐風流漢省郎金陵千里道粉署㡬枝香意氣壺漿集聲名歌吹長黄金知不顧贈子以干將送岑山人出塞黄雲馬首横仗劍赴邉城雖歌出塞曲詎謂從軍行炎夏征途壯河山旅望驚從來班定逺曾是一書生宴集南鎮山池桂席俯雲端山禽舞合歡羽觴流滿月仙館發幽蘭香醑花能釀清絲水共彈不知歌詠地猶作晋衣冠送張子良歸省才子趨朝日寧親亦暫還應將宫錦色去作舞衣斑馬上生歸夢樽中展别顔平生懐獻納未可滯鄉闗遊仙詩三首乾坤真鼎氣日月自爐錘一得調元手千秋正氣綏褊心虧曠達小智騁雕追誰識真仙道天然理自隨其二剛風千刦際妙法九華筵道外應無地心中自有天玉笙吹引鶴朱果㺯調猿駕馭英䧺畢驂鸞禮上𤣥其三上仙傳寳訣經世即長生夀域開黄道慈雲麗赤城琴中調造化奕裏運神兵功行三千滿應知頌太平夜坐觀張博士平邊疏章賦此寄之遷客不能寐吹簫度夜分因思前席事一讀賈生文豪士家臨水雄關陣入雲髙歌還達曙何日共垂勲寄劉副將邉塞一相逢憐君舊總戎名成五軍佐心是萬夫䧺虎節悲歌裏龍韜歡笑中别來猶感慨耿耿望長虹得應職方書以詩答之郎署飛符日題書問謫居自因鄉思到翻覺舊交疎塞月塵沙裏邉風鼓角餘誰知遷客夢夜夜繞鸞輿寄馮敬叔同作他鄉客嗟余更滯留闗山明月夜邉塞白雲秋漢闕孤臣夢霜笳萬里愁桑乾河水近知是憶并州賦得夢中携寳劍烈士壯心驚將過鐵勒城恩從愁裏結勇向夢中生神物千年隠竒文七字成匈奴猶未滅持此欲横行示襄衮二兒吾生當國難兩疏謫邉闗思親太行道憶主敬亭山風急吹𤣥鬢時危損玉顔爾曹俱努力戈㦸正珊珊贈呉仕賢本為珠履客聊寄玉壺仙經濟懸龍劍雄豪躍馬鞭題詩五綵筆寫恨七條絃邉塞多風誼因逢呉仕賢仲春㑹諸生賦羽檄邉聲急將軍出塞遲時危思講武日永笑彈碁白髪龍堆夢丹心韜畧知諸生各努力仗劍解重圍前山曲為李直夫賦本懐金馬調言對翠㣲居水竹流詞翰雲霞雜草書幽探踪跡秘髙卧姓名踈得意在丘壑他年升九衢古别離非闗岐路多君意自蹉跎拭淚攀楊栁將心托綺羅北風吹祖帳秋月照離歌斗酒今宵盡明朝奈爾何銅雀臺西陵鬱何近臺畔綺羅施蕙帳流明月光輝異昔時舞衣還拭淚歌曲總成悲妾願從君化長為陵樹枝劉生劉生懐寳劍結束願從戎指顧邉塵上遨遊燕市中淹留心似石談笑氣成虹斗酒悲知己誰令歡讌同夏日率諸生同遊紫陽洞朱夏洞天明仙宫敞玉京烟霞通一道歌管並諸生香氣因風度瑶華是石成從來躭羽化今日共霞征古意一首和童侍御西閣開羅薦東鄰出艷妝聴歌嬌欲轉看舞意先翔映日流珠鈿因風落珮香不知臺畔客俱是冶遊郎春晴白日雲相薄青樓樹作屏石枝零夜雨鶯語恰春晴湖水明新練山花散錦城可能開杖屨孤眺坐輕盈送袁節推考績平生識明府為吏郤黄金羅袖迴滄渚香飈出蕙林贈行嗟寳劍念别悵瑶琴難以一杯酒酌君千載心送周大尹入覲卻金為漢吏馬首氣何䧺將上河陽計先乘御史驄旌旗颺古節鼓吹奏民風今日山隂道方知在鏡中送山隂蘭博邑教授湖州奉檄是儒官驅車出上蘭壺觴追餞處桃李滿城看念别嗟雙劍隨身只一冠蘇湖得君往古道重波瀾送馮達甫北上江樹正含情維舟送逺征河梁南鴈起岐路北雲生劍氣冲牛斗簫聲達鳯城不知離别處斗酒為誰傾贈李寳山將軍將軍休劍甲日燕寳山居月散千林綺泉流萬壑珠香雲迷武騎花露滴軍書乘秋還校獵非是樂樵漁為童昌原母夀賦白髮垂堂日朱筵獻夀時能招萬里客來上百年巵黄竹歌偏逺斑斕舞未遲余為彤管賦千載列風詩送别南衡童侍御二首遷客懐文藻應知是謫仙徒云離殿闕猶得覽山川白簡經霜折丹心共日懸若過楚水上莫賦弔湘篇其二送别隨征葢那能向水濵共知今日酒不是故園春河栁驕行色巖花笑謫臣千金裝寳劍可以贈斯人贈望洋劉子日下劉公幹文成五色霞縱遊春苑馬沉醉夜䦨花寳劍光頻發瑶琴意獨賒時聞邉騎動往往泣悲笳三江飛梁跨浦口遥睇海山沉潮落空城暮雲低斷壑隂三山區外想億刦幻中心試問蓬萊水于今復㡬深寄張司丞十載為郎吏三時候選曹數竒才愈拙官冷氣偏豪嘆老持明鏡憂邉看寳刀若逢知己譽置我在臨洮贈張玉亭刑曹聞道張平子閒居賦四愁行吟過郎署坐嘯在皇州水石分亭榭烟霞入佩鈎還尋髙詠士騎馬共行遊得茅鹿門别駕廣平消息故人嗟逺道書是雁傳來不因遷客苦誰為寄江梅驛路長驅馬官亭獨舉杯懸知漢廷吏當識賈生才送胡二川為長山令莫厭郎官薄専城氣本奢符分𤣥圃竹綬結上林花啜水行時政鳴琴坐曉衙他年循吏傳誰數五侯家送宋承山作祁門令知君五鳯客亦復跨雙鳬宋玉名髙楚郎官宿應呉仁心琴裏發民事鏡中蘇送别無須酒陽春在路衢潞河作和張司丞二首近闕山河麗乘春景物明中流波作錦夾岸栁如城雲動飛帆影風迴雜鼓聲况逢張博望何異泛槎行其二玉珂知不並蘭棹幸同遊聴鶯堤畔樹送雁驛邉樓歌外風輕度杯中月暗浮徒知行役乆無復越鄉憂莫中江儀曹見過懶性妨冠葢君來更作歡聲名堪比鳯意氣重過蘭山水朱絃裏風雲綵筆端還因竹林賞一遣酒杯寛送朱梅泉赴東鄉博文學重朱雲傳經楚國聞仕官為博士垂老戀明君禮樂乘時曙齋宫達夜分丈夫懐氣節隨地䇿功勲擣衣堦庭木葉下是妾擣衣時秋風度紈素蕭瑟不勝悲淚垂雙杵落魂向百城馳妾意千重轉君心恐未知悼友父白首朱門客言從地下遊平生醉羅綺今夕卧松楸月照泉臺夜風生隴岸秋一嗟流水恨千載共悠悠送陳藍田藍茝詎為芬言棲隴畝雲色凌秋塢竹香帶曉堂芸霧捲千山出川迴匹練分琴書足投賞誰羡赤城文送丁君赴宜陽縣令名士宰方城驅車出漢京贈言多麗藻餞别有諸卿行李先隨鶴前驅早抗旌看君作循吏不負寳刀横送王龍阜給使廣西宗藩二首離别自多感况逢知己行黄金耻為贈白羽去何輕惜别芳樽滿臨岐寳劍横為君彈出塞慷慨獻平生其二侍臣將使節王命一何尊萬里踰荒徼渾如在掖垣藩臺應並服漁牧總攀軒珥筆驅皇路歸來獻納繁風雨往三江送鄭梧野還歙髙士懐名賞偏乘風雨來秋聲清鼓吹霽色映樓臺楊栁吹將折芙蓉潤欲開送君如浦水臨發更徘徊送章東偁江右憲伯憲卿持節鉞千里障元元不因飛白簡何以駕朱軒夜月清征斾秋風壯别樽知君歴荆楚所至有平反東溪曲贈趙大將軍仗劍事邉塞那言山水間自因心洞達所以樂潺湲日出蕩舟逺風輕垂釣閒誰知烟霧裏能距玉門闗送葛春谷我已苦為縣不堪行送君誰令一片月散作兩行雲楊栁堤邉折葡萄馬上分相思莫相問但遣令名聞蒲厓篇贈葉上舍本是青雲客言依緑水邉玉堂何用早蒲渚且悠然雨葉流書草烟花泊釣船棲遲意不淺勲業待施鞭暮夜懐袁定山儀曹不覺落花盡長懐飲餞時流光徒屈指辛苦有誰知夜月凄琴曲春風隔酒巵聞君消息到翻重别離悲奉酬王東華使君春夜抱琴㺯知君調獨髙但從心曲轉不厭指中勞慷慨揚朱斾低回看寳刀若非馳道路何以念同袍送王東華明府考績五首持節過魏郡三年氣色多清光如滿月耿耿照漳河馬瘦征人劇門閒隠者過將歸報明主行矣莫蹉跎其二行李河橋發清宵一劍懸鈴聲傳大道葢影入長川名重曾誇鳯官清不異仙誰能持節鉞匹馬去朝天其三符篆青春發公庭白日開自能輕巧宦何恨乏良媒行李書三篋壺飡水一杯徒聞薄楊震無復夜金來其四千里流恩澤應同漳水迴那逢持鉞使偏是牧人才令發陽春布寃清澍雨來懸知捧明月從此照燕臺其五揚斾邯鄲道蹁躚多栁條何因不攀折欲贈意先揺義勝鑾聲逺神清馬鬛驕空情托流水相送出河橋送皇甫水部赴荆州𣙜竹木使節遥臨楚湘雲上馬鞍客行千里路民愛一分寛𣙜處平看水閒時靜詠蘭惟應氷雪調持此稱冬官王先生抱道林壑别號養浩一日出巻命余賦之白首林中客青山物外居無憂仍進酒多靜只觀書枕石眠山氣飡霞飽太虚浩然忘老去宇宙復焉如偶成矯矯封侯客能為筆硯羈清狂非幼志浩嘯激幽思下里聴羣和髙山嘆獨知乆慚韓鄧笑咄咄自驚疑輓葛巵山大叅家世綰銀黄鳴鑣出建章官隨勲並轉名以節先揚寳劍人爭識遺弓子獨藏誰能書太史彤管有輝光七言律山中寄鄒重文尋真訪道數經秋今日方成萬里遊玉洞秖疑天上坐金河不是世中流淵明嗜酒猶逢社徴伯躭書懶下樓賸欲過溪同一笑移文恐作北山羞送朱進士北上應試獵獵風吹呉市塵行人更復送行人洛陽三月君先到正值桃花上苑春酌酒勸歌多慷慨登途跨馬莫逡巡今宵仗劍遨遊客已是當庭獻納臣送張司丞有功北上北風吹動寳刀初短别江城念有餘知己不因長㑹面論心只欲屢題書征帆未及春先到鄉夢須教嵗併除君若逢人談姓字知余京國舊交踈感懐沙塞黄花帶雪開謫臣中酒坐徘徊睢陽罵賊心偏壯上國思君意未灰南北風塵常按劍乾坤氣序笑含杯醉醒數把春秋看還有程嬰救趙來春日泛湖春日湖容麗藻揚樓船臨泛在中央泉憐詞客留清響山對佳人學靚妝栁葉褰衣同作帳桃花過酒併生香共嗟此地無雙景莫厭堤邉遊冶郎贈李將軍當年海上揚塵日獨有將軍劍㦸馳刁斗只令諸校集羽書不使侍臣知時將落葉供書草自遣飛花入酒巵勳業定知長劍在徒嗟李廣未逢時寄諸生楊子中碧栁清霄怨暮春沙明水白更傷神娟娟野月當樓靜冉冉飛花入座頻海畔音書常阻絶山城瘦馬苦逡巡坐憐物色多惆悵欲覔芳洲綵句新秋懐風雨揺秋溼不開紛林殘葉逐人來寒雲作陣江闗瞑粉蝶遥傳鼓角哀直北朱旗真下淚淮隂氷色未登臺玉堂金閣雙龍管亂落梅花正舉杯夜月月華宵霽彩雲端天上遥傳白玉盤解道清光千里在不知今昔㡬人看髙樓自恨闗山逺短笛仍悲道路難碧水春風俱涕淚舉頭何日見長安春日試諸友偶成精舍㑹臨蘭若地春城初試管絃時日移雲影過書幌風送花香入硯池淑氣韶光皆中節幽花竒鳥總成詞承明正憶長楊賦莫遣揮毫待日遲送鄭明府之維揚東風初泛木蘭舟南去維揚復勝遊弱栁千條垂岸出飛泉百道傍河流開樽幸接黄金客鼓棹還經白鷺州斗酒相逢成一醉烟波莫遣使君愁秋夜感懐颯颯西風日夜吹將軍出塞又空回不知白骨堆沙岸猶自紅粧送酒杯諸葛已無籌筆驛李陵偏築望鄉臺悲歌莫厭傷心曲不是忠臣定不哀送蕭汝行下第南還遊子驅車出洛城臨岐執手涕俱横如何萬里青雲客獨把千金寳劍行歌調不能隨水逝酒巵直願與河傾君看一路垂楊色都是陽闗送别情哭楊椒山郎官抗䟽最知名玉簡霜毫海内驚氣作山河今即古光齊日月死猶生忠臣白骨千秋勁烈婦紅顔一旦傾萬里秖看遷客淚朔風寒雪共吞聲賦得周公握髮圗寄張明府辛苦中丞鎮五戎建旄傳節日倥偬身騎白馬先諸將手疏丹書達聖聰坐對桑乾惟飲水行吟紫塞自調弓清宵耿耿周公夢勲業知存握髪中詠懐二首寄徐太保中原消息近何如故舊無人問謫居報國惟懐三尺劍籌邉空作萬言書春秋首止曾題筆南北音塵已食魚一片苦心懸碧落風烟浩浩獨憐予其二七年為客在三邉壯志飄颻一劍懸取日虞淵光景切載書牛斗語言偏丹心種種齊春草白髮絲絲映野烟侵曉炷香還肅拜誓清寰海答皇天簡莫儀曹中江雲間才子似君稀文賦題成勝陸機海内著書傳姓字朝端珥筆讓光輝苦吟坐榻頻辭客多病趨朝只念歸還過敝廬成一醉不隨流騎繞朱扉送劉明府應詔之京承詔重欽明盛日出郊初值正陽時風和百曲彤簫發日從千花翠葢移雲物分明懸祖帳山河窈窕送征旗今看劍佩趨宫闕實有長楊侍鳯池秋懐八寳山前精舍開石床泉磴翠㣲隈煉丹自穴烟霞洞把巻常登草樹臺數夢攀天珠闕近暫歌出塞紫雲迴承明三疏心偏憶空有皇都白鴈來賦邉詩九邉烽火四方聞臣子憂勞為國分民部嵗賫供戰士勑書時下勵將軍莫將和議為籌䇿但以忠誠諭檄文廊廟訏謨心一定折鞭堪逐虎狼羣題問津圗送趙憲副憲府清華即近臣况逢邉塞羽旄頻題詩格調多追古為政風流欲愛人書絶中朝權貴客劍隨四海不羈身王程正是闗心切好學宣尼早問津送沈憲府赴湖湘十載専城筋骨疲白頭今得外臺推人生最苦投珠暗仕宦何妨執㦸遲客路同袍應勸酒江城匹馬好題詩知君仗劍安三楚不讓功名治郡時送曹明府赴括蒼相逢斗酒醉花前舞罷那知是别筵客路論心何可罄故人分手各凄然山城旅鴈時雙度江浦征帆正獨懸君去嶺梅應併發莫教消息到春傳贈諸生戴子雍還浦陽十年車葢舊交歡千里旌旗意未䦨往往共遊庭畔竹時時同賦苑中蘭論心自恨孤蓬轉念别重逢斗酒寛寳劍平生多所惜獨知貽子不為難送何生遊河南公子本多遊俠氣經過况是大梁城時時仗劍心先去往往揮毫意獨横過逢慷慨歌徒發戀别躊蹰酒盡傾若到夷門尋古道為余拭淚吊侯生贈趙將軍鎮遼篇遼海長城入塞中虎符單出逺臨戎不因邊騎千重突誰識將軍百戰功目數黄沙心不分手調白羽氣偏䧺漢廷復道無名將獨取書生校射宫送王龍阜給事北上給舍郎官應紫㣲况逢年少有光輝春城曉日頻回馬秋浦寒花欲照衣蘭棹去從仙里别寳刀翻指帝城歸即登青瑣時簮筆莫遣清朝諫疏稀送張光祿赴南都月卿征斾正臨秋祖席清光夜欲流楊栁堤邉三疊唱芙蓉江上一孤舟南中風物爭新詠北固山河入壯遊莫向樽前歌逺别鶯聲依舊屬皇州謁楚王祠祠廟蒼蒼古水濵英魂猶憶舊宫春江山萬里非無楚城闕千年别有秦戰罷秖令身伏劍歌殘空自淚沾巾不知夾壘多豪士本是將軍帳下人將軍射林同莫膳部呉比部散步各成一首羽衛閒花雜帳開香塵遥藉馬蹄來黄鸝迓客啼偏急綠樹叅雲影亂迴衣拂遊絲穿宻徑樽邀落日上層臺應知對草三都賦不讓穿楊百步才贈王侍郎乃兄七十夀篇白頭隠吏住清谿天畔烟霞思欲迷歌舞年華逢七十綺羅樓閣是雙棲諸賔上夀花當午逺道傳觴月正西借問長安書記發應從柱史府中題題趙清獻焚香圗送張兵憲憲府排牙按五兵身留闗輔作長城曾披鐵甲親衝陣新起青樓欲望京不分疆隅頻戰鬭生憐俠客事横行夜分細語焚香拜一㸃丹心本自明題張華受劍圗寄朱兵憲憲卿持節制龍沙萬里懸旌不顧家手捲軍書常出塞身披法服早開衙籌邉自結平原騎救世難迴下澤車雷煥不妨為縣令曾將寳劍贈張華答陳鳴野社友十年赤縣頻為吏一䟽中朝便落官勞寄音書知夢在細籌世路念歸難馬蹄最識邉沙苦鴈影猶驚塞月寒詞客幸能憐旅况玉門應為賦生還答朱允中塞上何人為寄書遷臣一往隔年餘中原不是無臺諫故國猶聞有敝廬剩水殘山偏入夢迴風積雪苦難居白頭自愛長沙謫及問蒼生意轉紆題桓公受胙圗寄史司丞中丞匡合作三軍佐國勤王海内聞家築方城懐擁䕶手提䧺劍滅妖氛黄金結客麾如土白馬防川去若雲覇業㑹看圗牒麗人臣萬里不忘君贈劉都憲大夫持節按元戎千里山河在掌中心似旌懸勞衆庶身如罄折攬英䧺㦸門夜絶黄金客甲隊秋髙白馬功擬斷天驕窺漢北時將書疏達天聰攬鏡見白髮五載邉陲便白頭一生忠義向誰酬老同劉備羞髀肉貧笑蘇秦嘆敝裘抗疏闕庭身萬死悲歌京國涙雙流乾坤許大闗心事難聴書生一筆勾秋興四首秋風曠蕩泛洪波客子悠悠思苦多鄉國别時饒景物帝閽隔處是闗河中原王氣占牛斗絶塞烟塵數槖駝憂世向來曾涕淚臨流誰復更滂沱其二八月西風商吕開玉闗流調切徘徊懐鄉萬里懸明月去國三秋怨落梅鐵馬金戈南北競珠簾綉闥禁庭迴石潭芳藻垂綸處應有沉淪濟世才其三秋髙日見鴈南飛草色猶青宛馬肥朝士㡬時稱北伐羈人且勿念東歸虎狼得意偏穿徑狐兎成羣正合圍金馬玉堂多意氣白頭還是擁朱衣其四荒城莽莽近邉陲道上風塵羽檄遲沙塞自懸千里鎮漢庭誰賦四愁詩闗心老馬嫌秋早送目征鴻訝夢遲宇宙漫漫堪一笑纓冠束帶欲何為寄黄縣沈少府分符花映海東川繋鴈書迴塞北天黄縣郎官清徹骨白頭遷客懶於仙宗家門第烟霞裏帝里樓臺日月邉同抱匡時千載恨何時投筆勒燕然遊金河寺賦此二首􅀈嵂名山洞壑開千年杖屨我重來舊栽松栢今何處曾跨鸞凰去不回磵底流泉鳴玉磬峯頭落蘂結香臺為憐寰海多塵土欲訪巖阿濟世才其二山人學道隠名山來往盤陀水石間拄杖風塵隨地起講堂香氣共雲閒鉢羅樹老花仍在洞府仙遊鶴正還應煉丹砂飛九鼎藥成不為駐朱顔和李侍御行邉二首聖皇馭宇輿圗逺御史乘邉節鉞髙驄馬蹄分千里月繡衣帶映百城壕朝因獻納留霜簡野為巡行識羽毛知道赤心懸社稷好令諸將學龍韜其二匡扶意與東溟潤忠義齊名北斗髙崋岳千尋方設壘黄河萬里是臨壕盡聞沙草飛戈㦸幸喜山花映節旄明府若麾三尺劍野人當效六珠韜首夏偕劉望洋同訪傅侍御草堂初成欣然命酌柱史髙筵並日開仙郎結綺拂塵來穿簾燕子翻棋局隔岸桃花映酒杯詩就不殊鸚鵡賦樓成何讓鳯凰臺風光滿座憐長夏不用方宵刻燭催贈傅應臺中丞自江右移鎮闗中二首中丞仗鉞在荆揚重遣朱旗指朔方人望乖厓長守蜀帝知充國鋭凌羌先聲震疊凋鼙鼓勝氣飄揺入太常敬以一杯持逺餞㑹逢多士給壺漿其二秦中花鳥舊來那比嵗春風半入河陛下宵衣西顧切諸軍卧甲北征多應知赤舄能分陜不待樓船已伏波慎勿輕馳太原卒邉人乆唱隴西歌送徐古石考滿三年為宰在方城今日雙鳬赴北征父老擁庭爭獻納吏民馳傳願留行壺漿百道知恩在絃管千家是政成臨發不須懸奏計蜚聲早已動神京送張明府入覲秦時郡府漢時官珥筆驅車此地難獨有使君飛篆處不教郎吏竊符還江山直與風猷並魚鳥猶知徳澤寛能使聲名嫓劉寵千秋再選一錢看送程烟溪赴魯邸三年佐郡奏聲名今日離歌一劍横呉市門邉飛騎出若耶溪畔折花行掄材稱作長沙傅綰綬遥臨不夜城贈别未須傾斗酒寸心長逐片帆征嵋山世夀曲贈少嵋譚憲伯峨嵋山並極星懸長遣光輝甲第旋四序玉樽歡綵服一堂華髮映朱筵花邉舞影雙雙起葉畔歌聲疊疊連解道丹丘即此地何須拔宅羡飛仙青霞集巻六
