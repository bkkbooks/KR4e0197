body:
  text: 青霞集巻八明沈鍊撰論二老聖人任萬世之綱常始終一而已矣夫聖人皆欲順綱常以安天下於無事顧其地之所處時之所遇有異而迂迴不可通故從變以行權然綱常一易萬世何賴故守經以立節伯夷太公各有趨矣方周之興天下孰不從者伯夷獨叩馬力諍明天地之大義至於今忿激振起者誰之功也雖然且始有大謬於終者倡武周之不臣觀兵而折之何慮之晩耶夫君臣之義不可逃於天地伯夷豈昧之者顧避之北海是可逃也聞文王作欣然來歸使天下隨之去商而懷周是不臣之倡也夫終將責人以事君而始則身避之終將責人以從周而始則身倡之其與太公之始終於周者異矣豈真志於食粟而不顧其他乎抑亦不知周之將王乎抑亦不察天理人心之正矯激以要首陽之名乎且紂之凶徳雖無武王民必亾之伯夷奚怪焉然天下方戴文王而以事殷不改武王陳師在父死之明年何天理人心之遽變耶噫伯夷之非武王也猶其就文王之心也當紂之亂社稷危在旦夕輔佐之則不可坐視之則不忍覩不可之勢抱不忍之心我將焉歸故避之北海非忘君也我避北海矣思天下之民何避天下之民何避而紂亾亟矣幸而文王修徳西郊天下之民方延頸以圖一朝之安圖一朝之安則讐紂之心稍解而紂可以圖一朝之存伯夷以為存殷之計莫善於此故起而西就率天下之民以事文王而文王率天下之民以事紂民賴文王以安紂賴文王之安民以存伯夷亦何樂北海哉聖人之出處必斷之以道義避紂就文王大節所係不可苟者豈無為哉如以文王善養老而就之如以紂不善養老而避之舉出處之大區區於身謀之私而不為天下計至於勢已窮迫乃出危言以駭天下而前此畧不之顧豈聖人之所為哉信乎伯夷之節不待首陽而後見立於文王之未沒聲於武王之赫怒也武王豈欲伐殷哉不得已而從天命順人心而起焉伯夷以西伯望武王武王不幸而不得為西伯亦未始以伯夷為非我由是言之武王行仁之功於周博矣伯夷仗義之功於周遠矣成王立而二叔叛其叛也固有辭而後子孫綿延不替者不知武王太公之仁深入之抑亦伯夷之義培植之夷之出處聖矣養老而歸非為身也采薇而死非為名也義存而身顯節立而名彰尼父稱文王之至徳曰以服事殷伯夷盍歸之義也稱武王曰未盡善伯夷叩馬之節也然則太公之在周所以成武王之仁也伯夷之在殷所以佐文王之節也二老者天下之大老也仲尼稱水何如人之言道之無形者然乎曰非然也道何為其無形也哉以言乎遠則不可窮以言乎邇則不可間以言乎天地之間則無往而不存故形者形焉而無所謂無形者色者色焉而無所謂無色者蓋形形者有之矣而非曰無形也色色者有之矣而非曰無色也渾然其有本原而淺者忘焉燦然其有條貫而瞀者惑焉嗚呼道昭昭於天下而固曰大道無形吾何以聽之哉仲尼所以亟稱夫水也夫仲尼之心不忘乎道而其言不離乎道一語一黙以為學則以道諸已也以為敎則以道諸人也然則性與道之罕言而水之所以亟稱者何哉余於是而知子貢之徒之為淺且瞀也聖人之心日孜孜以覺天下聖人之言日汲汲乎以進學者於道徳也而曰夫子之言性與天道不可得而聞也其為淺瞀奚疑焉聖人之不言乎性與道也則曷為亟稱夫水也夫天之覆於上也人見其穹然而已而孰知其示人以易也地之載於下也人見其隤然而已而孰知其示人以簡也不曰仰以觀天乎不曰俯以察地乎是故人能知天之為天地之為地而道之本原斯昭昭矣夫人之耳目口鼻置之而至當也物之方圓平直播之而至精也不曰近取諸身乎不曰遠取諸物乎故人能知人之為人物之為物而道之條貫斯昭昭已然則斯道也形諸天而形焉形諸地而形焉形諸人而形焉形諸物而形焉焉往而非形色之布也焉往而非道哉故道也者天地之所不能祕諸跡而聖人謂之欲隠諸言乎然則水也者固天地之所不能祕者也昔者莊周觀於濠上矣其言曰魚之相忘於江湖猶人之相忘於道術也夫莊周氏之言則二氏空虚之說謂道為無形者也其諸異乎聖人之稱水矣夫水之道博濟而無私因形而制象善避而不爭旁行而不滯内實而不盈迅疾而不留深濳而自得流播而無窮此八者皆人之善行而水具焉博濟而無私者仁之澤也因形而制象者義之方也善避而不爭者禮之讓也旁行而不滯者智之機也内實而不盈者信之積也迅疾而不留者勇之決也深濳而自得者徳之容也流播而無窮者道之宗也故夫水者天地之用而五行之先也君子觀於水而道不可勝用矣仲尼亟稱之固樂夫道之流形而鼓舞於天下彼不見夫道之大全謂道為無形者自子貢之徒已然矣而况二氏之說乎是故天地人物者道之具也俯仰遠近者學之資也君子知幾而體道因物以取資則焉往不學而獨於水乎故仲尼之取水取其大者也雖然其亦有所不得已者也河出圖洛出書天下之所謂瑞也而不知天地之心有所不得已也蓋天地之道見於天地著於人物亦昭昭矣而人不能知故不得已而洩於圖書聖人之一語一黙莫非性道亦已昭昭矣而人不能知故不得已而亟稱於水故洩於圖書而天地之心窮亟稱於水而聖人之心亦窮矣四皓四皓其可謂髙士耶四皓之出有三失焉隠者之髙蹈而接儲貳之聘失之輕當道徳之名而為迫脅之事失之詐老而退休不絶世故失之愚輕非所以重節詐非所以一義愚非所以達道一舉而三失并之此烏得為髙士也哉據遠位者處義精處義精者逢機當所謂髙世之士者其於出處辨矣神龍乘六氣以巻舒麒麟鳳皇之隠見治亂稽焉是故伯夷微子髙逝而深藏不可謂之枯槁傅說伊尹釋耒耜畚鍤以從事於弼相阿衡之任不可謂之追隨雷霆以夏出雪霰以冬興鳥雀晝號而蟋蟀夜吟各當其時而已矣四皓之興當秦之衰漢之未興也暴強煨燼之餘而起之以寛仁愛育有天下者非劉季而誰以髙祖之賢而輔之以道徳匡之以禮義其於三代之英庶幾可及而四皓之志何闕於此而顧避逃深谷求之不得焉四君子於是乎失時矣謂髙祖嫚罵輕士抱義而不與非也髙帝非簡賢者也其所唾溺者直竪儒耳知子房之賢則尊之而不名㧞韓信之才則拜之為大將世無子房韓信之操宜髙祖輕之即四皓之名既以傑出二子矣使其得以事之蓋尊敬不啻焉烏有所謂嫚罵者哉訊其名而不考其實擬其迹而不覩其心四君子於是乎失人矣由是觀之四皓非有道徳之實特驕亢為髙之士信斯志也終身竄伏隠蔽草野茹商山之芝歌採薇之曲雖有聘幣望之若泥塗輕之如飄舟果而不出以卒遂兹志不亦可乎持義不明故纖末之情易動抱志不終故功名之念卒興以百年之遐齡棲遲遠逃進不為帝師退不為王佐以儲貳一聘而遂出之卒為子房之所舞御區區羽翼非有竒謀偉議以動天子者可不謂輕乎以隠逸之賢道徳為謨其所以調䕶者入不能導父以慈出不能導子以孝但云願為太子死者夫以英豪曠世特起不羣之士豈以一聘之故而遽為人死哉其鄙謬之語特出於一時迫脅之策耳可不謂詐乎夫輕其身不足以重天下就其術不能以成大功四皓於是俱年八十九十時矣而不能深蟠遠舉以與造物者游乃為此碌碌之節何其為人者重而自為者薄也可不謂愚乎莊周不受楚王之聘以非時也孔明不從襲魏之策以非義也太公晚出而為文王佐卒以鷹揚時義俱也以四皓之髙而不及乎此亦幾於偽矣或曰四皓不出則隠哲沒世謀士失策儲君不寧是三者闕一不可子烏得而譏之曰四皓遯世之士也就其末路操持不堅卒依勢以取功名夫功名者非四皓有之子房操之矣即有淪隠之士混沌窈㝠以遊無窮不憂其無名也以子房之智駕御四君出其指揮即四君不出子房不憂其無策也夫髙祖之欲易太子也特以寵姬之故婉㜻而不能釋以髙祖之明吕后之强蕭張叔孫諸賢之諍雖微四皓其焉能易之四皓之來其得已者耶其不得已者耶君子之處也與道俱而出也與時合以髙帝而隠其隠也失時以惠帝而出其出也失道四皓之進退可謂無據矣内不足以履道外不足以順時大之不足以澤物次之不足以建功區區出於或者之見而卒不得其一以余觀之四皓之出為太子耶為子房耶抑自為也耶故曰四皓不得為髙士也喜怒哀樂未發謂之中聖人之道先天下而有者也道之於天下也無所不覆被焉而其所以覆被者不在於顯行之日而常在於黙具之時充然無不足而渺乎其未形也黎然其各有所當而渾然内藏也髙明極天博厚際地大包六合富有四海而泊然無所成所以然者何也先之也先之者非懸象而待之亦非設形以取之也物備而知至意融而理得無所將而無所不之焉無所迎而無所不通焉不必其時至而後動事感而後生豫之至也子思曰喜怒哀樂之未發謂之中夫未發之時寂焉漠焉則何喜怒哀樂之云哉無喜怒哀樂之云則何中之謂哉此足以知聖人之心不息而天下之道不遠也聖人之心何心哉天地之心也聖人之心與天地同者孰不能知之而不知所以同也今夫天地見而為陰陽焉流而為四時焉生而為萬物焉而陰陽之度四時之序萬物之數一成而不可改易者何也有以豫之也夫理黙定於其先而物流行於其後則可以知其豫也仁義者聖人之陰陽也先後緩急者聖人之四時也庶民者聖人之萬物也聖人非欲取則於天地其道之極固然也道之極固然則聖人之於天下不得不有以先之矣聖人固非先之也道固未始不先而亦未嘗不後也聖人之先之者何也天命之性而萬物以備率性之道而萬物以通萬物也者生乎其心者也聖人不能以須臾而離其萬物則豈能以須臾而忘其心之用哉曠乎不覩而形色兆焉寂然無間而聲音荄焉夫形色方兆而天下之變見周矣音聲方荄而天下之言議極矣兹其為隠而見微而顯者非耶是故心之運旋其猶太虚太虚之運無所積而慘舒開闢之妙存焉人心之運無所積而喜怒哀樂之故通焉夫性也情也心也政也一也動於其心發於其政皆不能離乎情之故則喜怒哀樂之端亦豈有須臾息哉故聖人之心動而天下闢矣爵服施與所以著喜也誅伐刑威所以容怒也賑恤憂存所以極哀也鐘鼓羽旄所以宣樂也故一喜而天下以懷一怒而天下以懼一哀而天下以戚一樂而天下以和聖人之情其動天下也如此茍不先正其情至於發而求中節焉不幾於以天下戲乎是故聖人之於其獨也於其未發也常若天下之人交焉而不敢有所茍也常若喜怒哀樂之發而不敢有所肆也詩曰君子如喜亂庶遄已君子如怒亂庶遄沮此其喜怒豈至於已亂而後有哉夫聖人不能一日忘乎天下則其一念之動非喜則怒非哀則樂此固常人以為人莫予知而可少肆者而不知聖人之所以中節者固已審於此矣然則中節者不在於已發而在於未發未發者當觀之於燦然而不當觀之於寂然寂之云者則内外之交喪性情之俱泊夫何喜怒哀樂之有是故道之有中也猶射之有的道之未發而吾心之中已審猶弓矢之未發而吾心之的已定也若未發之時而曰寂然泊然沈於泬寥而淪於虚妄則不慮而求獲不習而求成夫何發而中節之有堯舜之道髙明而博大深厚而久遠而求其要歸則維曰允執厥中而已矣夫允執云者若謂其矜持事為之末則堯舜之智不能徧物也若謂其固守靜虛之道則聖人一日萬機不能若是恝也故聖人之中以天地為體以萬物為用以天命為端以人情為極一動一靜而未始有紀非無非有而未始有跡六通四闢而未始有定千變萬化而未始有窮衆人之所謂無事之時而聖人之憂患未始見其無衆人之所謂有事之日而聖人之從容未始見其有此其道何為哉戒謹恐懼求其未發而已矣臣事君以忠論曰君臣之義其天地之極乎吾之所自盡之者而不自知也是故非有所啟而自不可離非有所為而自不能已根心根性渺哉微矣夫惟義之不可解而命之不可逃也是以上下之分貴賤之位綱維體統之制由闔闢以來未之有改也不然無所因而强合焉相率以偽相求以利而相制以勢雖居之以君臣烏能一朝守哉是故君子盡性所以為忠小人自賊所以滅命此義利之分也吾以義焉吾盡吾職吾盡吾心是則吾不期於忠而忠自不離於我如以利而已矣又烏忠哉嗚呼君臣之義不明於天下也久矣孔子曰臣事君以忠此言人人知之而所以事必以忠之故則天下所未知也况夫茫茫之初孰為君臣維而立之吾不知其所以始率而事之吾不知其所以自來也此豈非天機之相感而不能已者耶蓋嘗因而思之知君臣之義大而萬世不可窮也天地定位而君臣之義立矣天地合化而君臣之義行矣乾道主始坤道有終此變化之所興而人極之所立矣是故君臣立而天地之道成矣仁之所施父子親焉禮之所立夫婦别焉樂之所成朋友信焉萬事萬化之所以流行相生相息之所以各利此非君臣之功乎相須以成天地之化相接以成天地之道此非君臣之責乎君盡心以委臣臣出身以事君此非君臣之情乎功之所在而義興矣責之所在而義至矣情之所在而義不可解矣聖人垂訓而定之君臣有義之一言何其精切簡當而歴世不朽耶世之事君者亦當隠之於心而知義否耶知此而行之則雖欲不忠也而有所不可得不知此而行之要為無君無臣而已矣噫自夫知者寡而天下之少忠臣也不見臯陶禹稷之所以陳謨者乎以此而陳也不見伊傅周召之所以輔世者乎以此而輔也不見龍逢比干之所以殺身者乎以此而殺也吾義所在而吾心盡之則陳謨者非所以尚言也輔世者非所以立功也殺身者非所以要名也古之聖賢其存此之義也昭如日月其執此之義也堅如金石吾家在天下而孰知有家也吾身在吾君而孰知有身也一念之精炯然此義之發而不知有他尚安能以不忠哉嗚呼兹義之不明於天下也久矣相求以利而功之所以息也相制以勢而責之所以闕也相率以偽而情之所以疎也是則徒有上下之分而不得其所以協徒有貴賤之位而不得其所以承徒有綱維體統之制而不得其所以相須相倚之道而義命離矣是故懷利祿之私者竭私小之情歆寵榮之感者飭一時之美藏諂䛕之志者獻淺薄之術持婦寺之愛者致姑息之仁此亦所謂事君以忠而究其所以皆蕩然而不知大義之所在徒以自欺其心焉耳而得為忠乎哉此蓋人極將傾而大義亦幾乎息矣然則小人之所以滅天命者有二焉忍心而不忠者滅夫義者也私心以為忠者闇夫義者也兹義之不明而至於天下無忠臣也可勝嘆哉是故君臣之義不可以不深求之也深求而至於自得使吾不能以不自盡而不知其所以為忠者則君臣之義幾矣不然則雖諤諤庭諍激以為言也多多自辨侈以為功也感慨殺身矯以為名也毫釐之際倘未察焉蓋不得謂事君以忠也而况其餘也哉此君子之所以不可不知義也兹義也何義也天之經也地之紀也人極之所以立也子之所以事父者此也婦之所以事夫者此也朋友之所以相施者此也父不慈子不可以不孝夫不義婦不可以不貞朋友不孚吾不可以不誠而曰君使臣以禮則臣事君以忠此儒者之誤也故君臣之相係有父子之情焉其相成有夫婦之合焉而其相與也又有朋友之交焉夫子之言豈獨告哀公哉徳相修而世道寧矣責相任而天道成矣情相合而人道貞矣故曰君臣之義其天地之極乎清豐風俗論清豐為古頓丘蓋衞屬也自春秋以來至於今久為偏邑不近於都會考覽前世之載籍其卓然篤於道徳稱循良之吏不可得而見然則倡明敎化令風俗淳美其道何由風俗者譬人之氣質也敎化者譬人之問學也變化氣質則莫如道問學變化風俗則莫如明敎化故為人上者之敎化不可一日不明猶君子之問學不可以一日而不道清豐之風俗蓋嗜利而畏刑重忿而輕死是其性過於剛而偏於急記曰人禀五方風氣剛柔緩急不同清豐據平原無髙山浚川紆迴宛曲水流淺而土埴燥其急固宜余直以為非獨風氣使然敎化之不明故也何者後世之治其大者朝廷之法制為守令者奉行之而已其善者未必有以揚之使直其惡者未必有以激之使撓間有當其其職者曰是適然相遭吾固避之安得長守此土哉法制之持人淺矣而法制又未必盡善敎化安所明乎先王之時仁義之道昭明如日月而為之憲典為之條目懸之以象魏董之以官師警之以木鐸其所以導迪斯民者靡有燕暇而孔子猶曰民可使由之不可使知之以今言之獻拜絃歌禮樂雍容之道存者若摽梅而獨以法制之芒刃約束而馳驟之其於移風易俗何以異於釋舟楫而泛江河其不為風波所溺者寡矣敎化不明則禮義之方不著而人之慮思也淺故急而多過敎化行則禮義達於上下而人之慮思也深故緩而寡尤然則風俗之急非獨清豐一邑而已而敎化之本亦未可徒責之守令耳守令之道宜如何法制敎化非拆而為二若東西而南北者也風俗之所以不至大壞者詎非法制之功哉因法制而敎化之道行焉使之深思而遠慮感發於禮義斯守令之道已故善為政者以法制為敎化而風俗興不善為政者以敎化為法制而風俗弊青霞集巻八
