body:
  text: 青霞集卷九明沈鍊撰兵說變化第一兵之道神乎非聖人孰其能之一剛為龍一柔為蛇蟠屈翺翔各有其時非獨旌旗之見伏而已也動靜幾之矣揚舉第二聖人動於昌行於不得已以道顯明於天下而使之知所從焉則不可示人以晦矣大義發而日月光昭鳳凰翔於千仞之上誰得而攀之偃伏第三大將之偃伏也不獨旗鼓其為善藏喻於九地之下矣恬乎其無為塊乎其若愚留侯燒絶棧道而項羽安意焉其幾於此乎純强第四聖人達於性命之理與天地同運無有所屈其神蕩蕩其氣浩浩常以百姓之心為心雖有險惡不能析其義精之至也順容第五大將之養其百姓也若諸君子無所不包容之就之以其利懼之以其害無小大無衆寡若海之納於百川若山之承於土壤其博厚至矣乎見幾第六大將之用兵其見於幾也微微故不可知泰山之勢起於無形雷霆之轟轟於無聲炯目而營之提手而將之其幾於全勝矣著令第七將之所以勝者以其典法章也旌旗以明其目金鼓以聰其耳號令以憲其心如日月之明如星辰之光於是三軍奮矣軍戒第八為將之心兢兢然其戒於三軍朝令而夕申之慎之至也夫國之存亡人之死生懸於一人而弛然忘而戒心其不仁甚矣審勢第九三軍之形勢具矣器成而法全然猶審於敵家之動變生於兩陳之間竒正發於無窮之源知幾之極也大舉第十正兵既備竒變已立兩軍之交將軍提鼓呼衆鼓鼙交作萬人齊聲轟然雷電發於域中滅此而後朝食其誰敢不奮乎知止第十一聖人功成事定則棄而逃之不見其色卷舒之道也故曰王者之道如龍首髙居而遠望深視而審聽其知變化之道乎軍權第十二兵無形形於機兵不動動於權故不爭而善勝不爭者常弱善勝者常强吾深溝髙壘而天下之人莫犯焉為其能權權之又權其全勝之術乎知微第十三聖人無死地者以其知兵之至也聖人之知燭於冥冥一剛一柔變化無方故莫之能抗聰明睿知神武而不殺將脫萬物之死而生全之而况其身乎無戰第十四兵之大機可使不戰而勝於天下以其精於權之至也微乎又微入於無形純乎其純洽於大常不出樽俎之間而折衝千里之外至善之道也韜光第十五聖人察於天地之動蚤知而先識中心蘊藏之鬼祕神伏逮一朝而光曜發言乎其順時也乃若不蓄積則機匱不簡練則器鈍雖有時至其能若之何密機第十六三軍之士銜枚疾走而無風聲此其令之嚴所以為機之密與豈獨三軍大將載輜重而行儼乎其對神明而無牙齒之失雖有巧諜莫能窺之矣文伐第十七禮樂者征伐之本也文章者政事之資也揖讓退遜而强梁梗化之徒濳移而默奪則勝於刀鋸千萬矣血戰第十八夫血戰者策謀之下也然而兵家不免焉故忠義激烈之令行而三軍忘其身輕生敢死之令行而三軍忘其敵復仇報恥之令行而三軍忘其家盡力竭氣無有內顧則强梁之勢靡矣尊王第十九為大將者一舉足而不敢忘君焉則三軍之心知禀令矣雖在閫外為之主位設環衛而受事焉以君命行則家不敢私而人亦不敢怨誰謂三軍之不心服乎軍師第二十三軍之興也雖有上智之將不立之師則無以宣導教化故禮義不章士卒驕惰臨敵而遁矣昔禹之誓軍以益為師湯之誓軍以伊摰為師鑑於明鏡則妍媸别矣問於蓍龜則吉凶著矣軍師者三軍之明鏡蓍龜也轅門第二十一設和以為門崇牙巨纛三軍望塵而知畏焉則法令行矣故雖無仇國敵家之變而威儀以肅然左右前後旌旐精明啓閉以時金鼓隨之不待夜而柝也皇帝訣曰轅門嵬嵬若山之崔轅門沈沈若海之深觀諸轅門而營陳之道舉矣精研第二十二聖人之心常若圓寂聰明睿知其至矣乎而猶不易然幾動而精研之其大不皎其細不昧故通乎人心通乎四海通乎神明無所不通矣兵道第二十三兵也者道也勘亂之謂兵適治之謂道治勝則亂愈彌亂息則治愈光故聖人之兵不以戈㦸而寶於法寶法則消禍於未形矣何謂非兵乎權道第二十四人主失權而天下之亂生故為大將而不明權則不足以治衆定亂權也者非威武之謂也舉不失道寡而能博是操其鍵關而天下之出入由我矣全勝第二十五聖人之道以全取勝惟其蚤見而豫待之知幾之至也譬之於射研於胸臆之間而決於百步之外其不中者鮮矣射義第二十六弧矢縣於天將之肆兵莫如射射者人情之所習也而榮辱生焉擇善射者為之師闢圃而校焉比賞而樂焉申令而不息焉三軍之心奮矣神會第二十七山谷之間大山之南四面回合三川繞之十萬之衆藏於其中廣地拓為轅門八寶會焉萬物拱焉禺合之徒化而為羊俯首而橫木於以獻王樹以青旗朱為之文沈沈乎雷電之將發神靈守之矣山髙第二十八山髙巖巖乎幾於躋天發殺機兆於西華山雖髙崩矣赤黑之雞其鳴相應將入我疆仲夏莽莽星穿其月雞之東西無有定處忠臣孝子皇皇夙夜擊楫長歌一朝恢諸夏也乎大江第二十九大江洋洋焉納彼百川以宗於海起自北陬及於南服故能攘臂而運舟航則龍蛇變化波濤百出實超於羣羊者乎我有朱丹以為腹心秉質恢𢎞何兵之不可摩乎神兵第三十英雄之用兵神階乎道炳於幾先乎沈沈乎泯泯乎孰從而窺其端故非戰而天下默然從之則神於兵矣神哉神哉不為物先而無非先不為物後而無非後髙明之心恐不明於天下及於功成事定則從赤松而遊焉龍馬第三十一聖人乘龍馬以驅天下非龍無以變化非馬無以流行爰有大義以扶社稷以為生靈非周公孔子之道而行之是為逆矣化而裁之變而通之不必功自我出名自我成故其道尊率義第三十二恢乎聖人縣權而動則莫大乎以義而率天下君臣父子之道明天下之兵可得而舉矣率其子弟攻其仇敵未有不勝者也躬行以帥之訓典以明之物采以彰之風聲以振蕩之一日克已復禮而天下歸仁焉太公第三十三昔者太公望釣於磻溪之上八十一而為王者師况於三軍軍師者教化之主也上通乎天中通乎人而下察乎地其智沈深金心木舌提劍而天下定矣道化第三十四夫兔生於月天下之馬可得而追之聖人以道化天下陰陽相生日月相合被乎五采之彰而純白也棲棲然皇皇然雜於牛羊之間擊磬於衛吾固自保而不求於人不義之富貴於我如浮雲吾其為東家之丘也與哉倚數第三十五道之生數也九而十八十八而三十六有以哉還復為一一而合十焉十而分五焉十五而兵道舉五十而伯道成九合諸侯一匡天下微管仲吾其被髮左袵矣萌於六甲而福德會焉乾於乙炳於丙而明於丁至於丁盛矣茂於戊包於已更於庚新於辛任於壬揆於癸故癸甲之交犬羊動焉動於彼將以應於我與孳於子紐於丑演於寅冒於卯振於辰紀於已交於午午也者當天而應運其猶堯舜之時故以歲以月以日聖人走馬而定天下非以此哉余是以知堯舜之興會於未重於申囚於酉折於戌該於亥古之順天時者如此矣權竒第三十六救危援急以權權者竒也權竒則運天下如轉圜矣聖人之用權也事要而功博勢奮而理順精研其情若覩日月力蹈其事若決江河所以通神明神明通危厝而急解矣英雄第三十七濟天下之大事莫如延攬英雄矣記曰羅其英雄則敵國窮英雄之士慮幾於造化識超於四海俗之所不解而忠震焉一人可以當天下而况其多乎聖人所以倒屣而迎之獨見第三十八夫英雄察於海內則知世之所謀與故有獨見獨聞而人不知並觀於天地博參於人之耳目於是延訪道路而敵人之肝膽覆露矣大義第三十九揭揚大義而人知所向風則人心可得而通焉夫濟大事者必以人心為本忠邪之分不明勝敗之數不決天下之顧望而懷私者多矣故曰精於權而天下之兵可齊也順天第四十聖人之動也必順於天天地順矣而四時未順焉不可得而動也四時順矣而昕夕未順焉不可得而動也察於星辰卜於干支而徵於風雨晦明聖人之動其有不吉乎理亂第四十一理天下之亂者如解亂絲而一分之益以亂古之聖人其心間間其智潭潭從而循其端提其綱領席卷而驅之行陳第四十二兵家者流亟乎其言行陳乃亦有之夫陳陳也形生而陳列原於一分於五究於九九九而八十一而變化備矣儲財第四十三國多財而遠者來矣賞當其功豫之而取也而財不匱罰當其罪取之而豫也而恩不窮人心歸而財貨流武有七德而卒以豐財不亦信乎辟地第四十四諸侯有善政則草萊不生而五穀登矣故莫如勸農勸農之實在於均徭均徭則民力不疲得盡於南畝征伐之上策也鬼神第四十五庸民之心不以鬼神則不寤故敬於宗廟而民知孝祇於山川而民知肅享於百姓而民忘其勞矣取豫第四十六知豫之為取者政之寶也衆人但見君子之豫人甚費不知其取人甚博從人之所欲而其所欲歸焉故曰聖人以其無私而能成其私昭昭矣命令第四十七令順於人心則沛然下之如流水矣故令其所惡而禁其所欲雖聖人不能行之則愈行不行則愈壞命令之不精政之大蠧也備患第四十八惟有道者能備患於未形也則禍不萌故思患而預防之者治之至也其機深其慮遠害至而不為之備禍生而不為之防吾末如之何也已矣蛟龍第四十九蛟龍得水而神可立也喻君子之德矣君子以天下為家萬物為體不祈於民而民自歸焉是變化之徵也人皆曰豫智舍其大者而取其小者烏得為智哉虎豹第五十虎豹托幽而威可載也聖人之惡惡嚴矣孰謂其為威然豈轟轟然日求惡人而誅之哉聖人之不示人以小也慮沈而遠機發而當彼為惡者不悛其孰得而逃之名運第五十一名之運也大哉其轉旋天地猶有餘力也故聖人不愛寶玉而愛榮名謂其無翼而能飛不謀而自成此豈聲聞過情也哉抱獨第五十二夫功名足以震萬世而耀千載者必有獨知之明矣獨知者獨聞獨見獨出獨入下學而上達知我者惟天至於道久而化成德盛而人服猶曰蕩蕩乎民無能名焉爾分軍第五十三大將之所以戰勝攻取者謂其能分三軍也不能分三軍則猶士卒也何以為大將三軍之所愛與畏不能舍我則雖欲無戰也得乎收羅第五十四收天下之豪傑羅天下之英雄則不戰而敵國懼矣故君子必以道勝不以道勝於天下則賢人不來賢人不來謀議不達而欲驅庸夫俗士以成功名者鮮矣哉布德第五十五管子曰夫欲用天下之權者必先布德諸侯是故先王有所取有所與有所屈有所信然後能用天下之權夫布德者非所以市道交也必先其志義敦其禮節而諸侯之心并矣勤王第五十六求諸侯莫如勤王夫鄰國相救援然且聖人重之而况於勤王夫大義發而天下服故天地如之顧望因循毫髮不萌生濡其頸血以濺白刃欲無勤可乎火攻第五十七寡而能為衆弱而能為强則莫如火攻其為力純其為勢昌無城郭而固無甲胄而完無車馬而驟無斧斤而利夫惟火之烈故望風而遁焉歲德在丙月令在夏火之勝也著明矣陰陽第五十八夫大將懸賞罰如陰陽二氣然賞者陽之舒也罰者陰之慘也陽僭則萬物稿陰濫則萬物流而造化匱矣聖人縣其柄毫髮不爽焉此天下之所以成化也五行第五十九五行之用不可勝窮故兵家取法焉用木所以破實用火所以逼衆用水所以浮深用金所以割殘用土所以伏本然其變化火流而水烈金走而木飛深乎大公其造化於此乎豈曳裾之流所得而知乎一氣第六十神兵之動以為一氣一氣者一氣之所化至陽之精貫於金石何况於人心故非鬼非卜非詐非力大道之轉流而不息及其感受而陰陽之氣結固矣浸幾第六十一天地之道一氣不頓盈亦不頓虧其何可二之聖人與天地同德故能成天地之功夫驟進驟退潰濫而決裂烏得不山崩川竭乎聖言第六十二夫聖人之言非自言也神為之意而道為之文時至而言生言行而化流將納天下於軌範之中造化胥賴焉其何可侮之元惡第六十三夫天下無元惡大憝則聖人不生焉故不善者善人之所資也其不善愈烈則其善愈幾聖人之為善也因小人之情僞而模範出焉有道之將其所以致敵知此其由矣回風第六十四天下之人心不使之回風向道而欲禁天下之亂有是哉亂之生也有幾禍之作也有源天下不得已而亂聖人不得已而出疇知之哉疇知之哉密機第六十五天下有明智之士則治亂之機可得而察矣出言行事惟恐人之不我為者小人之道也出言行事惟恐人之不為天下者聖人之道也聖人何以異於人小人之所惡衆人之所疑達者之所信其殆庶幾乎自治第六十六夫天下攘攘亂而不已其必有由乎未有以亂而能治亂者以亂治亂則天下將熄萬物將滅未必不由之所謂人臣者能自治而三軍治矣三軍治而天下之亂可治矣今三軍之不治而曰我有以樹威制勝何由哉善惡第六十七天下有曉然為惡而人曰未必其惡之如此也天下有曉然為善而人曰未必其善之如此也則如之何此其為治亂之機也與從於惡則亂日作矣從於善則治日興矣不先辨於善惡之向而欲以除殘去殺者未之有也通變第六十八為上者不先養民而先養軍不先節財而先理財此欲天下之平也亦有期乎調十萬之衆而無期月之食民日貧軍日惰財日竭而用日繁其至於土崩瓦解非但朝夕也為人臣者惟人而因循拘滯欲不死也得乎消軍第六十九屯一萬之衆一日不食可乎奪百姓之財一朝空乏可乎屯兵無食朝夕不解則內亂作矣軍師無食則雖欲戰而不可得矣况於奪人之財而養無益之衆誰謂盜賊之攻人人之自攻自毁也亦已甚矣安民第七十百姓輸納終年而無一日之恤三軍養給於上終年而不用一日之力事之倒行而逆施者有如是乎世之為計者無曰破敵而曰安百姓則百姓之心服而三軍自可以戰矣決斷第七十一天下之事有可望而遷焉則未之敢斷也明志之士深思其故有不可得而遷則已立斷矣夫蝮蛇螫手而壯士疾於解腕猶可以全軀也解腕猶可天下之事猶不至於解腕者矣亟疾第七十二浸潤者化也亟疾者機也寒暑陰陽四時而移焉雷霆風雨則勃然而發造化之所以神也故聖人精思而立斷其亦有不得已者矣精解第七十三聖人之所以通天下之故者為其精解也聖人之心無所用其用也當無所思其思也睿衆人之心則游於物夫物自物我自我彼烏得而殽之惟不殽於物而天下之物為我御矣生殺第七十四天將以生人之厚則殺人之多矣天何為殺之聖人使之然聖人不以私智御天下天下不大亂則不求於聖人天下不求於聖人則聖人不興聖人不興則大亂不止仁義之道行而天下大治此天地之心乎心服第七十五惟道義則能使人心服富貴可求吾亦可尚詐而不仁矣仁不可昧詐不可掩而富貴不可求則將安所從乎故聖人之權於道義舍道與義而竊權之名天下誰能心服乎救人第七十六君子之道惟切於殺人則不能已人之所以仁自其本心安焉彼不仁者亦皆藉一說以便其自營之私以其有所藉而後敢肆知其心之仁矣審因第七十七君子之心雖切於救天下然不察時幾率意而行之未有能濟者也察於時幾者謂之審因審因而動譬如蛟龍得水則變化不可測此其為將略也神矣乎獨立第七十八其審因在人其獨立在我聖人極深而研幾善於誘人其不可誘者不能强也其中而孚者不能違也非獨人不能違天亦不能違之知幾其至矣亦何有獨立之有殽乎將權第七十九將機之所以譎者何也夫譎者生於誠者也聖人之待其百姓如赤子然如物或害之其焉得不為譎乎故聖人以道事君子以機待小人機也者待小人之道也殺之而不忍况欺之乎得天第八十聖人終日乾乾不離乎天道聖人之於人必有不能得者然未嘗不得天也天有不得乎人而聖人未嘗不得乎天其斯以為聖人乎補過第八十一善莫大於補過補過者審機之道也故有道之將轉禍而為福因敗而為勝所以出之可無窮其勝不喜其敗不懼以是全勝於天下孔子曰不怨天不尤人自盡其道而已更何必怨尤乎青霞集卷九
