body:
  text: 青霞集卷五明沈鍊撰歌題東方朔圖我即是東方朔王母蟠桃手曾摘三千年開花結實不為遲銀箭壺中方一刻黄金白玉夢境迷世間那有偷桃客偶成淮陰小兒欺韓信跨出市中不自禁須臾西馳謁相公築壇拜將生威風千金相召輕薄子膝行蒲伏驚欲死昔何倨傲今何恭將軍顔色非不同世態悠悠久自知天下多少淮陰兒長相思思君祇欲見君面君在天涯那得見可恨東風入畫堂捲簾惟有雙飛燕愁雲溟溟晝不開孤月娟娟夜長怨日暮無端飛雪霰消落梅花不盈片對此長題尺素書何因得借春鴻便題鵞山小像嗟余本是茹芝客見君芳華婉若蘭石交非因斗酒結寸心那用尺書殫意氣相歡綰雲霧白日奉以朱絃彈知音㑹賞陽春曲寡鵠誰舒萬里翰知君四海意相鄰見君畫像情亦親緗素披觀本遊戲丹青貌出猶風神龍章鳳姿意夭矯虎頭燕頷生殊倫長康正喜傳瞳子元亮何妨頂葛巾詎憐風骨比雲霞自羨高才盛五車手校六經心獨醉神遊八極氣偏賒更將餘事工詞翰猶使聲名冠永嘉長握明珠歸合浦恨持寶劍隔張華人生窮達豈能期弦望從來自有時伏櫪應知心不已封侯那得數偏奇獻策十回曾遇合揚鑣九折在驅馳莫信今日書生相麟閣圖形未可知送張玉亭慮囚淮陽今代張衡屬省郎三年粉署盛輝光入曹永日花侵篆劍佩飄揺坐未央晝習文書承禁漏夜開墳典炷名香寳刀久久生星宿綵筆時時詠鳳凰既逢鵷鷺承清切復道芝蘭比芳潔草書寫罷落飛雲奇畫題成舞流雪聲華世重為八龍藝苑人稱讓三絶當世誰先鄭廣文生前恐是王摩詰方傳麗藻盛西京又秉旌麾出鳯城使節從來天上發公車疑自日邊行將垂訊伐先揚命欲效馳驅敢問程滿月漸隨征葢去海雲正逐鼔鼙生競識諸卿車馬過共臨祖道振鳴珂十行布席花如錦百處傾壺酒似河誰羨陽阿為楚舞必宣大雅入驪歌郎官出按征夫盛才子將行送者多嗟余本是同鄉郡蜿蜒山河心彌近十年為宰世所嗤累日驅車獨相問人生所貴心相知斗酒綢繆永投分臨岐不必嘆分飛赤霄羽翮時能奮送張甌江符卿張公子佩玉環意氣凌雲體自閒玉環連蜷若明月盈盈三五無虧缺衣邊結響勝鳴璫劍裏回容輕佩玦半面初辭鈎弋宫全身正奉咸陽闕婉婉規中度悠悠象外懸玉以銘文徳環以喻周旋丈夫纓組横九州心似明珠爛不收璇璣斗宿光常滿鍾鼎江河意欲流九蓬遼叟乗風轉韋約西門繞指柔非是馳情懐尺璧直因托意在千秋送吕子出逰宣大吕子生來有竒氣結髮讀書恒念邊千金覓劍星文動百金買馬生骨全陰符一卷手自注闗山片月心常懸五陵豪傑盡傾葢談笑驚座如流泉朅來仗策逰燕京黄閣鉅公知姓名吐哺走迎談世務指揮如意煙雲生抵掌伊吾坐揮霍出門擁盾思河朔夢想龍沙白骨迴黄塵萬里難遥度慷慨登塗若舊逰風沙颯颯近邊秋弦歌不似聽刁斗飲酒心思血敵酋誰羨今宵意氣雄明朝走馬學飛鴻隴邊弱草疑天外塞上閒花隔世中朔漠懸心雲半黒長安迴首日偏紅羽檄曽傳鐵騎多胡沙連箭入黄河將軍盡日愁披甲戰士經春出荷戈曹郎度支籌不足指大憂懸在心腹樞臣按籍欲徵兵天子宵衣願推轂自識中朝有申甫詎言四海無頗牧余亦滄江學劍人十年為吏在風塵請纓自羨凌雲客投筆曾無出塞辰聞君將發意婉娩手握軍書夜舒卷非是羌戎善騎兵自因邊塞無闗鍵道勝魚龍或可馴令深虎豹猶堪偃奇功正好斬樓蘭名馬行能徵大宛人將筆硯薄書生世以麒麟驅赤坂去去雙旌已及秋行行六轡毋令晩男兒㑹自策勲名詎識不為班定逺古樂府聖人出聖人出應運期黄河水清丹鳯儀五星連珠光聚奎鐵樹璀璨花紛披五雲扶日中天垂山谷發祥金陸離陰黍不待陽管吹龍蛇夭矯熙盛時熙盛時聖道昌手育黎庶登泰康仁聲義聞八表揚奸軌震疊濳消藏金石絲竹調文章聖人出禮樂興櫜弓矢陳六經上之回上之回馭六龍雲霞布日當中敬日躋予心恫展徳澤揚仁風穆以愉麗寰區露為馬雷為車林有鳥河無魚憂與樂惟所須光旦旦玉燭爛常明明禮樂燦上之回所中閨靡出入亘九垓戰城南戰城南傷乎悲將軍隻手安可支豺虎當路人饑疲雖則饑疲朝廷恩安可虧海宇茫茫誰惟思我為忠臣人不知忠臣死時心轉足力盡筋衰堪瞑目聲名非是身外傳人心動處神靈宣光明可以耀日月九原何處非青天血肉之軀何足憐捫心念之安得眠長門怨玉殿疑天上珠鈿在鏡中怨多偏望月恩斷不隨風細草留承輦飛花送出宫若心倘回轉妾貌尚丰容天馬歌天馬權竒禀靈骨横空萬里思超忽赤驃本是房星精飲水由來經月窟天馬嘶鳴心膽雄山驚虎豹海躍龍吸風嘘霧不受秣意氣常欲吞溟濛天馬復天馬獨立襄陵野過都厯塊安足為世間未有齊驅者箜篌引公乎公乎聽我言河流洶湧波瀾翻斂身收足莫西渡渡河而死誰煩寃河流何太濁發源高山邊山崩川竭等閒事渡河死者真狂顛青草歌草青青兮春意多牛羊下兮思若何哀薄世兮涕滂沱壯士憤兮摧江河雨不澤兮風不波年嵗逝兮成蹉跎望夷門兮日來過嘗有客兮居山阿天涯曲來牛去馬運方興兮天涯草昧誰平定兮盡節盡忠臣道貞兮一匡天下垂令名兮時哉難得秉元精兮邯鄲少年行邯鄲城中俠少年從來意氣凌雲烟拂拭琴樽擬文士飄揚劍珮比神仙交逰洛下三千客詎念城南二頃田心知象緯時常玩手展龍韜夜自研曾習春秋魚麗陣兼通風后握機篇未能報國心先許不遇輕生意已捐黄金祗為酬知已赤驥將來獵酒泉席上弦歌教出塞室中圖畫盡三邊鳴笳每憤邊戎入折㦸常輕漢將權安得一懸金印出長驅萬里勒燕然報國吟長安近兮我所思決壯猷兮日孜孜龍有翼兮鳳有文驥悲嗚兮思其羣世路隘兮誰當闢撫長劍兮凌青雲火燃曲火光煌煌從中起烟塵直達重營裏班超奮臂鄯善愁誰令定逺不封侯將進酒將進酒一飲千鍾未停手豪華倜儻傲公卿酣歌擊筑衝牛斗我不是高陽舊酒徒亦不肯買醉黄公壚劉毅家無卓椎地何用袒跣而呼盧仲尼大聖飲酒無量哺糟六籍生風雲醉裏乾坤何曠蕩玉壺金爵雅容禮樂門牆桃李發陽春道上魚龍起瀺灂正君臣序父子萬世人心原不死絃歌一曲雅鄭分五色文章辨朱紫世人皆醉我獨醒醉醒詎在樽罍裏君不見董卓專權築郿塢黄金積多賤於土王允濳謀結布兒一朝事成如縛虎又不見寵臣禄山入帝閽九齡識相輸忠言直至天子幸蜀後方有詔令思文園又不見韓家亭榭連天起賓寮獻納如流水宵分秘計出内庭虎臣拉殺輕如鬼眼中富貴如春夢萬古綱常華岳重折腰俛眉事權貴不如美酒當筵送劉生劉生尚遊俠結束似從軍綠酒通宵飲黃金對客分驅車遊五岳秉燭讀三墳帷有不平氣時時干白雲出自薊北門行髙秋宛馬肥鐵騎犯邊陲披甲挽弓矢大半漢中兒擾田擁雙騎攻堡挾長錐揚言今歲入定欲冦京畿將軍既傳檄士卒亦聞知李牧急收保從古有良規然聞仁義士救患不踰時禦强能設險以寡在懸竒亦言將帥勇不憂行伍疲孫武教宫嬪一朝能死綏何為坐偃蹇終嵗不出師寶劍匣中泣無乃久精思君子有所思行匡坐百日晏遨逰風物遷一朝丹疏入六載常在邊中心不自分生世寧有偏患無經濟才食禄何足專養馬念馳逐按劍思握權心若醉六籍目若營八埏射書聊城將問策安期仙推食不充饑解衣難覆寒君子有所思所思在仁賢五蛇吟五蛇從龍晉葉昌乗車跨馬逰四方知機決策心所藏日引月長生明光念兹夙夜不可㤀傷歌行淡淡浮雲生颯颯秋風來客子坐愁思抱劍久徘徊中朝授官爵本以恤民災時俗競繁華棄置不復懐朝逰過上苑夕宴登高臺絃歌滿堂下㫖酒盈樽罍富貴豈不樂貧賤多渇饑以言推所欲均半育羣黎將苑謡將苑琅琅編簡多自憂邊塞沒銅駝三闗兩鎮思經過匡時濟世義不頗金聲玉節流江河升天行劉郎本是神仙客鍊就金丹生羽翼雲水千重恣逺逰洞文霞笈流篇籍洪厓拍肩赤松笑𤣥素二女呈窈窕才輕九宇未足奇道洽三真始為妙不離平地已升天日月星辰齊照耀白馬篇白馬青絲轡寳刀束馬頭朱衣錦繡裾意氣若雲浮經過鬬雞陌出入凌雲樓跨馬意何如男兒舊學書聞說君臣義仗節欲征誅虎豹蹲九闗豺狼叅兩隅生民何擾擾諸將復籧籧東方水流血西土還報捷匡世缺雄才欺君有心訣馬首奮如龍噴沫立竒功馬蹄輕似鳥八面振威風人馬兩相宜何如八駿馳行空九萬里躍馬定邉陲寄懐蛾眉將駿骨總是千金姿難教雙麗絶并取一朝隨躊蹰心所重慷慨淚横垂歡愛倘再得功名去莫追結客少年場寄身燕趙間服食駐朱顔琴書室中滿車馬門外還送客復迎客投壺兼對奕飲酒不論觥看山來着屐葛巾文六角珠履雲五色論道洽伊周談兵恥韓白門下客三千一朝去衝敵自君之出矣自君之出矣不復理容粧思君如寶鏡耿耿照空房自君之出矣蟾光幾盈缺思君若連環綿綿不可絶自君之出矣車馬無回聲思君若春草除去復還生射虎行問君何為好射虎虎能食人人受苦人家積粟養牛羊牛羊食粟喂虎狼食羊猶尚可食人愁殺我牙爪夾妖魔貪嗔急於火人失智虎有威說着射虎人驚疑有客驅車過山麓力高卞孟心機足張弧挾矢設網羅虎亦聞之生觳觫嗟哉嗟哉虎本愚天帝念之為愁吁虎若不食人客亦無所嗔古從軍行從軍本為報國恩跨馬出逰古塞門召募三河忠義士一日團結如雲屯男兒從來通六藝不分塵沙雜邊騎劍磨流出射斗光賦成常有凌雲氣軍中多少豪俠徒相共飲酒歌且呼寳刀金甲披掛就萬里長驅西破胡古塞上曲七首其一胡笳𣺌𣺌度闗門旅鴈飄飄過古村獨有蘇卿愁至骨一聲哭盡九邊魂其二土營沙寨半荒塘漠漠平川暗夕陽笑殺公孫為布被有何繡幕障邊疆其三漢軍大半懶征行零落軍書不記名昨夜邊人傳鐵騎依稀又到古龍城其四都䕶將軍性氣和葡萄美酒奏弦歌折衝樽俎非無謂遮莫沙村走駱駝其五紫禁昭君生入胡琵琶千嵗唱蘼蕪向來北去紅顔婦多少良工作畫圖其六摩笄山頭烽火紅須臾照見數營空賊來不解傳刁斗何况雲臺論戰功其七古來大將運機謀指畫軍符夜未休可怪紅粧連甲隊欲將歌舞覓封侯長安道三首其一來往都城道探知朝士心若聞身世事定肯却黄金其二一日再三往奔馳十二時郊原芳草意惟有馬蹄知其三長安九門路車馬不曾閒借問驅馳者何人謁帝闗江南曲二首其一江南好風物猶似舊時不春雲回塞鴈不帶漢川流其二一去數千里詎知行逺近道上有征人怕問江南信塞下曲五首其一沙色上侵天匈奴數犯邊將軍好歌舞不肯勒燕然其二居鄉愁敵騎入郭怕官軍商量何所定愁坐日斜曛其三無錢難倚市有酒且傾巵邊塞窮通事惟慿天意為其四昨日聞弦管今朝是土堆人生不如葉猶得趂風回其五野老談時嵗何時見太平生來知日月不肯暗中行五雜俎其一五雜俎天上雲往復還紅日曛不得已諫周君其二五雜俎綺繡裳往復還明月光不得已誅王郎其三五雜俎秋漢星往復還春夜螢不得已脩六經去邪蒿曲博士邢恃名光北史六經淵源授太子㕑人但知進甘㫖邪蒿滋味只如此名惡物必賤何用奉玉齒至哉邢子心弼亮以終始珍饌不進不休邪蒿不去不止楊柳枝詞四首其一楊柳嫋嫋任風吹心要欺風風不知引得塵沙滿堤岸朝來壓折柳條枝其二生憎楊柳性柔邪纔見東風舞未涯土長根生何太易豫章七嵗始萌芽其三楊柳夾帶杏花開妸娜鮮妍不自裁絮落水中飛不起烟迷岸上坐徘徊其四斬楊植柏是生涯列映樓臺帝子家萬嵗千秋垂古色春風曉日繡雲霞古離别江月湛清夜皎日當及晨陰暉復陽曜照見離别人借問逺行客何為輕青春答云有所以邊塞多風塵男兒急君父時世良苦辛心高悲俗緣義重辭所親佳人收淚拜脱釵致慇勤功名千古義情昵一日新君行為邦國何須戀妾身出塞曲邊塞苦殺傷將軍多怯懦天驕迅電馳宛馬流星過借問食肉徒何人貽此禍翩翩逰俠子仗劍出閭里忠貞白日懸機闗當時起挽弓不在强騎馬不在良所貴寸心白烈烈如秋霜我生知有死生死皆前定何用苦低徊從人學邪佞古風詠懐三十首其一麒麟不踐生鳳凰百鳥依乃知聖人出蒸庶同所歸濟世寰海服營已妻孥違明徳麗日月燭照通萬微齋居含淳質九牧生光輝逢饑願推食遇寒思解衣禮周本由智恩洽還重威有如龍變化一日乗雲飛其二天地疑彈丸日月烏兎飛一氣渾且噩運轉無停機大聖觀元化端冕垂裳衣神融通萬方精理識九圍三才一以貫六合同其歸名教本自然有無兩無依誰哉語至道釋然分是非其三淅瀝西風生素秋團白露中天淡輕雲金波皎蟾兔客子理裳衣循堦旋矩步秉燭開芝房展書闔朱户緬想百代雄矯首屬欣慕延思緝長懷達觀披廣度精微自心得談辭非所厝其四其五浩浩穹壤内一氣常感通山河獻靈秀生有百代雄龍蟠抱三辰虎踞經八戎風雲隨指顧日月回掌中手提屬鏤劍目送塞上鴻豈無聲色資慚愧海宇空男兒不命世何用懸朱弓其六其七大道運廢興機緘密於網聰明憲天文妙用在指掌正邪各相勝陰陽互來往炎劉本籍羽光武還資莽陰曀不晦㝠陽靈何由晃升沉理固然鏡燭非外奬其八始吾七齡時宴息思天道精慮入窈㝠𤣥夜漫浩浩因念死生情劃焉動中懆人生既有終神仙詎私好所期訪真訣煉藥駐玉貌焉知五十秋未得展懐抱彈劒將逺逰沉憂徹蒼昊其九伏義畫八卦軒帝調宫商聖心造人倫一日萬世長運精超無始含思垂未央蕩蕩寰宇内寸衷俱藴藏彼哉夸毗子營已淆圓方雕琢混沌竅以為食肉腸家國既坎􅇄爾身亦淪亾其十吾在大方内流觀𤣥化初天地本一竅日月雙流珠清濁分山河五緯不並居大象極虚靈萬物燦焉殊中有聖人立神明為其徒包絡無内外精明超有無元理所不釋誓將規輿圖其十一形成别上下貴賤理自然所以成萬物惟在君臣權大道既陵夷叔季彞倫愆毫髮一為差倒置躋天淵堯舜不可作湯武亦已偏大哉管夷吾匡世日月懸仲尼春秋書秉筆以精研其十二川流赴東海涓涓無止息君子秉明義夙夜常警惕道在日用間變化非可測神龍乗雲翔精理亦綿厯顔回雖生知學履復純密功業道所生聰明心自得其十三大舜居東夷耕稼承二親傲弟不為咈中心但安仁一朝遘王厯得之河水濱天命既有赫覃思安萬民四岳一以舉鳴珮為王臣敷言共光被純徳無緇磷委順同大化千古稱其真其十四昔余夢仲尼提耳命我言王道莫蓁蕪行義貴達權河海儼聖容千載誰可諠謭劣秉遺訓匡坐求其源中嵗遭嶮巇世道為籠樊淳風倘未凋心意哀元元其十五大海無擇流春林無委枝明徳包宇宙逆順皆善辭君子抱宏畧俯仰祈良規責已有餘暇與人無怨思箴銘古人誼吾獨求輕肥其十六大言人所怖小言人所嗤所念唇齒劣不能為朱絲蘭蕙雖馨香因風吹庭幃哲人秉明志啟口多微辭衷情倘未和誰能沃心脾其十七玉沉當自見珠去有時還劉曜乃何人隠居管涔山童子持寶劍再拜揚玉顔致辭且敬獻留珮聲潺潺一嵗換五色三尺當重闗寄物不虚得亦復排羣蠻其十八越客逰燕趙嵗久若故鄉被服多氊裘挾彈戎馬行顰眉憂國難揮涕悲民殃有酒非不飲所適非豆觴展書自低回撫劍多慨慷終焉奮羽翼六合為鷹揚其十九浩浩北風起邊聲颯已聞蕭條轉幽谷慘淡生黄雲敵騎三五輩突至如驚麕豈無塞上卒什伍曾不分王猷先訓練六籍皆兵文鄰鄰比閭士誰謂非三軍何不作内政安居已策勲其二十天道生混沌一氣妙萬方廢興理所定誰能易其常造化本無言賢聖持天綱孔明不㤀漢仁傑還造唐日月暫薄蝕倐忽回重光神靈䕶明哲小人物所戕彼哉莽卓徒澌㓕何由長其二十一藹藹珪璋士特達懐内方步趨出矩矱蘭蕙生馨香華心仰芳躅一徳超衆行如何松柏資委質桃李場陽春不自保嚴霜折其光宛轉入邪徑黽勉遊曲梁哀哉繞指柔無復百煉剛其二十二混沌薄元化大道生廢興五運相終始人倫有分并灝氣迴日月山岳以峙凝大哉天地機乃在一念精伏羲畫八卦妙契萬物靈聖哲神所啟時俗誰能攖其二十三人心包天地私意安所容區區營身術咫尺生劍鋒方其拘攣時一介不可通忤心當路排合意千里逢一人未成仇萬千憎其風譬如蒸沙粒何由覩成功其二十四門牆啟尤釁人心生冦仇上下本同根身世非兩謀如何全軀士肉食㤀所憂黄金充私槖白役破公州徒營一家計横使萬姓愁羌戎覘人國狐兔經荒丘誰哉召其侮晨夕空誅求及至謀身日終亦非嘉謀其二十五時俗藉津梁英雄自依據倘執禮義權縱横有何懼白日泛陽波六龍誰能御流沙逝西沉扶桑莫東駐天命無短長人心有來去其二十六姑射有神人氷骨為其姿被服天機錦玉屑充渴饑窈窕處金閨蘭蕙方葳蕤孤操凛霜雪抱瑟含微辭獨立萬物表恥與姬姜隨視世若塵土擇對安足為其二十七仙子悟長生鍊元積真道一氣含太虛寶鼎手能造衣裳翳白雲雞犬嗚丹竈玉帝校尺籍紫書方命召韓衆擕竹冠盧敖奉金誥濟世有丹砂冲舉何足好其二十八𤣥女蓬其首感悟軒轅辭降世示兵訣精微誰能知糟粕遺六韜孫子何支離天地有妙畧黄石非吾師冲虚契真際車馬八極馳大道自底定嘈嘈徒爾為其二十九伊尹昔幽沉遺世在莘野負犂帶雨耕懸釣垂雲把諷書味三謨展詩研大雅詠歌合匏弦達觀何瀟灑終焉膺三聘為世驅六馬左相位不卑先覺道應寡一朝居阿衡四海憂患寫因知畎畝中詎是㤀情者其三十孟軻本吾師輔世逰齊梁談辭霏玉屑曠蕩仁義場一言已有餘千言猶未央借問此何為楊墨充四方邪說塞皇猷詖行成梯航禽獸食人肉世道兩以喪君子心不忍齒舌流否臧為道立赤幟照灼日月光是非以析然邪偽安所藏多言鬼所嫉無言安能詳任節婦吟白楊多悲風蕭瑟生曲房二十解簪珥白首謝容妝兩髦若日月矢死抱輝光嗟彼陌上燕嵗嵗棲我梁君子奉高葢駕言逝何方哀怨比琴箏絃促柱以傷君命一何短妾命一何長願以妾贖君君在不可望祗因斑采衣緝君珠珮裳孫同府以不得迎養母夫人為繪像事之因賦白雲篇贈之白雲何靡靡瞻望在故鄉迢逓越萬里云何别高堂婉戀慈母歡伊鬱不可㤀歌彼陟岵詩㫖酒盈我觴達道莫能致沉思迫衷腸托之丹彩箋寫兹明月光日夕承髙隅髣髴流珮裳庶言結遐思耿耿明徳旁寄岑匡阜山人蘭舟日行邁河闗多苦辛逺與親交别曠望立風塵是時春向暮冉冉柔條新余行獨逶迤留滯京洛濱千里困長道十載為羈臣駑馬厭驅策委葢愁逡巡惟是心慮煩未能釋朱輪鉛刀雖黽勉豈無一割勤綺琴中自理詎念知音人寄言同心客屈曲聊以陳送海濱公八十詩佳日湛清俎北堂弦管多侍子奉鳩杖國老意皤皤冠葢溢街衢尊俎四座羅列帛等丘山傾酒若江河齊童三五行挾瑟振安歌流雲轉長袂陳舞屢婆娑俯仰凌七盤飄揺切陽阿歌舞詎云畢髙宴方嵯峨凉秋白露垂芳飈動池荷矚此帝城隅甲第馳鳴珂皇路穆清塵庶僚願如何玉樹齊萬年千秋沐恩波奉和春崗翁怡椿軒韻朱軒赫𢎞敞珍木鬱葳蕤芳條厯年祀手澤猶未衰緬想趨庭日冠珮肅容儀文侍陽景邁朝植玉露滋楨榦方石起柔葉漸雲披端知嵗華改飄揺芝葢移奕世登榮峻章服正差池清階既克類嘉樹仍在斯徘徊感疇昔睇盼適今兹物色固常競奇名亦永垂臧烈婦詩白楊當隴間落葉萎以黄君子弭髙葢中道多徬徨自悲妾命薄不如鳳與凰雙棲不及年飄揺獨先翔君命若秋露不能晞初陽妾命非春華安得隨風揚腃懐連理木並蒂在髙岡但願同心死不願異域芳縱妾愛賤軀為誰飾容妝及時整衣帶臨逝結鳴璫慷慨就泉路從容辭曲房身將蔓草萎名與蘭蕙香光明燭八埏日月為披攘五言排律四戒示諸生戒博奕余作四箴言偏攻博奕門人財那可得已禄已先奔一擲能傾産千呼㑹爽魂嗔痴尋苦業貪欲是迷根外負鄉閭誚中傷父母恩黄金孤注盡白晝五時昏禮樂妨綜理詩書廢討論何如謝徒輩吾道凛然尊戒鬬狠軻書規不孝鬬狠有明條克讓惟堯頌温恭是舜謡負荆登第宅納履在圯橋遜弟從來有乖離竟所招禮儀恒不密血氣更難調暴横聞千里危亾起一朝災殃遺父母喪亂及朋僚自反修仁術爭心早已銷戒逸逰獨有衣冠士偏宜戒逸遊一朝輕失足終嵗起包羞敗徳疇人賤傾貲智者憂狎山多餌虎玩水必翻舟妲己興危亂妺姬結釁讐瓊臺今作市金谷已成丘色相為空戒歡娛是水漚勸君升孔室無復向秦樓戒飲酒衞公陳抑戒小子作箴文飲酒無明徳修身有令聞酣宫猶反道醉市更非羣麯孽偏傷性壺觴不立勲千鍾王業喪一旦霸圖分阮籍何須羡劉伶不足云清風行處散白日坐來曛請謝杯中物還圖閣上雲送田叅將中原持節士誰不識田郎啓口嗔權貴捫心議廟堂復官新破例出塞舊開疆志吞三峽水氣逼九秋霜五星占驗熟六甲陣圖詳我亦留濡客聞君意慨慷步虚詞二十三章其一青簡鳥傳來金書花共開悟真融碧落探妙上瑶臺浮名念裏盡樂意靜中回𤣥漠明如電沉深響若雷春風行折柳太極坐觀梅遊戲三千界懸知上聖才其二曾上青天極能驅白日輪目中輕世界足下蹵星辰元氣回千古真風亘八垠青牛披綠甲白馬滚紅塵待掃欃槍去方知億萬春其三瑶天迴不極杲日麗常懸道器知宗本心機㑹轉旋吸精蟬飲露換骨鶴凌烟空法聲聞悟金心色相宣五神融五嶽三脉配三川一入長生路慈航理白筌其四五福宗洪範三靈㑹洛書璿璣迴氣馬華葢轉雲車法象臻𤣥理神光合太虚陽春生螮蝀陰魄長蟾蜍精衞知填海奸雄㑹剥盧星官垂劍術按法早行誅其五大言驚宇宙小隠適山林觀世壺中靜知機象外深洞文開萬卷絳嶺厯千尋雄心沉白水銳氣煉黄金謁聖𤣥宫裏尋仙蒼木陰未能揮寶劍聊用撫瑶琴其六浩浩虚無裏巍巍象帝先玉臺凌萬丈琪樹厯千年已識龍車邁還逢鶴駕翩凌神逰桂嶺當夕下芝田嘯月開書坐乗雲抱笛眠歡情饒物外本為世中憐其七曾跨青霄鶴來聽碧樹雞蓮花從火發桂葉與雲齊目曠乾坤小身高日月低壺中雙鳯隠劍外六龍迷藥性因明啓丹功自敬躋崆峒何用訪於此識端倪其八懺悔從心起修持自道生七籖書日展六甲義時明伏虎風常寂降龍電自横金箱圖北嶽玉局運南征造化壺中轉星辰掌上行神仙無所語一曲頌升平其九道士鍊真文天機隠白雲神兵朱火出聖化玉泉分鑄鍊昆吾劍驅馳太乙軍四蹄齊馬隊兩翼奮鵝羣靈氣千秋震威名萬里聞旄頭星氣薄雉尾日華曛祕法叅𤣥妙誰能獻聖君其十一法齊王化千靈肅聖筵莊嚴安宇宙變化轉山川𤣥圃人間闢神洲陸地旋玉麟心出世丹鳯氣冲天藥自𤣥中得兵從象外傳足摩三島窟手拂五雲鞭八極逰無碍縱横狎水仙其十一道自心靈悟機因物象生𤣥風流日用妙理在常行神氣超無極精微合有情玉藏山自潤珠在水還明松子非難學王喬本易成何人寄丹訣白日試飛昇其十二非無金鼎訣自少碧山逰韓生騎白鹿老子跨青牛余亦邀𤣥鶴相將訪十洲遐哉尋玉洞邈矣度丹丘因笑陶貞白何須不下樓其十三大聖摛言密神仙立意高明心神不變知命意先豪要領叅麟角精微入兔毛三才披道奥六籍悟真韜世泰登金馬時危命寶刀文章藏石室不必著離騷其十四軒黄方好道我本列仙才每過蓬萊島曽上凌雲臺非無逺逰意自多塵世哀眷風迴玉管夜月隠金罍將軍營細柳宰相調鹽梅丹砂即經濟寳鼎誰能開其十五將門應學道仙法自通兵寳劍神靈授真符虎豹行仁風隨後殿浩氣是先聲義動三光合機深五嶽傾本心期濟世誰羨列侯名其十六神仙應治世輔弼自須才玉殿重門啟丹宫複道開三花明户席八桂隠樽罍堯讓夔龍入軒聰后牧來知人千載備得一萬方回南極星光見遥知接上台其十七九州通水府八寶麗金華洞門飛紫氣此是上仙家濟世皆真訣安民即道葩琴書消日月衣帶結烟霞蕭史堪乗鳯張騫久泛槎年年飡玉粒幾日發三花其十八龍馭皆英傑麟驂即大賢訪丹先得道問藥可成仙敬士開雲館迎賓敞日筵二桃非祕術五鼎是長年元聖寧無徳垂情渭水邊其十九神藻生常識𤣥機即邇言聽聰通四耳懸解徹三門畫璧圖仙史彤簫折道論真風平地起妙理匹夫存野鴿猶傳法遊魚亦訊諠音從萬象起觀世得心源其二十上界非無事中天亦有人一元通大象萬品不離塵馭世多龍女璇璣並斗身法華開玉樹心鏡轉金輪何用求方外惟須念玉真其二十一誰誦洞靈文朱篇綠字芬龍蛇象外隠科斗畫中分蒼頡精研得軒轅睿思聞殺機天地發祗用建人羣其二十二𤣥化垂真訣仙機在席端至人心洞達妙道日盤桓應世神無碍調身理自安冲虚神氣守澹蕩百靈歡變處風雲起開來宇宙寛凌霄持一劍誰為辟邪難其二十三真人怡寢息灝氣日流行萬方心不挂一貫理真明宇宙機偏合烟霞夢不驚道摩疴自去服食骨先輕寳鼎風烟正金壺滴漏清華山曾羽化留得五龍名青霞集卷五
