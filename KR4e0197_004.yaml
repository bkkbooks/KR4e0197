body:
  text: 青霞集卷四明沈鍊撰賦籌邊賦粵有五陵遊客懷鳳翼之書挾魚腸之劍南步荆吳北登燕甸策馬居庸之關方舟上谷之塹捧心如星營目若電於是造塞上老翁而問焉曰伊昔髙祖肇造區宇妥歡歸順縱其北處暨我文皇開拓土疆三犂鼠穴徑去銅梁此皆驅中土之人搗逺方之衆若六轡之馭馬孰違余之控縱乃若己巳之變則起侵凌之漸王振貪而中搖喜寧狡而外炫震驚土木之川彈壓清風之店然而郕王監國太傅提兵望翠華其既逺飛炮石以長征遂使驕子狼奔敵人鼠散慟哭成羣殺傷過半三千里外動覺無人五十年來不能窺漢此豈非今人之著聞往事之昭爛者哉𢎞治乙丑魚臺不守遊兵六千連臂而剖駸尋日警狡焉浸猛怍子尸淹沙泉骨冷草垜縱橫土棚不整誰生厲階至今為梗由此言之憑恃之勢不殊也昔何其衰而今何其盛戍守之人不削也昔何雄強而今何退聽願丈人熟慮而籌其宜劇談而究其竟僕將委心而從命矣老人越席而拜撫膺而嘆曰嗟乎嗟乎乃者學士束筆笑涉兵鈐縉紳緘口不言邊患何哉容身之趣卑而憂國之心誕也不知天之生人一體同氣性命之中萬物皆備是以黎庶有並生之仁宇宙皆當為之事乾坤等上下之交日月煥君臣之義普天均照有外有中率土胥歸無巨無細主憂臣辱上安下利一家則父子之心常齊同舟則胡越之人共濟故利有所不得獨專而害有所不得獨避唐虞師師九官交針成周穆穆三后協心伯益升而夏烈傅説命而商霖一夫不獲則伊尹以為已罪六羽初獻則宣父書之至今故告老而請討陳恆之逆作經而數稱小白之功相魯而重揚夾谷之會獲麟而深嘆吾道之窮是以為生民立命為天地立極合中國於一人通萬古於一息古之君子曷嘗以閨閣之奉自崇血肉之軀結䇿嗟忠孝之道衰兮人懷私而自異視君父若途之人兮曾不滿夫一睇榮寵汝其何為兮蔑秋毫以介意想九重之皇皇兮念中夜而不寐彼藐藐方自營兮曰非余之所致冀上帝之察九土兮懷忠藎其有幾人嗟匹夫猶戀主兮况纓紱之在身幸髙位之難得兮日汲汲以謀資感夫人之竭誠兮曾不顧百姓之流離有司斂財以結納兮三軍救死而不暇自官方之多錯兮雖嬰孺猶挾詐朝結託之有門兮夕遷轉之如響恆人不以為恥兮訴親交而欣賞將無心而血戰兮士無力而效死要豎子之不適謀兮何軍容之能盛客曰子其無論公卿之議而談將帥之略無先廊廟之言而定邊陲之畫可乎老人曰事有本源物有紀綱不先知人何以安民不有內治何以外攘周公思而白狼貢虞舜讓而河鳳翔蕭何內調而淮陰之謀展魏相中協而充國之計揚亦有至難知人之哲齊威檻管仲而未諳五伯之材桓溫遇王猛而猶憶三秦之傑倘忠亮之不行雖巖谷之影絶彼朝遊而夕叩顧辭卑而禮厚若夫人之髙翔等浮榮其若臭弓旌招之不來况肯穴其圭竇椒胡有窮黃河猶漏重益蹇連空增虛謬憑所薦則恩惠不由其門從所言則功名反出其右故千金而未罄衷情一言而輒生戮辱得路而組綬蟬嫣失勢而形容踡寧使生靈被塗炭之苦無寧使門下隔當衢之軸寧使朝廷負四海之憂無寧使寒士享一朝之祿此其為病已成而為慮已熟矣雖有將帥之材邊陲之計何由而矚哉客曰鹽鐵論興文學議公卿之貴輪輿説成王侯屈野人之對子之言誠明矣然則今之為公卿者宜何如老人曰主上明聖承天恭命道極精微德循中正深惟社稷敬戒時行眷此小民憂心日競方聞備患之烽遂下求言之敕警爾三公諭爾百辟禁中揮灑雲漢昭回仗下傳宣雷霆赫奕誠濬發於九重逮風行於八極曰朕夜分而不寐展中心之規畫俾大小之盡言破羌戎於絶域孰髙居而端拱實眷戀於幽側臣子而敢欺君父日視朝其何益天語琅琅雲容厯厯萬姓攄心千官變色小臣聞之涕淚潛滴有君如此誰忍不力於是誅怙慝之臣開僨軍之赦搆大將之材較團營之射輸穀粟以東西選良材以日夜表率神明之風躬行玄默之化恩不報而常施罪已形而常藉體帝堯之至仁在伯鯀其猶借暨九載而方殛詎一朝而報罷望庶幾其改之何螻蟻之足跨欲招俊傑且安韓信之邪志重循良豈昧王成之詐由此言之陛下不曾負人而人自負於陛下凡今公卿保傅之臣率彼文武臺郎之士同操厥心各礪其志夙夜孜孜有死無二苟有利於社稷吾何愛於髮膚苟有傷於百姓吾何畏於權貴聞一善則同聲而推見一惡則并力而擊扶持國是有如日月之明摘發羣邪不讓秋毫之析賢材進而流俗屏公道行而私交息如此者固陛下之所側席而思而百姓之所延頸而軾者也以父事君何所不恱以家視國何所不決竊有一言不踰四字科道者耳目之官吏兵者股肱之寄耳目達而羣枉昭股肱宣而百為治然後虎豹奔命而入林狐狸望風而投穴貿遷轉則鑽刺而無門售擠排則窺伺而無隙故許厯一言而破秦馮歡三計而安薛包胥慟哭以成名魯連匹夫而仗節豈有五等之風行而三軍之政闕哉將帥承指授而成功士卒感溫醇而激烈若是而邊陲之地不守烽燧之患不息僕則受妄言之殛不知者謂其為老生之常談其知者以為聖人不能易且夫逐世議而衰興隨流風而披靡此其駁乎不足議已固有豪傑之材高明之調仰屋梁而竊嘆展往籍而悲嘯人士依其令聲海內望其芳蹈然後徘徊猶豫長慮却顧欲翺翔而斂翼幾高舉而促步蓋默成以濳處不顯著其名譽諒深衷之有為但恐年嵗之日去琴欲調則軫為之回病欲療則藥為之劑事荏苒其日生法轉展其滋弊強敵沃而不休蒸人渴而思濟此老人之所拭目以流盻傷心而雪涕者也客曰本源足而後枝葉生紀綱正而後法令行是則然矣乃若張良著軍令别為三教任宏校兵略分為四種豈可以仁義而無節制恩威而無系統者哉角勇力則先技藝鬬智勇則尚謀猷與天則陰陽順與地則險阻修故風后撰握機之文太公垂金匱之鉤李靖演六花之陳趙德算九宫之籌此雖近而莫廢又何深之不求老人曰適已言之詳矣世未嘗無技藝而不聞好技藝之士世未嘗無謀猷而不聞任謀猷之將逮忠孝之化流各興心而慕尚安得至公之言推擇有道之士築壇而重其名授鉞而隆其意有關閫外之言悉聽將軍之制受命而行仰天而誓臣之此身既已許國有不竭忠何異為賊然後合賢豪以詢謀集參伍以宣令既三令而五申復周言而密訂將有欺於三軍軍有欺於百姓父不得而赦子愚不得以讓聖賞不負心誅不奉命削成亷礪何殊百鍊之鋼照破寒邪有若千年之鏡豺狼震疊甲帳星稀烏雀低回轅門風靜威行秋霜惠流春陽保之如子視之如傷中心貺之念投醪猶其外飾肝膈是布知挾纊幾於色莊君祿無窮請謝苞苴之客臣心可鑒那愁萋菲之郎惟愛人之一德無營已之多方欲得人之死力詎借生全之厚欲破敵之精微焉辭訓諭之詳法無時而不練令無往而不張仁至而後智全精專而後巧出矧神明之有機詎戰攻之無術往軒轅之殷憂感玄女之答述發揮至一之源推明變化之律從五人之初布積伍伍而漸舒象常山之蛇勢結首尾而同樞由教明而方定遂心合而志符起一元之精練極億兆而不殊云此道之非逺順自然以為居雖萬勝之無折亦一戰而有餘先聖運之而出竒後賢因之而作遁老氏演生三之文廣成操得一之論計然託越嶠而智恢孫武藉吳宫而謀奮鬼谷挾押闔而譊譊黃公持牝雌而悶悶雖孔門焉不學蓋猶存乎冉求之問不見日月之相蕩乎月掩日而近恆以朔日掩月而逺恆以望故小人之攻君子也恆以力而凌君子之攻小人也恆以智而放君子之於小人猶鷹鸇之於鳥雀鳥雀之避鷹鸇以智而鷹鸇之勝鳥雀以力又不見人與虎之相競乎虎噬人以爪牙人搏虎以陷穽况六合之雄豪制方隅之死命譬一丸之在掌中誰復得而馳騁惟三代之盡善未嘗廢夫車戰駕駟牡之彭彭被介甲之雕焕肅先偏以後伍鬱魚麗而鵝鸛閲衛青之武剛訊馬隆之鹿角載輜重以不虞嚴周營而難薄相風雲而進退步原隰而前却隨險易而能驅稱大小而斟酌昔李賢之議戎贊斯藝之詳曲既揮霍其箭鋒又憑陵其馬足任彼勢之逺近由我軍之行止藏火器之煌煌鏬神鎗之齒齒縱以九龍之煙發以百鳥之矢上有無極之將軍下有纏綿之細子遊兵翼出若九天之飛下伏兵濳發若九地之突起本中堅之純一密部伍之經紀納謀士之如雲驅勝兵之若水渾渾淪淪誰知八陳之門繩繩跿跿莫測五行之理人人為伍伍伍同行馬則同隊車則同廂步兵翕散各各為方車馬步以為三經奇正伏以為三緯星宿陰陽明天之時山水剛柔察地之軌望逺知微有間牒之所未詳隨機應變有圖書之所未紀此則懸於一將之權運於一心之妙參神氣之玄同齊臂指之相掉發之為機權之宜存之為仁義之要知二物之不明而後明先王之至道客曰此足以明戰爭之略而未極夫攻守之常從變化之膠轕雖千言其靡央騁辨博則枉摩乎丘索競文詞則徒切夫宫商子何不於其制禦之恆理姑略言其大綱老人曰善哉斯言僕若卷舌復將誰宣乃今積弊相尋法令不一究其深患則在於入粟而轉輸調軍而更出公有養軍之費而軍無受恩之實將有調兵之煩而兵無破敵之質所以致軍與民之交害而攻與守之兩失何為轉輸之弊飛挽千里憔悴萬夫出入之際吏緣為徂三十其鍾僅致一石樵蘇後㸑士有飢色逮臨邊而給散有無方之虧爛屯田子粒嵗破幾千軍士衣糧月銷過半稽勾則案驗難徵告訐則株連莫算又有公罰私科前催後呵備邊晨起防邊夜過賊何時了腹何時飽居為纍囚行為餓莩憂苦日多歡娛日少借問邊氓幾人能老何為更調之弊生長東塢驅馳西土一作軍夫長年愁苦恨别妻孥生離父母敵在何方戰在何所元日出征晦日歸處他鄉之亂我則何與暨其涉渡關河經過州縣望門投止竊席休倦婉轉則主者不容慿凌則閭閻積怨官軍一過雞犬皆愁客糧支而恨少馬草散而還偷挾少婦而逼辱持弱肉而強留信地將臨中心愁懼筋力已疲誰不猶豫官軍正來敵兵正去况其生齒日煩生計日促彼名王之梟豪挾天驕之遺躅兼狼虎之雄強濟蜂蠆之螫毒多羅張拳畏吾頓足潛若蛇行突如羝觸結合諸部講和釋怨勢若風雲烏合鳥散重兵壓境險易偏知細作乘虛服色難辨東擾遼陽西侵寧夏南寇固靖北犯宣大而我東勝不收河套遺憂外脫朵顔內殘應州西北疲於戰鬬東南困於誅求致猖披於九鎮本沿邊之二仇纍嵗築邊一捧可穿山林古木斬伐盡焉欹弓欲折羸馬不前形勢未合魂魄先捐選鋒向道本用漢兒相去五尺教使射馳何獨吾民片甲不施倉皇窘廪束手無為則彼衆何往而不勝我兵何恃而不疲哉為今之計莫若及今春融墾田勸農緣邊千里荒土無窮聽其開植任其播舂能興千頃之田者授以千夫之將能均一境之土者令當一面之衝小大參差逺近齊同效公瑾之省餽法李絳之置營規朝錯之募民塞下模重華之列徼西東民不改籍軍不授糧公不起稅私不别倉器甲自造車馬自將內連堡落外接邊疆漸穿溝洫增裨垣梁且耕且練行戰行防鄉鄰即其什伍耒耜即其劍鎗強寇者即其私門之盜邊城者即其私室之牆家有給足人有樂康妻孥連袂親戚合堂吹笙彈瑟烹牛庖羊資産易戀恩義難忘况有明訓忠孝結腸不同心而堵絶欲去此而何方人心既籍經制遂密千人合堡十堡聨柵夾以偃月之垣伏以井欄之宅聨絡不疏聲援相值魚出遊而並肩鳥將飛而比翼髙山之下隱以絶壑並土之傍多其閫域棧􅛡石之嶔培松榆而漸植既謹屬其烽火又多設其險厄一夫當關萬夫莫敵土著成兵屯田成積民無怨嗟官無譴責此謂以子弟而守盜賊乃有附近之部舊為羈縻之屬欲精心而撫馭令羈靮之相逐棄其往日之非示以將來之福譬搜人之養鷹飲食之而馴熟飽不致其飛揚飢不煩其蹢躅亦選擇其狡狷頗牢籠其機曲密調遣之差池善語言之翻覆就我術而不知窺彼姦其如燭散和好之日銷結怨讐而還讟故陳湯驅烏孫以滅郅支班超假北庭以凌西域奉世諭諸國以攻莎車耿弇連鄯善以摧河北彼衆心之易猜終猶豫而狐疑一豪首之或亂即部落之易離本依人而就食欲去此而難辭其有望風納欵叩關請和便煩省諭鬱絶來過必欲貢汝所有求汝所欲不用名馬不煩寶玉但生繫單于之頸反縳郅支之足臨徼塞而決胸向關門而刳腹我則計首馘而給繒因功勞而致祿彼逺來而疾速我近出而遲回彼狃勝而小玩我決戰而大摧下馬卸鞍臨風鼓瑟輕車突圍反幟攻壁金鼓雜聲旌旗亂色機以因生權由變得鎖鑰不開遊刃常擊賊徒倒戈鳥巢自拆氣勢濳移風聲暗易種類凋零誰為我敵此謂以盜賊而攻盜賊由是天子建中和之極聖人垂參贊之功文章充蔚禮樂大同聲教訖於四海仁恩洽於九戎越裳之白狼盡入肅慎之矢方窮太史作王會之圖史氏陳吉日之風極霜露之所墜放舟車之所通頌率土之浩蕩配麗天之穹崇太平之業固王者之化隆逰神華胥訪道崆洞抱元守一體妙思沖與二儀而並夀又何有乎喬松客乃援琴而歌曰涉塞上兮寒霜河氷流兮中央言連踡兮有極道杳渺兮無方鴻南飛兮以北鳳凰鳴兮淒惻眷日月兮行邁為夫君兮太息老人從而和之曰時不來兮安憂聊偃蹇兮河洲縱心志兮恬愈橫八極兮遨逰與鸞鶴兮為羣等富貴兮浮雲道之行兮有命寧惆悵兮夫君於是相與陟眺髙山盱衡積雪酌酒徘徊既醉而别文賦竊以綜學無方修文有術一篇既就應知陸子之才千賦難淹永愧揚雄之筆爾其援題布目託始造端析理則精微洞達遣詞則毫末俱完展器宣歌似瞽師之奏樂陳軍出令若大將之登壇運一心之精妙揚萬物之波瀾源流兼達首尾並攢算無遺䇿思有餘歡然後抽毫擬議揮翰沉吟循規按矩據律諧音結篇章則如雲如漢練句字則如玉如金單行如元氣之獨馭雙發如日月之並臨亦有三分象鼎足之列四通類駟馬之駸五馳六驟七縱八擒愈出愈竒稟生生以不息有源有委流渾渾以益深起而承之若珠就貫而不輟轉而合之若蛇顧首而還尋引援則因文以證義譬喻則即物以會心是以文必有為而作義必有益而針或慨嘆於往古或諷切於當今苟不關於世教曾何貴於詞林亦如天文以星辰顯象地理以山水成章華實相副名實並揚故能發揮理義比合宫商悲歌則聞之者凄切警策則聽之者慨慷剪截則整齊而不亂貫通則流轉而無疆精明則如四時之順序藻麗則如五色之輝煌沉雄則萬夫之勇典雅則三代之良稽之於度而長短不爽較之於量而多寡相當非夫悟出巧心習成妙手曠耳婁目錦腸繡口總流略於百家徹精微於萬有德富五厨才踰八斗孰能闡妙理於無窮垂竒名於不朽嗟夫伏義觀馬圖而畫卦蒼頡察鳥迹以制文神農知醫於草木軒轅造陳於風雲既興丘索爰有典墳暨周官之列六職司馬之序三軍雅頌不作禮樂既分時有孔子大聖不羣亦有孟軻克振舊聞乃上追夫渾噩始一正乎紛紜三代既往六籍荒蕪雖焚燒於秦火亦淆亂於漢儒蟲雕虎觀鳥迹鴻都崔蔡才劣班馬道徂文章正於韓柳道術訂於歐蘇於是諸生斂袵而進張翼而趨曰聖不可作矣文不在兹乎君子遂撫膺而踧踖還掩卷而踟蹰玄武祠香賦欲通玄理必爇名香原夫兹香秀采結成竒材鑄出緘藏玉笥已苞雲物之精顯露金爐遂嫓日華之鬱丹心一點火熒熒灝氣千尋煙茀茀辟邪不分何讓通天之犀抱道自珍竊類河洲之橘但願感通紫極散滿青霄神垂善祉聖樹清標玉燭光華笑飛蛾之自滅金甌體正知磐石之難搖萬嵗千秋長祝堯王之夀三經五典大明軒后之朝祥蓮賦太嵗壬子玄冬季月宫保東湖陸公不遺荒野寄以書札乃得展和應之圖覩祥蓮之牒感念斯事為之賦列傳曰人無所不至惟天不容偽假令黃金千鎰能以彼人工羈致哉粵有鶴駕之圃龍驤之庭滙盆沼之敷采種荷花以發榮一幹下植三葩上成慨斯祥之殊絶超往記之醇精故蓮者花中之傑草中之英三者參連之象台鼎之形想其含和抱中融神會氣合日月之光靈符乾坤之秀異應昌運而挺生托名都以流寄翠質亭亭丹膚棣棣初發泥中菡萏分垂旋浮水上芙蓉錯麗仙掌削出其斗標天機織成其品字華嚴淨土尊如大士之居窈窕清宫粲若諸姬之醉風飄子夜香茀郁其川回霞爛辰朝影翩妍其簇峙奇之又竒誰談般若之天妙而愈妙恐在方壺之地於是五官競覩七校驚傳相公臨賞寮寀肆筵都人奔而集市文士嘆以操篇考瑞慶之圖未聞前有索異名之境當作新編唐苑雙頭良愧合歡之頌華山千葉空慚羽化之仙道子牡丹之圖未能模其綽約風人芍藥之詠不足喻其芳妍惟古忠孝皆有美祥心與神合道隨福昌周公還而偃禾起張君惠而岐穗芳中林化白鵲之印洞室吐紫芝之房未若斯花驚世絶倫雲霞失艷黼黻非新音聲俱絶色相難陳造化搆巧玄靈吐真天上人間初逢此事桃源杏塢豈得長春楚客詞中永謝湘川之女陳王賦裏羞稱洛浦之神蓋聞天有三辰人有三老道有三才物有三寶函三為一統運成元起一生三從子達卯時逢大雅玉泉發盛德之華世際中興卉木舒太平之藻乃由君子稟才文武立節忠孝濳贊聖謨密襄王教精粹內融光輝外曜接武夔龍追蹤方召轉一心於法華協三后於同道所以感物而嘉生得天而明照不然禹貢洪都堯天燕宇水澤萬方土膏千處雖有金蘂之祥何必錦衣之署過客投緘野人揮翰意切貞良辭謝雕焕念往昔之曾逰眩當今之有爛希瞽史之誦言備王臣之巡玩青霞集卷四
