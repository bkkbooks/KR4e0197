body:
  text: 青霞集巻三明沈鍊撰雜著慎徵君墓誌銘徵君姓慎氏諱祐字元助自號橘坂居士云其先慎到為韓大夫著書稱慎子氏族散於人間史牒不經見有鴻臚卿知禮者顯於宋其子從吉仕天禧中復為光禄卿家三衢自是世有纓組不絶最後有名鏞者守吳興郡遂築田舍家於歸安為潞溪慎氏曾大父文總大父端父經皆以孝弟力田不墜其家世母吳氏生二子長禎次祥君生有氣槩軼羣束髪事父兄甚謹為藩衞禦其外侮慎氏遂以豪義長雄於鄉里而君意顧好涉獵墳典揖讓賢士大夫若余鄉之徐來夫諸子相皆慕其聲名束帛延致之而余以猥𤨏亦獲交焉時時遣其二子從逰聿成俊髦此足觀其色澤矣湖之人率稱君為婦翁償逋負數百金無吝色乃君之輕施已有重積固郡邑所稀也而此足多嵗戊子羣盜刦其家君從容語曰若曹利吾財耳非讐我也恣其掠而去之既而盜者罪暴露顧肆衊於君而君慷慨執辨卒以昭明其强義洞達固如此至於營先喪棺斂哀毁必崇於禮晩節益懋方圖斥田宅廣之未及成而卒嘉靖二十二年六月八日也距生𢎞治元年七月二十六日年享五十有八配馮氏子長頤縣學生娶某縣令張君之女次復太學生娶某道御史沈君之女女一適太學張大幅孫男一名爾樞孫女四某二子卜以某年某月葬於某里某原遵君之遺命請銘於余余不辭而銘之銘曰吁嗟漠漠明有徵士葬於兹原其人特達靡爵而貴以有芳芬其先卿胄其後世澤鬱其如雲光於窀穸松柏翳之爰秩芝菌千嵗而下陵谷遷改余之斯銘久逺而在送洪西淙先生入覲詞并序伏以玉珮朝天萬里兢營之報朱書獻課三年撫字之心魏闕雲高虚懐五馬江湖夢邇拜首雙旌嵗暮治行雲霧動攀龍之想征夫命駕星辰見補衮之期閶闔天開萬象春回於玉簡瀛洲日麗單車暮集於金門恭惟大人先生道涵溟海徳粹珪璋流仁成波積異盈石傷心赤子文移間架之錢接袵青衿化洽宫牆之詠新詞振俗誰誇北海之能古藝徽猷絶見南山之雅幽巖之草木咸輝陽春無盡短巷之雞烏盡舞佛子重來風謡滿野雜史氏之陳詩清白在朝蚤太常之虚佇銓衡報上上之試幾日政成草莽懐嵗嵗之私一朝侯去良辰吉日拂衣於清白之泉水逺山遥發軔於西陵之渡楚屏朝輟秦望雲迷魯酒夕傾蓬萊月迥山僧合掌長留蘇子之衣父老擕錢莫挽劉公之袂葢别離其既逺雖惆悵其何從某等稷下諸生彀中新士含恩㒺極受教彌深翁歸伏地慚非文武之才昌伯在朝兼荷君師之徳屢數甄陶之典意出瓊瑶提擕啓廸之言情深屺岵巨鰲磐石自知頂戴之難丹鳯翔雲漸覺瞻依之逺無地迴車遮留渤海有山作餞逺送荆州積夜雪於行軒何勝繾綣列春風於祖帳不盡遲迴半生宦轍須懐故物之憐一夕師門猶有長年之感况兹逺贐豈曰無言薄展多私總懐南金之贈下情無任少舒北土之思酌樽罍於越水惟以獻芹企冠葢於燕雲永言傾藿承筐意倒織錦詞成詞曰江上煙波曉玉笛飛聲杳霜花照水錦帆開珠珮繞正長風千里幾日長安道看丹心無盡直上芙蓉杪容易别三山辭五老不教空賸白雲深明月好聽陽闗一曲苦願歸來早恐帝鄉日近駑劣相逢少虚白篇沈子閒居喟然而嘆曰天下攘攘皆為利往天下孶孳皆為利來世與道交相喪也久矣呈之以靡曼之色揚之以窈渺之聲進之以甘脆之味希之以婌媛之名有不輾然而起霍然而迎者也是以取舍相拏神明内閼𤣥黄雜見純粹乃裂噫嘻朱襄混沌之不載於斯世也夫混沌不死七竅未鑿浮華去之復見𤣥樸𤣥之又𤣥大道之門寥兮廓兮獨立長存故曰内外不闔明之至也動靜相周公之至也終始無方渾淪之至也視之不見聽之不聞茫然忽乎大象將往此亦妙道之極也孰能相與入於無窮之門出於廣漠之野息於泱莽之區飲於清泠之淵杜子劃然而報曰無窮者無終無情者無紀泱漭者不來清冷者有泚吾將逰虛白之室以覿於巢居之始若是者可與乎沈子曰逖哉遊乎此誠道之所讐而徳之所似也虚白已哉莊周曰虛室生白吉祥止止老子曰致虚極守靜篤知其白守其黑其吾子之謂也道一而不分名散而無二幽之為希夷見之為朱英深之為㒺象合之為𤣥冥昭之為虛白混之為太清始得之有象而終入於無形其無所析矣是故松喬不長於殤子龍伯無異於僬僥王公不尊於匹夫堯舜不賢於桀紂固羣靈之本具而道士之獨昭也心不運於嗜欲故其精全志不滑於趣舍故其神守意不勞於馳騖故其氣藏性不離於得喪故其形固顔子得之心齋軒轅得之華胥禦冦得之以乗風傅說得之以胥靡故曰其清其覆其寧其載日月與明四敘為泰列星為輿鬼神為徒朝騁乎流沙之渚夕駕乎崑崙之墟飲沆瀣於元和之窟舞霓裳於朱陵之居若是者亦虚白之大觀也由是方駕羣言經緯庶猷揮斥六合秼馬丹丘是故徳昭乎同趾功及於異域道洽乎當年言垂乎來世長短相糾身名兩榮此亦豪雋之方而英士之所擇也乃若挾訓詁之說習披靡之詞躡尺寸之華持廹促之規拘孿矩矱俯仰一時雖儒雅之常其大於聲色邇矣杜子曰噫吁戲遐哉吾將索之離朱探之墨楮横觀宇内仰覿𤣥始馳騁無為之方囁嚅希有之㫖頡頏羣豪翔翺諸子俾有無同方内外相彰大器中琢宏業表揚然後棲遲若木頓轡扶桑相與嘘吸乎古今蜉蝣乎天地贈陶子行樂圖贊并序陶子少出華胄壯逰江漢明君作宰駕子安之英轍楚客拏舟騁陸生之殊軌於是經三湘度七澤躡梅嶺過桂城結旄百貴轉棹千里控金羈於名苑藉草流觴撫玉環於豪使攀花列綺呈逸足而不爽端致奮俠駕而兼以雅才故能悲芳華之易歇嘆古往之莫及乃裂豪素繪采兹圖傳散人之高狀烟霞滿容寫良月之美景風雲殊態將以披高軒置廣座開豁襟抱流連儀宇可謂風人之逸想勝士之遐標也已某忝戚里之葭莩兼式好之塤竹欣覩兹事為之贊篇詞曰采色像逰丹青托意寄神洛浦結思湘水八駿非真寸楮非偽英英令儀淑體芳致屬筆探微假情道子鴻㝠鵠舉轉軸千里逸翮盤迴高蹤徙倚愧余菲辭莫綴斯美贈劉處士壽篇天地流而福格昭神明之紀著矣騶虞惠於不殺而綱罟辟鸑鷟翔於徳義而年壽長至於杞梓蘭房之性淑矣羣物之較也不亦粲乎剛柔相獵好慝以分形聲相靡妍醜以别利害相屈善否離晰善也者民物之衡天之相弼而百福之宗也日月之所經明以虚水澤之所射注以下雨露之所膏沐以柔天地之所篤厚以善是故勤儉者積饒之餘也賢才者顯明之餌也博厚者耄耋之徵也三者合而介福周與居而不能享則金穀以為殃榮華而無所守則刺繡以為妄夫善之所招莫大乎永年矣天紀列星地道嘉養鬼神司度百物奏禎生於物者物亦生之彭殤之致莫不信然回之於跖也春秋之衰也耶以今觀於劉處士之賢其執天道也若左劵然則為善者可以稽矣夫道不貴於雄竒徳不羨於昭灼名不必於敡厯善不在於博文人情莫不舍近而獵逺厭平而喜高故往往遺世掉俗高談而絶與不知古人期忠信於十室之邑覩芝草於百步之内如處士之積義稱善寛裕而好禮亦觀風者以為屢嘆鄉之所必選也處士於越為著姓於里為名第而未嘗有泰容施色以軒舉下上挹其貌循循乎其若璠璵而不厲耳其言恂恂乎其若磬石而無蹇連覿其行事于于乎其容與而知所止是故厚積而不爭輕交而靡奪可以觀義矣宗族相助而無睥眤子孫邕邕習於愷悌可以觀穆矣義而穆與物安焉是故豪吏莫陵而伍黨交愉可以觀順矣思噩哉其猶有邃古之質乎何其篤而醇温而縵比義而不煩也夫山林之有朴茂田野之有夷逸城郭之有周雅此自古招之矣何必綠衣襲履深文縟藻以横翔於步武之末然後為士哉故夫處士之善徵矣處士於今初度而厚餐鶴立渥顔豐頤僅如壯强人内抱愉穆之性外躡康强之履偕老洽歡以享福厚而宴子孫自數竒綿祐之人覬其偏薄而不可得而處士并合之可謂無徵乎援一以訊百者謂之理諧按今以擬古者謂之時合一觀之處士而天地日月草木昆蟲之故齊矣是故處士既夀矣於今懸弧之辰合諸黨之好猶莫不雅願欣欣結儀援祝焉豈非人情也哉某於公辱姻婭之故將葭莩之未重其徳則思俾其福契其子孫則思敬其尊人緣衆而祝之亦古之道也祝以效忱幣以布好酒以介徳歌以合辭吾且往歌矣徳莫一於善善莫勸於天合天合莫嘉於夀考是故歌南山以贊義歌棠棣以贊穆歌湛露以贊順歌蓼蕭以頌歌天保以祝歌用協天歌用愉人歌之春酒以侑稱觴義以揚之歌以昌之酒以將之祝以成之而福善昭矣夫福善昭而天人定稽之來者夀考之多而子孫之興在處士亦無容祝矣祝以備吾黨之禮焉賀陳夫人四十壽篇余讀詩至雞鳴之際葢撫几而躊躇世有明君必有良臣為之外世有君子必有哲婦為之内其輔翊宣昭潤澤而光輝之者若琴瑟然宫唱焉而商不應則單立而不成音也文亂焉而武不終則寥廓而不成章也君子環珮衣冠翺翔方域之内容與人倫之表其風聲足以廣樹而光耀著明此豈偶然哉必有内順而後可以外成必有陰教而後陽徳布也然而令音嘉色獨藴崇於君子而懿美不及焉迺其故又何也豈不以閨闥之風不越輜軿之容靡展綢繆之服自結而方玉之響希與余與海樵君結髪交逰垂二十載每日月過從談文說劍則坐為達曙君之夫人潔籩豆精酒殽芬馨動於几席肪澤充於方圓條置而列成未嘗倦弛余每太息之君亦每為余言方君弱冠多病纏綿枕簟之際夫人結衣帶晝夜攬藥石躬視更幾春秋未嘗異一朝一夕也余葢知海樵君之所以賢君才跌蕩横視一世其交逰盡海内英賢其意氣薄於霄漢述作滿於山川聲名垂於金石其内順之相副彬彬也有如家室機杼之憂之不足而暇於弧矢之間乎柏松之峻茂也非有女蘿之緣附則秀色不揚園林之芳也非有蘭杜則馨香不達於逺君得夫人而志氣遂夫人得君而名譽彰今其年四十其誕辰也君之交逰賓客驅車馬相率而為君壽君子曰四十非壽也四十而令徳昭成壽考之道也夀四十非古也因夫子之賢而述其内助之美祝頌之情也琴瑟相調而曲用成衆聲之和之也豈以四時哉為歌雞鳴之章令往奉觴焉贈謝雲門迺翁壽言鬱鬱乎美哉謝大夫之稱夀也被朱而帶𤣥黄揮金而躍馬此足以稱於賢豪間而迺有令徳寵名嗣子之聲光足以奮揚其駿烈古之所謂重徽累懿者非耶余昔與雲門君差池章甫躡逰校庠之上雖非杯酒交歡然意氣相重已迺君舉於鄉魁多士遂登進士第敡厯内外其聲稱日以炫爚而大夫亦稍稍離丘園逰帝鄉釋褐解劍仕宦為執金吾余時初授組在選部往往馳騎過從親狎其光儀追隨歌舞之樂敘鄉曲之好念離别之苦敦殷勤之義而不厭也今大夫以逸老還邑里翺翔桑梓之間容與禽魚之際而雲門君方珮二千石之印擁朱車盤旋五馬取道覲省奉觴而上壽邑中之縉紳逢掖相與咨嗟慨嘆大夫之賢雲門君之孝則為結羔鴈之令文將玉帛以成禮籍鐘鼓之和聲登堦庭而稱慶也而又屬辭於余余唯芝蘭之秀也不惟其芬芳而又有馨香足以逺徵大夫之有雲門君也非明徳之馨耶詩曰瑟彼玉瓚黄流在中愷悌君子福禄攸降然則忠信者夀考之基也廣裕者昌明之本也不見夫金石乎劍㦸之利而不可以貫水澤之浸淫而不能入也然後厯四時之久而不變經乎風雨雪霜而不朽大夫之忠信而廣裕昭矣余猶得親炙之况里閈之流傳也不以其道而遇之者幸也所樂文成者天與人之交得也藉令文成以非道而得寵禄則雖被之晝錦之榮鼓之以無方之樂薦之以三牲之養進之以萬年之觴將不得為樂乎而吾黨烏又敢鳴鐘和瑟雝雝裳珮之間乎重修溧陽縣鳳凰橋記鳳凰橋者邑大夫史吏部郎之所建也大夫休告還邑適余同年友王子令溧陽倡其事施行之比余至遂觀厥成大夫之屬余曰昔者繆先生則嘗記之矣葢碑而銘之也余惟古昔先王之以道濟天下也固因民而利通乎本實者也紀綱條章布矣乃有衣服輿馬符璽鞭扑為之旌别書契號令期㑹約誓為之徵信嵗月朔晦時日卯酉為之程度宫室城郭道路闗梁為之適居如此而法制備乃若先王之心則惟濟民以為利無敝廢而已矣逮乎後世語政理者不通乎本實郊野外荒而内議軍國閭里之不問而先廟廊之憂則夫匡植黎庶令出入㳺居得所者謂卑近而不言也而縉紳先生則又巻而懐之不大行以法其道不知君子以法先王也順時而澤物措地而安人觀諸其未備凡可以藉力而為之有所不廢也故嘉謀勝算不登乎廊廟匡時惠衆不在乎倚衡豐烈茂勲不在乎斧鉞銘功刻徳不必乎鼎彞道人者道也得人者徳也仁也者人也義也者宜也勢不存則度權以施澤權不存則因勢以善時權位奪則隠徳以匡世故君子濟物之心無已也故徳盛而功積名懐而身榮君子之道廣矣闗梁者固先王之所以通濟天下者也古者横木為度而闗梁之制興至後世而法備大夫之創斯橋倣古制而備之瓌然鉅觀固濟物之博誼也大夫其久隠乎使當時後世之厯斯橋而懐慕其人之徳不可以無銘已銘曰溧澤之里奕其新梁誰與剏者惟邦之英鬱哉山川休有耿光千載而下視兹不㤀送菊坡鄧先生致政還河南小詞并序竊以名高遯世士林揚闔户之光義重歸田宦海曠鑿阫之度豈不以人情薄於霜葉遇炎燄而輙飄俗慮淺於涔蹄涉寸分而不察好官須做誰聞笑罵之聲奇貨可居費盡鑽研之力自佞邪之竊據致蒸庶之流離兩府鬻官三闗騰價認人作父布兒無亷恥之心賣國營私檜賊是穿窬之類百寮已半為其黨多士或私附其風我菊坡先生識高海内笑彼氷山幾炳物先恥聞銅臭鐵石為姿風霜作骨辭官彭澤堂堂乎烈士之操罵賊睢陽諤諤乎丈夫之氣作歌詩以喻志何減離騷倡大義以登城欲追巡逺使奸䛕之黨未死而魂先消謟偽之徒欲言而容已赧解組而山川失色挂冠而日月濳光知世道之興衰係賢人之出處羣梟鼔翼而鸞鳯藏衆豻蹌踉而麒麟隠矣某也托僑札之分贈縞非難拜巢許之風望瓢知恨一聲長嘯難消許國之誠萬里題詞最重還鄉之節名留跡去曲短情長詞曰世路悲凉朱衣客化為豺虎心毒狠輕財薄道文章如土權計濳將羽檄招奸謀暗把衷情吐大丈夫名行重丘山當如許俺心事生的古他意思由來苦那有箇蕙蘭香肯共邪蒿為伍豪傑塲中麾劍㦸英雄隊裏爭旗鼓謾行來浩氣滿天壤誰能侮右調滿江紅重修徳化寺碑銘道也者自動自靜自闔自闢孰得而思惟之能思惟其所不能思惟則通乎道矣故道有盈虚有消息陰陽之義也儒佛之論興而道益以晦道未嘗晦而人見之晦也夫道何嘗無儒與佛亦何嘗有儒與佛謂儒為盡道非也謂佛為非道亦非也世教之盛則道緣於儒世教之衰則道緣於佛故道無所不緣豈惟緣佛緣於衆庶緣於小人道也者天也天之將滅小人耶則稔其惡矣小人之惡不稔則聖人之徳不昌故霜霰積而陽春生矣西極晦而東方明矣今之時世非耶保安新城東上徳化寺天順間有僧天然創之其徒圓達繼之而圓達之徒徳鑛復建天王鐘樓并碑亭三座徳鑛性淳實有佛行始余謫遷即卧病其中謂余有忠義大節朝夕顧視為切至而余宗子應璧業儒是燕趙名士率諸弟子數十人讀書於其精舍因屬余為碑文記其大畧予曰兹非鑛所思惟者此道將緣佛而興儒者之化使余得推明聖人之意以警將滅之小人豈不有自然者哉故不辭而文於其碑而且銘銘曰燕趙之際秦郡上谷州為保安漯陽是躅己巳構變辛未發足五百之年神貺其輻雞鳴翹首八寳濳育山川盤旋㑹於坤腹佛舍曜祥神宫展籙儒行光明章甫雲簇寄跡雙林揚聲九牧大悲救難小隠巷曲車行彭彭馬亦何跼擒彼六賊惟神之屬吾斯銘斯非鑛也獨書沈孝子碑銘余祖籍浙之麗水然本歸安遷去余以言事謫保安遘遇别駕君太學上舍兩君者奇雋之士也余既以重之又詢其先世不啻同鄉遂綢繆為金右交兩君道其先君子之篤孝余覽其碑記而嗚咽久之觀蘇使君之文固遒然使天下後世有如余之事其父母不至讀之而永愧於心者真碩戒也壽氏仙跡傳余束髪好神仙獲鴻寶袐書之流往往藏枕中竊讀之世之人不能深思博見以為六籍有所不載列聖有所不為聞羽化升舉呼吸雲霞服食金丹之事輒撫掌詆訶見謂迂誕此殆不然矣夫造化陰陽變化而精微披陳六合之内流浪千載之間懸殊擬於分置工巧近於削成而精麗疑於夙搆此豈不足怪耶而人情安於日見習焉而不知獨於神仙怖聞之所謂夏蟲之疑氷陰禽之怨日者又非耶不察仙人道士非有神奇可以絶人希有可以超世惟其聰明敏肅窮理之至探𤣥而入微足以奪造化之機極生生之道飛神馭氣控六龍以周旋是故塞危亡之險路拒恥辱之禍門據不死之妙機駕長年之永轍可以翺翔於九有容與於八埏譬如嶺島秀不凋之木園林植長榮之草龜以息氣能存鶴以神藻逺舉皆物之自然烏在其為無有哉迺余聞暨陽壽氏春峯君之事異焉余嘗與春峯君逰知其被服忠信而率履行善道平生敦義尚禮慷慨竒節可書竹帛者如數霄星不可指而舉也君過山中知余好神仙為余道其禱祠吕仙公甚精而仙公翩然降臨於君家者累日其與君酬酢響應而擬好若有平生者為君作存心堂之記春峯之賦抽筆對楮素揮豪若飛其他篇什川湧而雲出風烟之異狀殆不勝諷覽焉然皆語君心行意造而獨知之善而濳徳之幽光詎可無信哉又為君先君圖畫遺像已委逝十年而形容肖似不爽於毫髪至有意象縱横丹青之曜有智力之所不能窮研而巧工之所不能濡染者此其故又何也夫傳記所載如安期㑹於項羽之門洪厓見於旌陽之側伯陽經於闗君之市麻姑降於蔡經之家故往往有之假令神仙為浮誕道氣不飛騰而真人不羽化安得感應迅於雷電踪跡顯於人間若是之昭明暴著哉由春峯君之事觀之則神仙之必有也明矣雖然君有二子俱甚雋其伯鄉進士其季尚符篆郎皆與禱兹事此非其禮義之積習充於室家而馨香達於神明則仙人不降焉夫神不藻㵸則形骸不修氣不冲虚則真宰不集功積行累而後變化之道備神仙之有無既以昭晰矣而好善之家詎非長生之本與金處士傳余覽古傳記至獨行君子為㱆欷而不已世之道横流人心噴溢貲賢而屈能鸞鳳見妖而鴟鴞以為祥又烏覩夫獨行者哉及今世固有屏華茹實履幽貞而不曜者余得無綣焉處士名通字時中徽之休寧人也其先居白茅里曽大父琥生吾吾生笛笛生處士遷居璫居里少博綜墳典習為儒弱冠喪父遂棄去時販鹺於淮顧平生仗義未嘗與人較錙銖而色於面既壯喪母哭踊踰節訓其子以經傳朝夕洒掃館舍延禮師賓甚篤其居身接物樸然其言不華而其衣冠不徇於俗若脂韋媕婀以求容恱之流其視之如木偶也如飲酒能多而不醉出入宴見若祭祀賓客未嘗惰慢容體而錯陳其俎豆至人所贈遺尺帛無苟受者嘗與其子曰吾與汝母平生未嘗行一不義以累若等若等有不肖者必毋曰我父母之遺殃也其所以導子若孫語率此類所謂吐辭馨香而置身矩矱者非此其人耶謂獨行君子是耶非耶年七十有六卒娶汪氏徳實儷之生子三瑶珤璜瑶在黌序時已魁然振文藻既乃以選貢於庭授官為丞操猷並偉而士民懐之至今與余善書章直翁夀圖余同年友水部君乗傳還邑里几杖儼然日侍其尊君質直翁而翁且彌壽登齒以七十於是水部君將偵其初度之辰率内外諸族屬與其懿親厚交聨翩冠葢奉壺觴以祝之且召良史繪為圖而又屬余說其意余固嘉翁之惠慈以有訓而又羨君之孝思勤篤也洋洋乎父子之間非夫令徳之曜吾何以觀之哉余觀古圖畫至君臣朋友之相感合未嘗不低回太息之夫堂陛之都俞樽俎之燕好方其意得氣傾山岳與俱豈值水魚之相投而膠漆之固哉然賞愛出於須㬰荆棘生於轉盼及其嫌至隙開胡秦係之矣乃若父與子相安而且又有福澤壽考衣冠聚於堂室之際鐘鼔鳴於庭闈之間奉觴而上夀萬舞以承顔九獻以靡厭五色以怡愉一氣和同而四時交得此亦有生之至樂而人倫之極歡也故曰廟堂之揖讓不如桑梓之攸宜也氣誼之相恱不如骨肉之無窮也質直翁享黄耉之年履無疆之福此不足為難而有水部君翺翔雲漢之上焴爚羔羊之節馳車旋軾被服輝煌名聲光昭容與於高堂而獻之酒醴歌聲振於金石恱懌動於山川此世之所謂難得者非耶詩曰為此春酒以介眉壽言至足也傳之以繪畫詠之以風詩慈與孝之道昭著矣質直翁平生無邊幅衣冠樸然有古君子之風葢予往往見之此其所以生水部君者歟題武穆岳王祠大哉武穆禀受元極君臣之義萬世不易心懸日月手扶社稷巍巍堂堂盡忠報國春秋在我矧彼陳跡一劍霜横嗚呼檜賊化糧施粥勸諭文竊以天地功深惟仁義可以感格君親徳厚非忠孝不能報酬故先師孔聖之言必明教化諸佛菩薩之行總在慈悲人人有路可登仙須積陰功八百日日無縁堪學道空生世界三千况我等居住邊城遭逢歉嵗兵戈出沒民不安生大水漂流家無寧室粗飡隔日糠覈難尋斗米六錢荒村莫買官司幾處誰悲凍餓之人道路相逢盡是流離之子民納無收之稅日苦催徵軍丢有分之糧嵗難存活人將相食亂從此生某一介寒儒他鄉孤客從容啟處難㤀主上之恩勉强修為恐負先人之訓耳聞東西之冦盜日夜為憂目擊逺近之艱危出入自懼同居合里共命連根若民生既以不安在身家豈能相保一行搶奪便有殺傷貧以愈貧富難獨富只今殘臘已極荒年欲到來秋尚饒半載若不預先救䕶必知久後難為幸朝廷下令以招徠許富民出粟而旌奨功借一時者有數保安四境者無窮豐年算本利而還償通融何害神道計功程而福祐隂隲最多且當轉告官司具呈闕下或給有名之禄或免應得之差人心既公天理必報鄉黨稱善碑碣題名化盗賊為良民解干戈於不闘太平早卜禍亂潛銷誠濟世之良圖救民之上䇿也為此敢書勸諭共結良緣凡有作善人家積徳君子共成盛事各發仁心小不計於斗升大不拘於擔石將多就寡以有濟無存彼一日之殘生勝造千層之寳塔譬如賊人之刦掠不免棄捐亦有官府之營求空然費用何如正名正理濟世濟人大丈夫聰明豁達何惜餘財善男子正直慈祥須行美事天生天化捨去還來命好官低苦留不得天堂若有為善必登地獄非無造惡終入豈不見鄧通田連千頃終為餓死之窮夫元振日施萬錢還作太平之宰相機闗用盡難逃分定之災大量行來到有無邊之福儻然聽察决不負心須至勸諭者姜氏像贊白華鄂不音跗高堂永徂一日難延千金易圖粲粲孝子姜詩為比明發有懐光儀逺矣攀號莫從刻木難工依託丹青俎豆有容貌則靡降心則靡雙耿介夙夜靈之憧憧冠服有翩言臨几筵君恩既昭備物告䖍朱户光明琴瑟有聲進退周旋儼然若生孝思維新時見二人詎必形似乃為至親借曰惟育視之藐藐其與他人又復奚較生而盡孝歿而盡思室逺人邇子孫寳之錦衣衞新置經厯司私宅㕔壁記聖人之作也其有極深研幾之道乎則自天象始矣故仰而觀於三垣之際勾陳之外營衞一十五縱列而旋繞之公師不與焉於是知禁衞之為重也天子之威靈湛肅如神明之不可測而後海内之人嘿然畏服斂手而從化故禁衞者百司之首而萬事之管轄也昔者周公之制禮於宫伯宫正而致意焉士大夫服其職而稽察竒袤法令尊矣漢之制以北軍為禁衞光祿勲之設以為經緯也觸瑟之仆其猶有古之防乎乃若七校之班列愈疎矣唐有執金吾千牛備身之目宋有殿前鶴駕虞候之數其稱名也雜其取類也猥周公之意其不可見乎我國家之興也以為錦衣衞府衞之制若踵於近世而錦衣之名爵等威稱為親軍百司莫先焉至於次簿鹵刺出入肅禁令察非常與周官之宫正宫伯相表裏此豈非聖人法天象而為之者與是知我國家之文章熙熙乎盛矣諸衞皆設經厯司以掌文書之出入猶近世所謂叅軍主簿記室之官則一衞之喉舌司焉而錦衣之經厯司與諸司皆無官舍今柱國東湖公蒞衞事文武忠孝光明服於四海見鍊之至官力不能具舍也慨然嘆曰隨時而創制者經事之則也因政而安人者服逺之規也即是而俾若官之有舍也不亦可乎於是捐府金若干為之命千户趙虎百户王瑀董正之舍成於紅井里去衞司若干步為屋四重君子曰推公之心使天下之安居可也鍊也再拜率妻子而入之進而之於司退而之於舍夙夜惴惴不敢念私焉公命鍊曰子必記之令後之人過之曰錦衣衞之有經厯司私宅自沈鍊始也高節堂賦何兹堂之䆗窱兮標高節以為顔維淑美之淳懿兮麗光曜於不刋昔三后之鴻化兮有内則之昭宣悲二妃之越湘川兮繄聞母之映塗山嗟姜氏之脫簮珥兮則宣王以致中興將玁狁之孔熾兮孰非陰教之夷陵余覽劉向之述傳兮曾廢書而哀嘆葢念宗國之嶮巇兮憂民生之多艱彼王氏之擅權兮夫孰非内寵之為患乃發憤以抽筆兮罄慷慨以陳詞豈徒靡麗之是躭兮藉雕蟲而見之余昔宦逰於京邑兮逢戴伯之温醇懐抱瑾瑜廓落其無隅兮造川流而日新余望見顏色而知敬兮豈云以其冠葢彼得志而猖披兮余直以為蕭艾伯懐忠而履孝兮哀母氏之劬勞嘅所天之早逝兮執矩矱而自韜母惟秉輜軿以為車兮恒被服其寳刀飡荼蘖以充腸兮嚼氷霜以勵操曰女結髪以從夫兮臣出身而事主孰懐擕而貳心兮曾不念上帝之臨汝設家道之中零兮又孰云非余之辜余既承夫君之委托兮曷不蚤夜以儀圖母精白以承令徳兮亦終受夫之榮華身與心其並愉兮暢嫓美於厥家母何為兮貞良伊何為兮謬誤譬鴟鴞之啄人兮將先委夫衢路羡哲人之誠哲兮哀愚人之誠愚洵君子之樂道兮美女氏之匡廬名有隠而愈光兮節有約而愈高維風人之攸美兮齊春秋之所褒雖夫人之夙駕兮儼華屋之常存欂櫨臬之尋丈兮曜燭於天門雲霓横其氣勢兮日月並其光明慧孛長星莫不隠而滅兮况敢屬其欃槍亂曰嫫母載塗兮毛嬙為妍䝟貐食人兮騶虞稱焉堂與名俱高兮垂千萬年忽伊人兮長自憐羌采風兮舌以巻贈牛總戎膺御史臺嘉奨歌詞一首并序竊以職事不分於文武有道則崇聲名靡間於公私稱情斯美譬之竒蘭樹圃因風而香氣流美玉在庭映日而光輝發物理非逺人情則那兹惟百川牛總戎介胄名門箕裘世緒風骨挺竒於燕頷藝材逞異於魚腸説禮樂而敦詩書有希卻縠之志談孫吳而總韜畧無讓衞公之能解劍從師將明嵗學投醪養士欲報國恩嗟髀肉之復生恨匈奴之未滅枕戈待旦何况聞雞按劍横秋祗須躍馬是以虎林服乂烏臺知名寵踰一字之褒惠過千金之貺光生逢掖響應轅門載道歡騰專城耀色羽商競奏遥傳下里之歌鼓吹横陳早作中軍之凱詞曰邊城畫角風沙起鐵騎千羣環列壯士悲歌三爵後慷慨徵聲激烈紫閣情深黄金分淺誰敢輕臣節赤心為國當今幾箇豪傑巵酒還勸將軍男兒須不負誓心忠潔虎畧龍韜指揮間便把邊塵消滅鼔翻海霧旗捲陰山雪麒麟閣上更看名字竒絶右調念奴嬌贈蔣元戎膺奬歌詞一首并序葢聞軍法以先聲取勝人才以振譽成功譬諸雷鼓而六氣調鐘鳴而九韻應理固如此人何不然迺者蔣總戎束髪入官印符早佩專城為將鈐轄兼通連弩雙開人道射鵰之手輕鑣獨發自多探虎之心所以徳惠日新令名風動誓清斥堠誰能知奉檄之懐聲達當塗安識非築壇之兆吾黨相逢異數念切同舟田章以鐵籠得全人心自附仁貴以白衣威敵國勢攸尊所願仗劍持忠散金結士匈奴未滅難攄許國之忠邊塞獲寧豈盡為臣之節孟嘗榮顯籍用諸賓韓信威名詢謀降卒惟不㤀乎赤子是所望於將軍詞曰太平人世笙歌寳劍都向煙花燼羌戎接境諸營按壘還憂啟釁我本書生哀憐赤子長歌氣盡算男兒忠義心腸總是龍蛇窟堪成陣聞道將軍驍勇脫兜鍪千夫莫近孫郎年少种師警敏一時聲震要秉忠良諳通韜畧奮身前進待從頭整頓三邊事了掛封侯印右調水龍吟送陳藍田赴贛州幕府序余固喜功名見人仕宦無小大皆為之盱衡動色樂其驅馳乎王路而役事於公庭也夫士生斯世豈能人人䇿足要津而動履乎卿相也哉故不易時而黽勉者憂勤之士也不擇官而從事者志義之人也古之人樂道無悶不歆羨於榮華不厭斁於枯槁當闗奉職飲水而服官然而未嘗不布徳當年揚聲於後世若老𣆀為柱下之官䝉莊傲漆園之吏而孔子居乗田之職此皆聖賢而不免奔走於末路沉伏下寮然而其光輝譬若寳玉之在山林不能掩抑也乃若抗高爵以凌人都大官以振世組綬眩於雲霞車行若水馬馳若龍可謂赫奕萬里矣藉令功業無稱焉君子豈肯以此易彼哉故絲竹之有音聲不必於登歌騏驥之能馳不必峻阪也余故人胡常伯吳㑹間高士余固伏軾焉時時為余道藍田君之賢余以是得逢君於京邑察君之氣貌耿然敏事願䇿功名於當世而不為人後者也始以例充符璽郎補内庫史時時與中貴人頡頏蒞事不為媕婀徙倚操管鑰甚嚴監司當路者知其能恒檄以攝諸他事無不束帶以禀令摳衣而贊職秩既滿猶睠矚焉學士大夫固交臂而重之談道不置豈亦非古之所謂賢豪君子起刀筆而隠筦庫者之流耶於是更除贛州府知事夫能薄者名日隘而事就寡能鉅者位日進而事愈多贛近五嶺之間東西相距往往有弄兵潢池跳梁而躑躅者而知事為府幕官葢古叅軍掌記之流其秩崇於抱闗又不啻有分職而已烽連雲而起羽檄之交馳軍書委積而王事鞅掌為幕府者常欲珥筆而綜覽褰帷而并發以君之能仗䇿而往操之知其俾太守坐嘯而治郡士卒卷甲而滅賊功名之地不離尺籍而機㑹不出於庭宇何必羡氣燄於巨寮而嗟彼尋丈哉記曰秋風之殞木葉也不如入於山林漁者之善釣也不如臨於藪澤今君之兹行也余且以為遭逢期㑹矣詎得無黽勉焉保安玉皇閣住持碑記㑹稽青霞居士在八寳山前白雲精舍究諸聖之精奥顯本地之𤣥微於一毫端放出相光照滿三千大千世界上首弟子曹子健五體投地合掌稽首而白佛言宰官馮北橋氏從玉田縣束帶纓冠仕宦於保安新城一向焚香頂禮諸佛起慈悲心哀憫衆生是有緣種者當其時諳逹持戈刃犯城有三四白衣見賊恐怖自投于井北橋氏聞說即跨馬往捄得去見饑餓者每日粥五斗米施之往見城北闉闍上有玉皇閣八面瞻仰而閣居中于是寫金像延禮比丘清朗朝夕焚修誦法華經保䕶十方善男信女䝉福免禍其比丘年七十餘日持一齋不食鹽醬諸葷專一化度世人是有道者于是感動城中信官周海念宰官布施之徳及比丘精䖍無有文字標識恐後人無聞知乃敢祈佛授記鎸刻碑碣樹于道旁示不磨滅居士囅然微露玉齒而說法曰善哉善哉心從法華轉非是轉法華聖賢大士但具慈悲實相雖一微塵未嘗非心未嘗非法釋家專一談空語寂未為契道若能於一微塵中生大智慧生大慈悲乃至於包絡天地光明日月順序四時成就萬物譬如桃杏花只開一朶結成果實能使流傳充滿普遍八極究其原始只是一花故未可謂一微塵不具足三千大千世界也况如弟子稱設宰官比丘善已不細又能充滿豈不具足今世界浮蕩文武官寮不明因果大起塵勞妄想一味貪嗔分别人我譬如割肉充腸自殘自害沉入苦海不肯回頭余念念痛悼衆生業障深重不能超脫每與吾子襄言其說曹子健使刻諸石此即甚深微妙法如來真實義者若子健埋胔濟貧是能超三界者歟余乃次第其言而說偈曰世人修行者但觀自本身愛身若寳樹不能愛它人若人自遮迷大道明於火貪嗔結禍胎慈悲生福果誰有彌天量彌天原屬我一朶桃杏花生出千萬朶花實本一體化生無不可恒沙世界中天地即果蓏青霞集巻三
