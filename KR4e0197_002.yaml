body:
  text: 青霞集卷二明沈錬撰文祭楊賔山文嗚呼公兮昔非嚴青生有異骨今是洪崖歿何超忽嚱吁嗟乎大化飄凝煙雲蕭瑟來亦非生去亦非歿何羡長生日月並征何悲長往松楸愴莽公在人間問水尋山釣筏朝遊行亭夕還方駕回旋羽服翩躚自非得道安得超然公有令子奮翮萬里黃鵠之翔讓其睥睨縣庭擁蓋馳驅迅邁澤流若春曰公遺愛御史秉職清風橫軾威行若秋曰公遺直公形則淪道氣長存何必神仙然後飛鶱余黨差池夙瞻令儀方緣人世那謝凄其爰潔酒漿以望耿光神既不泯鑒昭萬方尚饗祭翁孺人文淑靈休哉結褵夫子奉饁在田挽車還里君子馮軾德音載路豈非和鸞琴瑟則助既間婦道亦順母儀斷機靡勞丸膽是貽克成冠蓋崔嵬亮節隋珠奉明和玉讓潔初䇿彤墀再麾粉署簡書靡愆惟訓之故唯有令子乃昭慈母宫庭之光閨門之甫耿烈初曜雲霧是承嗟蘭之萎徒有遺馨余等宦遊之子同鑣齊休並戚大義非遼傷感所生哀實痛余况聞得駕秉紼在衢小子簮筆爰為此詞以告酒醴臨旐奠之尚饗祭茅封君文猗歟修靈方駕三吳鄉頌碩彥家傳令模克開懿賢竒服蓋世珥筆大庭䇿名禁地譬如鳳凰羽毛則揚非有明訓孰宣耿光帝詔里閭朱紱在除布昭鴻藻章采特殊嘉寵方興降命不登奄忽朝露薤止靡英湖水蕩蕩明月未央不見夫君蘭棹自將余黨旖旎連麾令子攀結一時附驥千里爰念世誼亦感生榮禮切同哀情嚴並承星辰再沒龍車先發蒿里時歌願恭執紼潔此牲醴瞻望斾旌非獨黍稷以獻芳馨鳴呼哀哉尚饗祭史給舍文嗚呼處士余未覿其色澤而惟聞其聲光三晉冠裳多出凌霄之幹五靈甲第居成拔霧之良爾乃懸弧高引張蓋出遊徘回關隴揚歷山丘鳴琴楚水之濵心低回而思逺擊筑燕山之上氣慷慨而橫秋不學向平徒嗟岱嶽言追司馬徂徙方洲詎意龍蛇之興忽成霜露之愁車橫軸而不行馬垂絲而結戀如夸父之渴斃固亦勞生彼帝子之道亡誰云非變嗚呼人生多感世道早雕逝者已矣來者煩勞惟是存亡之間重為哀怨之府蓬斷根而可嗟李不食而懷苦是以聖人嘆逝雖行道之猶悲而君子哀人於賢者獨無語吾黨瞻望光塵緬想休度本知僕射重昭內使之賢不見伊人益動羊公之慕爰有斗酒以折寸心挂劍而行樹之明質炙雞而獻靡在芳歆褰雲旐兮惝恍冀靈魄兮監臨嗚呼尚饗祭宋翁文白日悠悠懸景西征人非金石安得修齡嗟哉君子夙駕如星傷彼冠蓋悲慨並生君子伊昔參轡令丞輝煌組綬熠耀簮纓今也不御輀車在庭既有淑訓𦙍子榮成陸離劍服飄搖珮旌今也不覿其經其承人命有時光耀靡繩譬如回風殞彼杜蘅薤上之露不得久榮昊天為之若復令寧吾儕迤麗連袂帝京羌爾令𦙍實我同登推結分好曰弟與兄情親伊邇岵屺則傾豈不哀疚涕泗交橫念阻山河心懷鬱蒸曖曖泉路翳翳佳城搖搖方旐穆穆幽靈非有嘉薦孰昭懿誠爰潔㫖酒芳粢孔明奉兹觴豆侑以瑟笙音響不遐庶幾是聽嗚呼尚饗三忠祠上梁文竊以提真闡教非神靈無以揚萬物之權為國勤民必仁義而能作諸賢之氣事非勉强時所宜然表德旌賢書垂典訓作宫築室詩頌形容周武式商容之閭懦夫立志仲尼題季札之墓俗士回風金馬碧雞空闢蠶叢之路湘雲翠竹徒燒漢上之祠狄梁布檄於江南恨規模之猶隘陳勝托靈於土偶知奇譎之未安道貴緣民心存救世三忠祠者曰唐曰葛曰周同為髦士於周於吳於宋並著其名伏闕獻書骨鯁糾厲王之謬臨危制勝神機授楚子之降國難君憂竭精有勵商資民貺博濟無私髙義將五嶽並峙大忠與三光齊耀士農工商之胥悅宜謂靈侯南北東西之共尊莫非典祀保安城郭煙火萬家𤣥武祠宫土基三尺本因民俗式昭金石之光載以時艱爰顯氷霜之節人心同而貨聚工力鋭而財輕不日有成爛文章於雲澤永年無斁齊帶礪於山河因上梁而升歌風和絲竹粵至地而肅拜日映衣裳敬陳六闋之謡行俟八荒之請祭陳亡張遊擊文嗚呼哀哉張公之死乎吾安得不慟哭而深悲維天有柱維地有維而所以柱天維地者舍忠義其奚為姦臣執柄綱紀大虧邊軍退葸不戰自疲外通貨賂內結權私社稷之計蕩於霜枝割人為糧奪馬自資報功欺主曾無愧辭將軍初來意氣恢恢言念國恩流涕滿腮口諭三軍執挺持椎此行竭力有去無回攘臂渡河奮呼登岸受刃良多殺傷過半力屈勢窮精靈不散天發震雷來斥邊患亦有官軍屯聚若雲按兵不動誰為救焚我亦有生汝亦有死何其忍心睨而無泚張公雖死神氣長生諸將雖在奄奄無聲汝不忠義知有權貴權貴行誅汝骨亦碎先死為榮後死為辱死辱生榮其辨如燭汝不自力欺君誤國荼毒生靈為鬼為蜮不輯其徒不恭其職所過騷然大為淫慝張公有靈誅此逆賊逆賊不誅伊何為德某等流離不在其位敬公哀公有霰涕淚憂國憂君懷仁慕義醵金為饌選辭為翰臨風長號痛徹霄漢嗚呼尚饗祭陳亡郭將軍文郭將軍宣府之副總兵也名都其時嘉靖三十三年忠烈勇敢亡於陳中其事跡大概有同於前文張遊擊也噫吁嘻悲乎哀哉郭侯已矣名實琦瑰在地為嶽行天為雷憤氣英靈薄於軒轅之臺蚩尤雖未滅而姦雄為之摧矣賊臣中據盜充九垓以敗為捷欺若嬰孩割我威若冰霜之釋資冦兵若草木之荄積衰成弱助虐為灾仁人君子所不忍懷郭侯恢恢擁車而來指麾將士涕淚滿腮知東君之不戰吾西士也其誓死而不回臨河山立白刃皚皚鋒交血戰隂雲不開手格殺者數十人士卒相殺傷亦參半而徘徊精衛含寃豈謂能填於巨海螳螂奮臂誓將立志於不才男兒死即死耳何用媕婀屈曲俯首折節受文吏之沈埋與使懦夫庸士猶知奮激振起其摧頺而舞刀筆以襲功賞者不免忸怩澀縮斂翮而遲回天理人心賴侯以不滅其有功於天地社稷蕩蕩乎名髙於九野光曜於泰階矣某萬里孤臣三邊逐客壯侯節烈震侯恢台驅車匍匐言弔言哀噫吁嘻悲乎哀哉河水擁兮兵心苦血為川兮肉變土草莽莽兮鴟梟夜啼㦸門深沈兮泣如雨天髙兮地垠曠海宇兮無人豺狼跳兮狐鼠伏嘆白日兮悲陽春將軍之魂兮在霄漢千秋萬年兮光旦旦奸諛兮未死骨森森兮若鬼奸諛死兮强敵滅將軍之寃兮乃昭雪嗚呼哀哉尚饗祭三軍文嗚呼汝等烈烈為五百義士之從田橫乎為三千俠客之附平原乎奮臂擊賊一旦而死之涿鹿之野漯陽之墟其懷憤而負寃乎其精靈上浮畢昴之間光氣爛爛逼於奸權誰可泯其九死之苦百憂之煩吾為若等哀悼慟哭鐫其名字瘞其骸骨千載而光曜常懸汝等已為厲鬼為朝廷誅此殘賊不沒沒於九泉矣嗚呼哀哉尚饗重修嶽王祠募緣文竊以天地恩深特尚鬼神之典君親義重難忘忠孝之心孔子大儒端冕而拜周公之廟狄梁高義篆書而存伍子之祠從來有國之文猶貴人臣之節在蟻蜂而猶爾何犬馬之不如一飯堪懷誰可負萬鍾之祿千金易棄何須受五鼎之烹緬思武穆之風雄視寰區之表心懸社稷手植綱常抗疏賊臣有不共戴天之憤長驅鐵騎成一匡諸夏之功執鉞爭先丹心耿烈盡忠報國四宇昭回香案恭迎著聲名之映天日生祠顯建為恩澤之入人心周三畏棄職遁逃不忍附姦邪之意劉允升上言辨論直書誅亂賊之詞足徴忠義之在人詎謂感通之無道敢因其舊復葺其新香火明朝表精忠之一㸃鐘聲子夜報華衮之中興布告十方廣周千界凡我賢良之士子與諸文武之官寮切悟善因同歸正果願超苦海無如結忠義之緣希入賢門只是走光明之路聞聲解意觸景回頭助我一錢勝種良田之千頃饒他百計難逃惡業之三災天理人心不離布施忠臣孝子即是神仙為普勸於萬人庶共躋於五福須至疏文者青霞集卷二
