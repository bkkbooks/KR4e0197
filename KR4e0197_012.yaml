body:
  text: 青霞集卷十二門人王元敬編年譜沈青霞公諱鍊字純甫先世處州麗水縣人明初祖祥二公從太祖起兵遂編籍為紹興衛人曽祖諱伯才祖諱慶父素菴公諱璧世居㑹稽之東郭里正德二年丁卯先生始生初葬大父慶有二虎臨窆吼震林木占者主得貴子後二年丁卯九月初八日母俞夫人實誕先生先生少岐㠜有異質俊悟絶人始齔讀易過目成誦嘉靖元年壬午先生十六嵗是年先生補弟子貟有聲學宫嘉靖三年甲申先生十八嵗是年仲春先生親迎於徐處閨閫相敬如賓嘉靖五年丙戌先生二十嵗時督學汪公文盛閲先生文竒之曰異者是且以氣節顯擢第一嘉靖八年己丑先生二十三嵗時漁人獲白龜甚巨獻於守欲殺之疑不決曰沈生博物盍問之先生曰是當還於河殺之有水害放之後他郡竟殺是龜果驟大水守聞而驚嘆以為先生果博物也嘉靖十年辛卯先生二十五歲是年先生舉於鄊素菴公先以不樂家居傾産貿數百金賈遊京師落魄陸沈久不歸先生是嵗得覲父嘉靖十一年壬辰先生二十六嵗先生春闈下第百計哀泣請父歸故園素菴公幡然曰吾兒孝如此吾復何憂可以歸矣及歸家窶甚先生事之極甘脆內外具得其歡嘉靖十二年癸巳先生二十七嵗是年春俞夫人疾先生晝夜侍湯藥衣不解帶者三月焚香籲天願以身代病尋愈鄊黨咸謂孝誠所感云嘉靖十七年戊戌先生三十二嵗是年先生成進士授溧陽令溧陽故多豪梗先生政尚嚴明事每持正不阿忤臺史意嘉靖二十二年癸卯先生三十七嵗是年論調茌平數月訟簡民和邑人士為之語曰沈茌平如鏡明如水清不賞民勸不怒令行居亡何以父憂歸嘉靖二十六年丁未先生四十一嵗是年服除補清豐令愈自刻勵勤民有惠愛聲時錦衣多疑讞當事者推先生亢直遂請得先生為經歷先生三為縣皆得民去之日吏民扳轅慟哭遮留不可得所在繪像尸祝之嘉靖二十八年己酉先生四十三嵗先生至京邸一日飲賔於庭有道人因謁者進持一利劍贈先生先生把玩喜而問曰劍值當幾何道人曰非百金不可得然大人烈丈夫也故攜此贈勿願金也遂長揖去出門忽不見蓋仙云先生大喜不自禁以為得上方斬馬劍君側之奸可除矣既而拔劍起舞有黃布如蓋從空飛來又有隻鶴來自南長鳴數聲北向而飛與劍舞相上下舞罷鶴乃棲於庭畔纍月逮先生抗疏直詆嚴氏後遂戛然飛鳴而去嘉靖二十九年庚戌先生四十四歲是年十月諳達掠近郊時都門閉村民百萬求入不得哭聲震野當事者莫敢發䇿先生急謂陸公勿閉門閉門豫敵民矣陸公為言於上而許之所入男女以巨萬計後數日敵獲御馬監中官榜其背令入報曰幸貢不則且肆掠大宗伯徐公階請上臨朝詔文武羣臣議檢討毛公起言許之便司業趙公貞吉叱起言不許便先生曰諳達犯順至城下許其貢掠不許亦掠京營將士久襲承平兵鈍甲朽難以應卒今且令禮部與語汝等逺來求貢未測聖意不敢遽奏必欲貢當備列誠欵為汝奏請如是遷延以緩其勢隂為戰計乘怠而襲之彼可擒也是時奸相嚴嵩怪而問其黨太宰夏邦謨遽承望呵曰若何小吏多談乃爾先生目攝之曰大吏噤不言故小吏言胡怪也且不曰主辱臣死耶次日上視朝詔有計破敵者得盡言先生既上疏請兵萬人一則護衛陵寢俾主上無北顧憂一則防守通州盧溝以通餉道嚴飭將吏奮勇設竒大創强敵詔下兵部議是夕天發震雷大雨如注敵乃宵遁未幾仇鸞議馬市嚴氏實主之先生廷諍以為不可詞直慨激切衆皆愕然退而氣不平者纍日一日先生與尚寶司丞張君遜業飲嘆曰前日敵在城下使謀國有人豈令蹂躪至此乎綱紀大壞賄賂公行四海民窮九邊政廢實嵩父子罪也大奸不去他事未有可議者嘉靖三十年辛亥先生四十五嵗是年正月先生遂抗疏言相嵩父子翼虎社鼠誤國大計請誅之以謝天下詔下大學士擬上㫖云沈鍊去嵗喧譁朝堂無人臣禮今復誣詆大臣以自為名廷杖之四十謫田保安州先生當田保安倉卒寄妻子廣柳車未有舍而州人賈某者傍睨先生曰公非上書請誅嚴氏人耶揖之入徙家而家先生先生始有家矣久之以講授自給諭諸生忠孝大義且目覩邊事日壞憂憤至忘寢食往往發之詩歌文章譏切當世大抵多歸罪於嚴氏者嘉靖三十三年甲寅先生四十八嵗是年宣府大同諸郡邑大祲斗米六十銖邊民死者相枕籍暴骸不掩先生買地而瘞之又傾槖裝作粥粥饑者復為疏勸富家大賈相繼賑濟活男婦巨萬後麥稍收民尤不聊生先生建議鳩工修濬城濠是年秋大水驟至從北山直衝保安新城頽西北隅數十丈幸壕深水就其道而民居無恙士庶歡呼感戴相率而為生祠祀先生時張逰擊從西入衛遇敵血戰全軍覆沒東軍十餘萬屯聚坐視將佐環堵不救撫按欲掩其事先生奠哭於沙場語侵當事者當事者聞而憾之又塞上人骯髒多戅時時耳相嵩則爭詈嵩以為快其諸生至為偶人三象唐相林甫宋相檜及相嵩先生亦時有所扼腕作蹶張狀而射之語稍稍聞嚴氏父子銜恨切骨思有以報先生矣嘉靖三十六年丁巳先生五十一嵗嚴相以楊順總督宣大軍務是歲諳達大入破應州堡寨四十餘殺傷萬計而帥府以下束手閉壘以恣敵之出沒不及飛一鏃以相抗甚且及敵之退則割中土之戰沒者野行者之馘以為功而父哭其子妻哭其夫兄哭其弟者往往而是無所控籲先生傷之作詩曰割生獻馘古來無解道功成萬骨枯白草黃沙風雨夜寃魂多少覓頭顱語籍籍布聞一夕鄰女哭甚哀訪之女母氏寡居垂二十年止一子出郭外為順家丁割首去其母訴於督府復被笞斃先生聞之不勝憤悶飛書直指其事人㦯謂先生遷人非有言責毋為爾先生曰今日割猶少後日割且多縱不割我首割民傷如何澘然流涕曰我昔非言官今非啞子若輩欺君以要賞吾誓不與共天當舍此身以報主上恩救萬民荼毒之苦聞者嘆服自是諳達攻掠邊堡無虛日先生復致書順勸出兵奮擊勉以赤心為國家計又作籌邊賦以抒方略且曰必不發兵當聞之朝廷順深懼而憾之乃遣心腹指揮羅鎧經歷金紹魯密報嵩子世蕃所曰是夫也結死士擊劍習射以間而取若父子世蕃曰吾固知之即以屬巡按御史李鳳毛鳳毛謬為謝曰有之竊隂已解散其黨矣鳳毛得代歸遷光祿少卿而御史路楷來楷又嵩客也世蕃為酒夀楷而使謂順曰幸為我除瘍事成大者侯小者卿順乃與楷合䇿捕諸白蓮教通畨者連及先生僉事許用中參議朱天俸三招皆不及先生順凡三駁之既用中天俸以先生名入而獄遂成順楷具列先生謀反狀奏遂置先生極刑籍其家先生臨難罵曰順楷奸賊賣國殃民無復人理反嫉吾言為嚴氏作奴狗搏噬人我肝腦不惜塗地以報效朝廷豈無天日鑒照我心宜置我目百尺竿上不久視羣鼠赴西市磔矣乃口自吟曰宋室忠臣死吾應是後身誰知今將相還是姓秦人遂就戮為丁巳嵗十月十七日也是晨西北有大星光芒射人墮地如斗宣鎮士庶至今談及先生事者涕橫流不已先生既死籍其家而豫順一子錦衣千戶楷升五品京堂順尤怏怏曰丞相負我薄我賞猶有所不足乎謀之楷取先生二子杖殺之而移檄越逮先生長子諸生襄當是時先生門人栗鋐梁子健俱宣府諸生也痛先生不得其死號哭於市路楷縛而罵之二子曰某等當死但沈氏非董卓某等非蔡雍也兩道為解而釋襄初被械至宣府二子潜見襄獄中掩喉以陳先生始末嘆曰君此來無生理矣吾當殺此二賊以雪萬世之恨時同患難者不可指數若二子者憤激於衷不避艱險真義士也順楷既籍沒先生家罄先生篋留故帙并燬無遺又恐諸弟子留藏副本復榜於市凡匿沈氏遺稿片紙隻字者按捕同罪於是諸弟子相錯愕恐怖投諸水火獨武崇文者亦欲火之意不決腸若刃刺俄仆地隕絶不知所為頃之見先生緋衣而劍叱曰子亦欲燬我遺文以媚若輩乎遂驚寤不敢乃於後圃掘地埋之昭雪之後武生引先生子襄入後圃出而授之襄初見順順曰汝父今日尚能罵人耶榜三十至見楷復痛榜四十逮繫圜中煩寃苦渴幾斃矣夢寐恍忽間見武安王關神衣緑袍慿空而下左手持瓜右手持刀呼襄曰爾忠臣子也後當必昌遂剖瓜食襄因得不死及蘇口吻猶有瓜涎時蓋冬月非瓜時也楷既榜繫襄命獄吏限三日盆死同獄囚皆為襄悲傷襄亦自分必死特恨寃亡以白讐亡以伸欲密寫先生寃事結蒼頭衣帶中寄同鄊老人忽筆端有異香須臾遍獄室諸囚驚異更相慰曰君死必為神矣爭進酒食生酬之至四鼓獄吏馳賀曰沈君生矣朝中官校來收楊路矣是時給事中吳公時來劾順楷冒功誤國大罪并白先生之寃世宗皇帝詔捕順楷下司寇獄嚴氏援之順戍代州楷僅貶官襄在獄歲餘巡按御史欒公尚約知其寃欲釋之而畏嚴氏之威發戍遼東嘉靖四十一年壬戌先生卒六年御史鄒公應龍劾世蕃父子奸狀世宗皇帝震怒詔放嵩還鄊世蕃戍雷州襄走京師訟父寃詔下巡按御史胡公維新申論楊順前曲殺先生罪并上襄無他罪狀詔許襄復保安學生得負先生遺骼歸越嘉靖四十三年甲子先生卒八年是年冬御史林公潤亷得世蕃逆跡奏之詔捕世蕃下法司論死戮西市嘉靖四十五年丙寅先生卒十年世宗皇帝遺詔録言事諸臣後隆慶元年丁卯先生卒十一年穆宗皇帝改元首詔下諸司議復先生原官加贈奉議大夫光祿寺少卿遣官諭祭録一子入國學襄以貢舉上春官伏闕上書極言總督順巡按楷殺人奸黨狀而給事中陳公瓚魏公時亮各上疏請正順楷曲殺先生之罪詔下法司收捕順楷論扺罪許用中朱天俸末減戍邊萬厯九年辛巳先生卒二十五年是年春屯田直指王公國巡歷駐天津晏寢署中夢門吏持刺入報曰一道人來拜其人修髯廣額精爽不羣自稱沈鍊言其生平及冥中事甚具既而儀衛侍從滿前擬於王者王公怪而問之先生曰吾受上帝命主宰北天適微服而來者恐見訝耳遂服冕旒衣裳乘輿駕空而去鼓吹之聲嫋嫋不絶王公驚寤進霸州天津兩道問之相與愕然先一夕俱夢先生投刺先生豈神邪王公乃捐俸為先生搆祠津門焉嗚呼古今以諫死者多矣未有橫及典刑者而焦山楊公死於市既而先生死於戍死雖異其為嚴相曲殺則一也嚴相之殺先生自謂足以蔽天下之口矣抑孰知正所以甚神人之憤而激其怒邪先生生而厚重秀目長髯雖燕處必正衣冠坐立不失矩度天性忠鯁恆以天下事自任言不違衷行不違道事父母兄弟至孝友好學博觀手不釋卷始從新建公游一再與語即竒之嘗語人曰吾與沈子論事種種超卓真用世之才也先生年五十有一配徐氏誥封太宜人子四長襄歷仕姚安知府以太宜人垂白乞歸終飬次衮次褒皆死於難中次袠僅以稚免萬歷三十四年丙午先生卒五十年襄子存德以先生䕃授太僕寺主簿能讀遺書長於詞賦蓋翩翩鳳毛云是年十二月存德上疏為先生請諡奉㫖下大宗伯議萬厯三十七年己酉先生卒五十三年公擬忠愍上請奉聖㫖依青霞集卷十二
